<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自然資優模擬試題解析｜1-20回</title>
<style>
  :root {
    --bg: #fafaf7;
    --panel: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #e4e0d6;
    --accent: #7a4d3b;
    --accent-soft: #f4ede2;
    --correct: #2c5d3f;
    --serif: 'Noto Serif TC', 'Source Han Serif TC', 'Songti TC', 'PMingLiU', Georgia, serif;
    --sans: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--serif);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.75;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
  }

  /* 側邊選單 */
  aside {
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 2rem 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  aside h1 {
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    padding: 0 1.5rem 1.5rem;
    border-bottom: 1px solid var(--line);
    margin-bottom: 1rem;
    font-weight: 600;
    color: var(--accent);
  }

  aside h1 small {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.3rem;
    letter-spacing: 0.05em;
    font-weight: 400;
  }

  .menu {
    list-style: none;
  }

  .menu li a {
    display: block;
    padding: 0.6rem 1.5rem;
    text-decoration: none;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 0.92rem;
    border-left: 3px solid transparent;
    transition: all 0.15s ease;
    cursor: pointer;
  }

  .menu li a:hover {
    background: var(--accent-soft);
    color: var(--accent);
  }

  .menu li a.active {
    background: var(--accent-soft);
    border-left-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  /* 主內容區 */
  main {
    padding: 3rem 4rem;
    max-width: 960px;
  }

  .round-header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 1rem;
    margin-bottom: 2rem;
  }

  .round-header h2 {
    font-size: 2rem;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .round-header .meta {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.5rem;
    font-family: var(--sans);
  }

  .question {
    margin-bottom: 2.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px dashed var(--line);
  }

  .q-header {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .q-number {
    font-family: var(--sans);
    font-weight: 600;
    color: var(--accent);
    font-size: 0.95rem;
    flex-shrink: 0;
    min-width: 2.5rem;
  }

  .q-topic {
    font-family: var(--sans);
    font-size: 0.78rem;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 0.15rem 0.6rem;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }

  .q-content {
    margin: 0.5rem 0 1rem 0;
    color: var(--ink);
    text-align: justify;
  }

  .analysis-box {
    background: var(--panel);
    border-left: 3px solid var(--accent);
    padding: 1rem 1.25rem;
    margin-top: 0.75rem;
    font-size: 0.95rem;
  }

  .ans-line {
    font-family: var(--sans);
    font-weight: 600;
    color: var(--correct);
    margin-bottom: 0.5rem;
    font-size: 0.95rem;
  }

  .ans-letter {
    display: inline-block;
    background: var(--correct);
    color: white;
    padding: 0.1rem 0.6rem;
    border-radius: 2px;
    margin-right: 0.5rem;
    font-size: 0.85rem;
  }

  .analysis-text {
    color: var(--ink);
    margin-bottom: 0.5rem;
  }

  .ext-text {
    font-size: 0.88rem;
    color: var(--muted);
    padding-top: 0.5rem;
    border-top: 1px dotted var(--line);
    margin-top: 0.5rem;
    font-family: var(--sans);
  }

  .ext-text::before {
    content: "✻ ";
    color: var(--accent);
  }

  footer {
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid var(--line);
    text-align: center;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 0.85rem;
  }

  /* 載入中狀態 */
  .loading {
    text-align: center;
    color: var(--muted);
    padding: 4rem 0;
    font-family: var(--sans);
  }

  /* 首頁 */
  .home-card {
    background: var(--panel);
    padding: 3rem;
    border-left: 4px solid var(--accent);
    margin-bottom: 2rem;
  }

  .home-card h2 {
    font-size: 1.8rem;
    margin-bottom: 1rem;
    letter-spacing: 0.05em;
  }

  .home-card p {
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .home-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-top: 2rem;
    padding: 1.5rem;
    background: var(--accent-soft);
    border-radius: 4px;
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-size: 2rem;
    font-weight: 600;
    color: var(--accent);
    font-family: var(--sans);
  }

  .stat-label {
    font-size: 0.85rem;
    color: var(--muted);
    font-family: var(--sans);
    letter-spacing: 0.05em;
  }

  /* 響應式：選單始終保持在左側，僅縮窄 */
  @media (max-width: 900px) {
    .layout { grid-template-columns: 180px 1fr; }
    aside { padding: 1.5rem 0; }
    aside h1 { font-size: 0.95rem; padding: 0 1rem 1rem; }
    .menu li a { padding: 0.5rem 1rem; font-size: 0.85rem; }
    main { padding: 2rem 1.5rem; }
    .home-card { padding: 2rem; }
  }
  @media (max-width: 600px) {
    .layout { grid-template-columns: 140px 1fr; }
    aside h1 { font-size: 0.85rem; padding: 0 0.75rem 0.75rem; }
    .menu li a { padding: 0.4rem 0.75rem; font-size: 0.8rem; }
    main { padding: 1.5rem 1rem; }
    .round-header h2 { font-size: 1.5rem; }
  }

  /* 列印樣式 */
  @media print {
    aside { display: none; }
    .layout { grid-template-columns: 1fr; }
  }
</style>
</head>

  <aside>

    <ul class="menu" id="menu">
      <li><a data-round="0" class="active">首頁</a></li>
    </ul>
  </aside>

  <main id="main">

</div>

<script id="embedded-data" type="application/json">{"1": [{"num": 1, "content": "臺灣在春、夏交會時，天氣常是陰雨綿綿，稱為梅雨季節，這是因為受什麼天氣 系統影響？ (Ａ)颱風 (Ｂ)暖鋒 (Ｃ)滯留鋒 (Ｄ)冷鋒。", "ans": "C", "topic": "天氣系統", "analysis": "梅雨季是春夏交替時，冷暖氣團勢均力敵，形成的鋒面長時間停滯在台灣上空，稱為『滯留鋒』，造成連日陰雨。颱風屬於熱帶氣旋；暖鋒和冷鋒通常會移動不會停留。", "ext": "延伸：冷鋒過境後氣溫驟降；暖鋒過境後氣溫上升。"}, {"num": 2, "content": "下列哪一種植物的葉子特化成捕蟲囊，可以捕食昆蟲？ (Ａ)仙人掌 (Ｂ)豬籠草 (Ｃ)林投樹 (Ｄ)槭葉牽牛。", "ans": "B", "topic": "植物適應環境", "analysis": "豬籠草是典型的食蟲植物，葉尖特化成具有消化液的捕蟲囊，用來補充氮素。仙人掌葉特化為刺以減少水分蒸散，不是捕蟲。", "ext": "常見食蟲植物：毛氈苔、捕蠅草、豬籠草皆為葉的特化。"}, {"num": 3, "content": "竹竿的影子在西南方時，表示太陽此時在哪一個方位？ (Ａ)西南方 (Ｂ)東北方 (Ｃ)西北方 (Ｄ)東南方。", "ans": "B", "topic": "太陽方位與影子", "analysis": "影子方向與太陽方位相反。影子在西南方，表示太陽在東北方。", "ext": "記憶法：太陽照射方向的反方向就是影子延伸方向。"}, {"num": 4, "content": "下列哪一個不適合做為植物分類的依據？ (Ａ)繁殖方法 (Ｂ)美觀程度 (Ｃ)生長環境 (Ｄ)構造特徵。", "ans": "B", "topic": "植物分類", "analysis": "植物分類應依據客觀、可量化的特徵，如繁殖方法、生長環境、構造特徵。『美觀程度』屬主觀判斷，不適合作為分類依據。", "ext": "科學分類首重客觀、可重現、可量化。"}, {"num": 5, "content": "下列哪一種食品是利用黴菌製成的？ (Ａ)果汁 (Ｂ)豆腐乳 (Ｃ)奶粉 (Ｄ)米粉。", "ans": "B", "topic": "微生物與食品", "analysis": "豆腐乳是利用黴菌（如毛黴）發酵而成。果汁由水果榨取，奶粉由牛奶乾燥製成，米粉由米磨漿製成，皆與黴菌無關。", "ext": "黴菌製品：味噌、醬油、豆瓣醬、藍紋乳酪。"}, {"num": 6, "content": "找到「北斗七星」之後，以杓口兩顆星的距離為單位，再從杓口第 1 顆星出發， 向外延伸約幾倍的距離，就可以找到北極星？ (Ａ) 4 倍 (Ｂ)5 倍 (Ｃ)6 倍 (Ｄ) 7 倍。", "ans": "B", "topic": "星座辨識", "analysis": "找北極星：以北斗七星杓口兩顆星（天樞與天璇）的距離為單位，自杓口第 1 顆星（天樞）向外延伸 5 倍，即可找到北極星。", "ext": "北極星位於小熊座尾端，為天空中幾乎不動的星。"}, {"num": 7, "content": "觀察旗杆影子的長短變化，一天中的什麼時候影子會最短？ (Ａ)清晨 (Ｂ)中午 (Ｃ)下午 (Ｄ)傍晚。", "ans": "B", "topic": "影子變化", "analysis": "影子長度與太陽高度角相關。中午太陽位置最高（高度角最大），影子最短；清晨與傍晚太陽位置低，影子最長。", "ext": "夏至中午影子最短，冬至中午影子最長（北半球中緯度）。"}, {"num": 8, "content": "一年中，小佑分別在 4 月 20 日和 6 月 20 日的晚上 9 時、相同方向觀察同一星座 ，會發現星座的位置有何變化？ (Ａ)由東向西移動了 (Ｂ)由西向東移動了 (Ｃ)由南向北移動了 (Ｄ)由北向南移動了", "ans": "A", "topic": "星座週日視運動", "analysis": "同一時刻觀察同一星座，每月約向西移動 30 度（即『由東向西』）。兩個月後，4 月 20 日的位置比 6 月 20 日靠東，因此星座會由東向西移動了。", "ext": "這是地球公轉造成的『周年視運動』。"}, {"num": 9, "content": "水銀溫度計是利用什麼原理或現象來測量溫度的？ (Ａ)虹吸現象 (Ｂ)毛細現象 (Ｃ)磁力作用 (Ｄ)熱脹冷縮。", "ans": "D", "topic": "熱脹冷縮", "analysis": "水銀溫度計內的水銀受熱體積膨脹，沿毛細管上升；溫度降低時水銀收縮下降。其原理是『熱脹冷縮』。", "ext": "氣體熱脹冷縮效應最明顯，固體最小。"}, {"num": 10, "content": "臺灣容易有地震發生，與下列哪些板塊的活動有密切關聯？ (Ａ)歐亞板塊、太平洋板塊 (Ｂ)菲律賓海板塊、歐亞板塊 (Ｃ)太平洋板塊、菲律賓海板塊 (Ｄ)歐亞板塊、印澳板塊。", "ans": "B", "topic": "板塊構造", "analysis": "台灣位於菲律賓海板塊與歐亞板塊交界處，菲律賓海板塊向西北擠壓歐亞板塊，造成頻繁的地震與造山運動。", "ext": "花東縱谷即為兩板塊縫合線。"}, {"num": 11, "content": "進行「氣體受熱後的體積變化」實驗時，將錐形瓶放入溫水中，瓶口的氣球會出 現了什麼變化？ (Ａ)膨脹變大 (Ｂ)變扁 (Ｃ)變紅色 (Ｄ)以上都有可能。", "ans": "A", "topic": "氣體熱脹冷縮", "analysis": "氣體受熱體積膨脹，錐形瓶內的空氣受熱膨脹，會將氣球推大（膨脹變大）。", "ext": "氣體膨脹程度在三態中最為顯著。"}, {"num": 12, "content": "電風扇通電後扇葉可以轉動，主要是因為下列哪一種構造？ (Ａ)馬達 (Ｂ)橡皮筋 (Ｃ)迴紋針 (Ｄ) LED 燈。 1", "ans": "A", "topic": "電的轉換", "analysis": "電風扇利用馬達將電能轉換為機械能（轉動），帶動扇葉。", "ext": "常見電動裝置：馬達（電→動）、喇叭（電→聲）、燈泡（電→光熱）。"}, {"num": 13, "content": "欣羽和小潔在相同桌面上進行推硬幣比賽，欣羽的硬幣從起點移動到終點花了 4 秒；小潔的硬幣從起點移動到終點花了 2 秒，誰的施力比較大？ (Ａ)欣羽 (B)小潔 (Ｃ)一樣大 (Ｄ)無法判斷。", "ans": "B", "topic": "力與運動", "analysis": "在相同距離下，花費時間越短代表速度越快。要產生較大速度須施加較大的力，因此小潔（2 秒）的施力較大。", "ext": "前提條件是起點相同、桌面條件相同，符合受控實驗原則。"}, {"num": 14, "content": "下列哪一種物品不是由礦物所製成的？ (Ａ)金飾項鍊 (Ｂ)木頭地板 (Ｃ)鐵架 (Ｄ)硬幣。", "ans": "B", "topic": "礦物與岩石", "analysis": "金飾、鐵架、硬幣均由金屬礦物加工製成。木頭地板來自樹木（生物），不是礦物。", "ext": "礦物的定義是『天然、無機、固態、具一定化學組成與結晶構造』。"}, {"num": 15, "content": "下列哪一種方法可以讓電磁鐵的 N、S 極互相交換？ (Ａ)增加電池數量 (Ｂ)改變電池正負極的位置 (Ｃ)增加纏繞線圈的數量 (Ｄ)線圈內再多放一根鐵棒。", "ans": "B", "topic": "電磁鐵", "analysis": "電磁鐵的南北極由電流方向決定。改變電池正負極 = 改變電流方向 = N、S 極對調。增加電池或線圈數只會影響磁力大小。", "ext": "安培右手定則可判斷磁極。"}, {"num": 16, "content": "自製簡易樂器，對裝著半瓶水的玻璃瓶瓶口吹氣，發聲原理和何者相似？ (Ａ)自製吉他 (B)吸管笛 (Ｃ)自製鼓 (Ｄ)以上皆是。", "ans": "B", "topic": "聲音產生", "analysis": "吹玻璃瓶口是靠振動瓶內『空氣柱』發聲，與吸管笛相同原理。吉他是振動弦，鼓是振動鼓面。", "ext": "樂器發聲三大類：弦振動、膜振動、氣柱振動。"}, {"num": 17, "content": "在秋天的夜晚，適合利用哪一個星座來找北極星？ (Ａ)仙女座 (Ｂ)仙王座 (Ｃ)英仙座 (Ｄ)仙后座。", "ans": "D", "topic": "秋夜星座", "analysis": "秋天夜晚北斗七星低於地平線，此時可利用仙后座（W 形）找北極星：將 W 中間兩邊的延長線交會點，與中間頂點連線延伸約 5 倍即為北極星。", "ext": "春夏用北斗七星、秋冬用仙后座找北極星。"}, {"num": 18, "content": "空氣中的水蒸氣遇冷形成小水滴，懸浮在地面附近，我們稱它為 (Ａ)雲 (Ｂ)露 (Ｃ)霧 (Ｄ)霜。", "ans": "C", "topic": "水循環現象", "analysis": "水蒸氣遇冷凝結為小水滴，懸浮在地面附近為『霧』；形成於空中為『雲』；附著在葉面為『露』；在低溫下直接凝華為冰晶為『霜』。", "ext": "辨識關鍵：高度（地面 vs 空中）、形態（液態 vs 固態）。"}, {"num": 19, "content": "使用動滑輪時，計算施力的大小前應注意下列哪一項？ (Ａ)只需測量重物的重量 (Ｂ)要測量重物＋滑輪的重量 (Ｃ)要測量重物＋彈簧秤的重量 (Ｄ)要測量重物＋滑輪的重量＋彈簧秤的重量", "ans": "B", "topic": "動滑輪", "analysis": "動滑輪會隨重物一起移動，施力須同時支撐重物與滑輪本身的重量，因此計算時要包含『重物 + 滑輪』。", "ext": "理想動滑輪可省一半力，但需移動 2 倍距離（功守恆）。"}, {"num": 20, "content": "下列哪一種水溶液的酸鹼性和其他三種不同？ (Ａ)石灰水 (Ｂ)氨水 (Ｃ)小蘇打水 (Ｄ)食鹽水。", "ans": "D", "topic": "酸鹼性", "analysis": "石灰水、氨水、小蘇打水皆為鹼性；食鹽水由強酸強鹼中和產生，為中性，因此與其他三者不同。", "ext": "中性水溶液：水、食鹽水、糖水。"}, {"num": 21, "content": "下列有關黴菌的敘述，哪一項錯誤？ (Ａ)在顯微鏡下可觀察到菌絲 (Ｂ)利用種子繁殖 (Ｃ)喜歡生活在陰暗潮溼的環境 (Ｄ)人類發現最早的抗生素─盤尼西林，是由青黴菌萃取製成。", "ans": "B", "topic": "黴菌特徵", "analysis": "黴菌屬於真菌，利用『孢子』繁殖，不是種子。菌絲、喜潮溼環境、盤尼西林來源皆為正確敘述。", "ext": "孢子繁殖：黴菌、蕨類、苔蘚、蘑菇。"}, {"num": 22, "content": "鳥類揮動翅膀可以飛翔，牠們是利用哪些部位的配合完成運動的？ (Ａ)肌肉和關節 (Ｂ)骨骼和肌肉 (Ｃ)骨骼和關節 (Ｄ)骨骼、肌肉和關節。", "ans": "D", "topic": "運動系統", "analysis": "動物完成運動需要骨骼（支架）、肌肉（動力）、關節（活動處）三者配合，缺一不可。", "ext": "肌肉收縮拉動骨骼，於關節處產生動作。"}, {"num": 23, "content": "天狼星和下列哪一顆星球一樣，都是恆星？ (Ａ)地球 (Ｂ)月球 (Ｃ)火星 (Ｄ)太陽。", "ans": "D", "topic": "恆星辨識", "analysis": "恆星會自行發光發熱，如太陽、天狼星。地球、火星為行星，月球為衛星，皆需反射太陽光才能被看見。", "ext": "夜空中『恆星』固定不動、『行星』會在星座間緩慢移動。"}, {"num": 24, "content": "一年之中，從 1 月到 12 月的每天中午 12 時，太陽高度角會如何變化？ (Ａ)由小到大 (Ｂ)由大到小 (Ｃ)由小到大、再由大到小 (Ｄ)由大到小、再由小到大。", "ans": "C", "topic": "太陽高度角變化", "analysis": "北半球中午太陽高度角從 1 月（冬季，小）逐漸增加至 6 月夏至（最大），再逐漸下降至 12 月冬至（最小），呈現『由小到大、再由大到小』。", "ext": "夏至高度角最大、冬至最小（北回歸線以北）。"}, {"num": 25, "content": "瑋瑋測量太陽高度角時，測得角度為 30 度，此時可能是幾點？ (Ａ)上午 8 點 (Ｂ)上午 11 點 (Ｃ)下午 1 點 (Ｄ)晚上 9 點。", "ans": "A", "topic": "太陽高度角", "analysis": "太陽高度角 30 度屬較低位置，常見於接近日出或日落時，因此上午 8 點（太陽剛升起不久）最合理。中午高度角接近最大值，晚上看不到太陽。", "ext": "台灣中午太陽高度約 40〜90 度之間視季節而定。"}, {"num": 26, "content": "在天空中飄呀飄，如棉絮般的白雲，是由下列哪些物質組成？ (Ａ)露水 (Ｂ)小水滴或冰晶 (Ｃ)塵埃 (Ｄ)水蒸氣。 2", "ans": "B", "topic": "雲的組成", "analysis": "雲是空氣中的水蒸氣遇冷凝結成的『小水滴或冰晶』懸浮在高空所形成。水蒸氣本身透明不可見。", "ext": "高空氣溫低時凝結為冰晶（如卷雲）、溫度高時為水滴（如積雲）。"}, {"num": 27, "content": "影響臺灣天氣的氣團中，來自太平洋地區氣團的特性為 (Ａ)寒冷、乾燥 (B)溫暖、乾燥 (Ｃ)溫暖、潮溼 (Ｄ)寒冷、潮溼。", "ans": "C", "topic": "氣團特性", "analysis": "太平洋氣團源自熱帶海洋，具備『溫暖、潮溼』特性，主要影響台灣夏季。寒冷乾燥的氣團來自大陸西伯利亞。", "ext": "氣團特性取決於源地（冷/暖、海/陸）。"}, {"num": 28, "content": "媽媽正在煮一鍋湯，如果不加蓋子一直煮，湯會有什麼變化？ (Ａ)會愈煮愈少 (Ｂ)會愈煮愈多 (Ｃ)怎麼煮都不變 (Ｄ)會愈煮溫度愈低。", "ans": "A", "topic": "蒸發現象", "analysis": "不加蓋煮湯，水分持續受熱蒸發散逸到空氣中，湯量會越煮越少。", "ext": "加蓋可減少水蒸氣逸散，防止湯汁變少。"}, {"num": 29, "content": "關於消化管的敘述何者錯誤？ (Ａ)食道藉著管壁的運動，讓食物快速的往胃移動 (Ｂ)口腔中有牙齒，可咬碎食物，利於吞嚥 (Ｃ)小腸是一條長管子，可儲存食物 (Ｄ)大腸能吸收剩餘的水分。", "ans": "C", "topic": "消化系統", "analysis": "小腸主要功能是『消化與吸收養分』，並非儲存食物。儲存食物是胃的功能。", "ext": "小腸內壁的絨毛可擴大吸收面積。"}, {"num": 30, "content": "只使用藍色石蕊試紙的情況下，可以檢測出下列哪一種水溶液的酸鹼性呢？ (Ａ)糖水 (Ｂ)白醋 (Ｃ)石灰水 (Ｄ)小蘇打水。", "ans": "B", "topic": "酸鹼檢測", "analysis": "藍色石蕊試紙遇『酸性』會變紅；選項中只有白醋是酸性，石灰水和小蘇打水為鹼性（用紅色石蕊檢測），糖水為中性（無反應）。", "ext": "藍變紅→酸；紅變藍→鹼。"}, {"num": 31, "content": "在「改變電磁鐵的磁力」實驗中，要測試串聯不同電池數對磁力的影響時，下列 哪一項可以當作操作變因？ (Ａ)改變漆包線纏繞的圈數 (Ｂ)改變吸管的顏色 (Ｃ)改變電池數量 (Ｄ)改變電池的廠牌。", "ans": "C", "topic": "實驗變因", "analysis": "測試『電池數量』對磁力的影響時，電池數量為操作變因（要改變的項目）；線圈數、吸管顏色、電池廠牌應固定為控制變因。", "ext": "實驗三變因：操作、控制、應變。"}, {"num": 32, "content": "杰倫在校園中找到一種植物，會開花，還有如下圖的葉片，它應屬於哪一類植物 ？ (Ａ)蕨類 (Ｂ)裸子植物 (Ｃ)雙子葉植物 (Ｄ)單子葉植物。", "ans": "C", "topic": "植物分類", "analysis": "會開花即為開花植物（被子植物）；再依葉脈判別：網狀脈為雙子葉，平行脈為單子葉。題目葉片為網狀脈，屬雙子葉。", "ext": "雙子葉植物多為木本；單子葉多為草本。"}, {"num": 33, "content": "有關觀察涼亭的影子變化，下列哪一項是正確的？ (Ａ)夏天中午測得的影子跟冬天中午測得的影子方位一樣 (Ｂ)夏天中午測得的影子跟冬天中午測得的影子一樣長 (Ｃ)夏天和冬天，中午 12 時測得的影子都是一天當中最短的 (Ｄ)夏天中午測得的影子較長，冬天中午測得的影子較短。", "ans": "C", "topic": "影子與季節", "analysis": "不論季節，中午（太陽高度角最大）時影子都是一天中最短的。夏冬差異在於影子長度：夏短冬長。", "ext": "夏至正午影子可短到幾乎沒有（接近直射點時）。"}, {"num": 34, "content": "小丸子在載玻片上寫「pd」後放在解剖顯微鏡下觀察，她所看到的影像為下列何 者？（不計放大倍率） (Ａ)pd (Ｂ)qb (Ｃ)pb (Ｄ)qd。", "ans": "A", "topic": "顯微鏡成像", "analysis": "解剖顯微鏡是『實體顯微鏡』，不會將影像倒轉，看到的影像仍為 pd（複式顯微鏡才會上下左右顛倒變 pb→qd 的變化）。", "ext": "解剖顯微鏡：正立像；複式顯微鏡：倒立像。"}, {"num": 35, "content": "小明做了一個保溫設計：「把要保溫的東西放入小塑膠桶中加蓋，再用棉被覆蓋 住。」關於此一設計，下列那一項評語正確？ (Ａ)不管要保溫的東西比室溫冷或熱，棉被可使溫度的變化減小 (Ｂ)此設計對於「冰」無效，蓋棉被反而融化得更快 (Ｃ)加棉被會使溫度上升，故只適用於想使溫度提升的情況的效果相同 (Ｄ)蓋不蓋棉被都一樣，因為只要塑膠桶一加蓋，熱量就傳不出來。", "ans": "A", "topic": "熱傳導與保溫", "analysis": "棉被具隔熱效果，可減緩熱量進出。不論物體比室溫熱或冷，棉被都能減慢溫度變化，因此保冷保熱皆適用。", "ext": "熱傳導方向：高溫→低溫，棉被阻擋這個流向。"}, {"num": 36, "content": "吳怡老師很愛吃香菇，關於香菇的敘述何者正確？ (Ａ)可行光合作用 (Ｂ)屬於植物 (Ｃ)可用孢子繁殖 (Ｄ)沒有細胞壁。 3", "ans": "C", "topic": "真菌特性", "analysis": "香菇屬真菌，不能行光合作用、不屬於植物，但細胞壁為幾丁質，且用『孢子』繁殖。", "ext": "真菌五界分類獨立：非動物、非植物。"}, {"num": 37, "content": "試在下表中找到冷鋒到達的時間可能是什麼時候？ 日期 第1天 第2天 第3天 第4天 第5天 第6天 第7天 第8天 風速(級) 4 4 7 7 4 4 4 4 天氣狀況 多雲 多雲 雨 陰 多雲 多雲 晴 晴 最 16 15 12 13 14 17 18 18 高 氣溫 最 13 12 6 8 12 13 12 12 低 (Ａ)第 1 天與第 2 天之間 (Ｂ)第 2 天與第 3 天之間 (Ｃ)第 4 天與第 5 天之間 (Ｄ)第 6 天與第 7 天之間。", "ans": "B", "topic": "冷鋒判斷", "analysis": "冷鋒過境特徵：風速增強、氣溫驟降、降雨。第 3 天風速由 4→7 級、氣溫由 15→12、天氣由多雲轉雨，顯示冷鋒在第 2 天與第 3 天之間到達。", "ext": "冷鋒：氣溫陡降、風速加強、常伴降雨。"}, {"num": 38, "content": "關於動滑輪的使用，下列敘述何者正確？ (Ａ)使用動滑輪可以達到省時的目的 (Ｂ)使用動滑輪拉動繩子 5 公分，則物體會上升 10 公分 (Ｃ)使用動滑輪時，繩子拉動的方向與物體上升的方向相反 (Ｄ)使用 2 公斤的動滑輪，可用 9 公斤重的力量拉動 16 公斤重的物體。", "ans": "D", "topic": "動滑輪省力", "analysis": "動滑輪可省一半力但費 2 倍距離。拉 5 公分物體上升 2.5 公分；施力方向與物體上升方向『相同』。16 公斤物體加 2 公斤動滑輪共 18 公斤，施力 9 公斤合理（D 正確）。", "ext": "『省力必費時』是簡單機械的通則（功守恆）。"}, {"num": 39, "content": "小哲喜歡吹奏薩克斯風。當他吹氣使該樂器發出聲音時，會發生哪一種情形？ (Ａ)空氣從外界流至胸腔 (Ｂ)橫膈位置逐漸下降 (Ｃ)肋骨位置逐漸上舉 (Ｄ)胸腔體積逐漸變小。", "ans": "D", "topic": "呼吸系統", "analysis": "吹奏樂器是吐氣：橫膈上升、肋骨下降、胸腔體積變小、空氣由肺部排出至外界。", "ext": "吸氣：橫膈下降、肋骨上舉；吐氣反之。"}, {"num": 40, "content": "潯陽江上送客的白居易「忽聞水上琵琶聲」。白居易聽到聲音的方式和下列哪一 個相同？ (Ａ)水上芭蕾舞者在水中隨音樂起舞 (Ｂ)春雷響起 (Ｃ)教練指導著潛入水中的游泳選手 (Ｄ)趴在桌上聽到敲打桌邊的聲音。", "ans": "B", "topic": "聲音傳遞介質", "analysis": "白居易在船上（空氣中）聽到水上琵琶聲 → 聲音經『空氣』傳播。春雷也是空氣傳聲。水中傳聲、桌面傳聲屬於液體、固體介質。", "ext": "聲速：固>液>氣。"}, {"num": 41, "content": "下列有關蚊子的敘述，下列何者錯誤？ (Ａ)幼蟲是孑孓，要經過蛹期才會變成蚊 (Ｂ)屬於節肢動物門 (Ｃ)具有一對翅，可用來飛翔 (Ｄ)生殖方式為體外受精，卵生。", "ans": "D", "topic": "昆蟲特徵", "analysis": "蚊子為昆蟲，繁殖為『體內受精』後產卵，並非體外受精。其他三項敘述皆正確（幼蟲孑孓、節肢動物、一對翅膀）。", "ext": "體外受精常見於魚類、兩生類。"}, {"num": 42, "content": "小愛最愛吃外婆家的橘子，她想種出和外婆家一樣又大又甜的橘子，可用下列哪 一個構造來繁殖？ (Ａ)一個果實 (Ｂ)一段枝條 (Ｃ)一顆種子 (Ｄ)一些花粉。 二、題組題 第43.～45.為題組 植物通常透過開花結果來繁衍，而我們常見的竹子卻不會開花，它是透過地下莖來進行繁衍後代 的任務。竹子地下莖上有節，節點處有芽點，芽點會發新芽，就是我們常見的竹筍，香蕉也是利 用地下莖所冒出的新植株來進行繁殖。如果不去摘採，這些冒出頭的竹筍就會漸漸長成竹子。如 果有一天我們發現竹子開花了，那表示這棵竹子可能快要死亡了。", "ans": "B", "topic": "無性繁殖", "analysis": "要保留親本優良特性（大又甜），應用『營養繁殖』（一段枝條扦插/嫁接）。用種子會因基因重組而性狀改變。", "ext": "無性繁殖（扦插、嫁接、壓條）可保留親本特性。"}, {"num": 43, "content": "竹子透過下列哪一個部位來繁衍？ (Ａ)地下莖 (Ｂ)果實 (Ｃ)葉子 (Ｄ)根。 4", "ans": "A", "topic": "題組 - 竹子繁殖", "analysis": "依文章敘述，竹子透過地下莖上的芽點發出新芽（竹筍）進行無性繁殖。", "ext": "無性繁殖構造：地下莖（竹）、匍匐莖（草莓）。"}, {"num": 44, "content": "下列哪一種植物繁殖的方式和竹子一樣？ (Ａ)大花咸豐草 (Ｂ)椰子 (Ｃ)萬年青 (Ｄ)木瓜。", "ans": "C", "topic": "題組 - 類似繁殖方式", "analysis": "萬年青可用『根莖』進行無性繁殖，與竹子透過地下莖相同。大花咸豐草、椰子、木瓜皆靠種子繁殖。", "ext": "靠地下莖繁殖：竹、香蕉、薑、蓮藕。"}, {"num": 45, "content": "竹子的地下莖為什麼會長出新芽？ (Ａ)因為地下莖會長出根 (Ｂ)因為地下莖上有芽點 (Ｃ)因為地下莖快要死亡 (Ｄ)因為地下莖會開花。 5", "ans": "B", "topic": "題組 - 芽點", "analysis": "地下莖的節上有『芽點』，芽點發育成新芽（竹筍）。此為植物營養繁殖的關鍵構造。", "ext": "芽點也見於馬鈴薯（塊莖的凹陷處）。"}], "2": [{"num": 1, "content": "觀察上午、中午和下午的影子，下列哪一個結論是錯誤的？ (Ａ)方位不同 (Ｂ)長度不同 (Ｃ)位置不同 (Ｄ)形成原因不同。", "ans": "D", "topic": "影子變化", "analysis": "上午、中午、下午的影子方位和長度都會隨太陽位置變化而不同；但形成原因皆相同——『光遇不透明物體被遮擋』。", "ext": "影子三要素：光源、物體、屏幕。"}, {"num": 2, "content": "北極星可以用來辨認方位的原因是什麼？ (Ａ)傍晚由東方升起，清晨由西方落下 (Ｂ)是全天域最亮的星 (Ｃ)位置幾乎不會改變，都在北方天空 (Ｄ)是最靠近地球的星。", "ans": "C", "topic": "北極星定位", "analysis": "北極星位於地球自轉軸延伸線上，位置幾乎不變，永遠在正北方天空，因此可用來辨認方位。", "ext": "北極星並非最亮的星，而是『位置最固定』的星。"}, {"num": 3, "content": "岩石會受到外力影響而碎裂成細小的顆粒，下列哪一項不會直接造成岩石碎裂？ (Ａ)溫度的變化 (Ｂ)月光照射 (Ｃ)風的吹襲 (Ｄ)流水的衝擊。", "ans": "B", "topic": "風化作用", "analysis": "岩石碎裂的外力主要包括：溫度變化（熱脹冷縮）、風吹、流水衝擊。月光能量極低，不足以造成岩石碎裂。", "ext": "風化分物理風化與化學風化。"}, {"num": 4, "content": "關於力的敘述，下列何者正確？ (Ａ)物體受力後可能會改變形狀 (Ｂ)物體受力後不會改變形狀 (Ｃ)物體受力後不會改變運動狀態 (Ｄ)物體受力後運動方向一定會改變。", "ans": "A", "topic": "力的作用", "analysis": "力可改變物體的『形狀』與『運動狀態』（速度、方向），但不必然造成變化。只有 A『可能改變形狀』為正確敘述。", "ext": "力的效果：改變形狀 / 改變運動狀態。"}, {"num": 5, "content": "哪一種動物每當遇到危險或驚嚇時，就會散發出難聞的氣味讓敵人不敢靠近？ (Ａ)樺斑蝶幼蟲 (Ｂ)椿象 (Ｃ)河豚 (Ｄ)寄居蟹。", "ans": "B", "topic": "動物禦敵", "analysis": "椿象遇敵時會從臭腺分泌具刺激性氣味的液體，俗稱『放屁蟲』。", "ext": "動物禦敵方式：擬態、警戒色、臭液、噴墨。"}, {"num": 6, "content": "要清楚的描述星星的位置，需同時說明星星的 (Ａ)顏色和大小 (Ｂ)星等和顏色 (Ｃ)大小和方位 (Ｄ)方位和高度角。", "ans": "D", "topic": "天體定位", "analysis": "描述星星位置需『方位』（東西南北）+『高度角』（距地平線的仰角）兩項資料，才能唯一決定天球上的位置。", "ext": "類似 GPS 需經度和緯度兩個座標。"}, {"num": 7, "content": "一天中，下列哪一個時刻的竿影最短？ (Ａ)太陽剛升起時 (Ｂ)中午 12 時 (Ｃ)下午 2 時 (Ｄ)下午 4 時。", "ans": "B", "topic": "太陽高度與影長", "analysis": "中午太陽高度角最大，竿影最短。清晨、下午太陽位置低，影子較長。", "ext": "影長與 tan(高度角) 成反比。"}, {"num": 8, "content": "鐵生鏽需要什麼條件？ (Ａ)陽光和空氣 (Ｂ)氧氣和水 (Ｃ)陽光和水 (Ｄ)二氧化碳和水。", "ans": "B", "topic": "氧化反應", "analysis": "鐵生鏽（鏽蝕）是鐵與『氧氣』與『水』共同作用的氧化反應，兩者缺一不可。", "ext": "防鏽方法：鍍層、塗油、電鍍、不鏽鋼。"}, {"num": 9, "content": "下列哪一個是屬於動物的育幼行為？ (Ａ)雄鹿打鬥 (Ｂ)蜘蛛吐絲結網 (Ｃ)母羊分泌乳汁哺餵小羊 (Ｄ)樺斑蝶吸食花蜜", "ans": "C", "topic": "動物行為", "analysis": "育幼行為指親代照顧後代的行為，如哺乳、築巢護雛。母羊哺乳為典型育幼行為。", "ext": "動物行為分：求偶、育幼、防禦、覓食。"}, {"num": 10, "content": "物體振動的情形愈大，產生的聲音就會如何？ (Ａ)愈大 (Ｂ)愈小 (Ｃ)不會改變 (Ｄ)忽大忽小。", "ans": "A", "topic": "聲音大小", "analysis": "物體振動幅度（振幅）越大，聲音越響。振動快慢（頻率）決定聲音高低。", "ext": "振幅=音量；頻率=音高。"}, {"num": 11, "content": "下列哪一種情況，指北針的指針不會偏轉？ (Ａ)通電的線圈靠近指北針 (Ｂ)通電的電磁鐵靠近指北針 (Ｃ)將木棒靠近指北針 (Ｄ)將通電的電線放在指北針上方。", "ans": "C", "topic": "電與磁", "analysis": "通電導線、線圈、電磁鐵周圍有磁場，會使指北針偏轉。木棒不帶電也不具磁性，不會造成偏轉。", "ext": "奧斯特實驗：電生磁的首次證實。"}, {"num": 12, "content": "生活中有很多關於用力的例子，下列哪一種現象不包括在內？ (Ａ)運球上籃 (Ｂ)蠟燭燃燒 (Ｃ)射飛鏢 (Ｄ)彈橡皮筋。", "ans": "B", "topic": "力的應用", "analysis": "蠟燭燃燒是化學反應（氧化），不屬於『施力』現象。運球、射飛鏢、彈橡皮筋皆涉及施力。", "ext": "力的判斷：是否造成形變或運動變化。"}, {"num": 13, "content": "政府制定的噪音管制法，噪音判斷的依據是 (Ａ)聲音高低 (Ｂ)聲音節奏 (Ｃ)音量大小 (Ｄ)聲音是否輕快。", "ans": "C", "topic": "噪音判定", "analysis": "噪音依『音量大小（分貝）』判定，超過法定分貝即為違規。", "ext": "噪音計量單位為分貝（dB）。"}, {"num": 14, "content": "對物體用力的時候，物體可能發生的變化不包括下列哪一種？ (Ａ)形狀會改變 (Ｂ)運動的速度會改變 (Ｃ)運動的方向會改變 (Ｄ)顏色會改變。 6", "ans": "D", "topic": "力的效應", "analysis": "力可改變物體形狀、速度、方向，但『顏色』是物質本身的光學性質，與施力無關。", "ext": "顏色變化通常由化學變化引起。"}, {"num": 15, "content": "利用棉線聯繫兩個紙杯，從紙杯的一邊說話可以從另一紙杯裡聽到，是利用什麼 來傳播聲音？ (Ａ)空氣 (Ｂ)水 (Ｃ)棉線 (Ｄ)水蒸氣。", "ans": "C", "topic": "聲音傳播介質", "analysis": "紙杯電話是利用『棉線（固體）』振動傳遞聲音，固體傳聲效率比空氣更好。", "ext": "聲速：固>液>氣；真空不傳聲。"}, {"num": 16, "content": "許多廚具都會利用木頭或塑膠材質來製作握把，主要是因為這些材質有哪一種特 質？ (Ａ)防水效果好 (Ｂ)不易導電 (Ｃ)傳熱效果比較差 (Ｄ)傳熱效果比較好。", "ans": "C", "topic": "熱傳導", "analysis": "木頭、塑膠為熱的不良導體（傳熱效果差），可防止熱傳到手部。", "ext": "金屬為良導體；木、塑膠、橡膠為不良導體。"}, {"num": 17, "content": "下列哪一種動物的後肢肌肉強而有力，所以擅長跳躍？ (Ａ)兔子 (Ｂ)雞 (Ｃ)蝸牛 (Ｄ)獅子。", "ans": "A", "topic": "動物運動", "analysis": "兔子後肢肌肉發達，擅長跳躍。雞擅走、獅子擅奔跑、蝸牛爬行，皆非跳躍型。", "ext": "跳躍型動物：兔、袋鼠、蝗蟲、青蛙。"}, {"num": 18, "content": "下列哪一種生物不是屬於臺灣特有種？ (Ａ)臺灣藍鵲 (Ｂ)臺灣野山羊 (Ｃ)黑面琵鷺 (Ｄ)臺灣山椒魚。", "ans": "C", "topic": "特有種辨識", "analysis": "黑面琵鷺是冬季來台度冬的候鳥，全球族群分布於東亞，非台灣特有種。其餘三者皆為台灣特有種。", "ext": "特有種：僅分布於某地區的物種。"}, {"num": 19, "content": "使用開瓶器時，手握的地方愈靠近開瓶器把手的前端，會有什麼效果？ (Ａ)愈省力 (Ｂ)完全不需用力 (Ｃ)愈費力 (Ｄ)不一定。", "ans": "C", "topic": "槓桿原理", "analysis": "開瓶器屬槓桿，施力臂越長越省力。手握越靠近把手前端（靠近施力點離支點遠），施力臂變短，反而費力。", "ext": "省力槓桿：施力臂 > 抗力臂。"}, {"num": 20, "content": "關於深淺色杯的吸熱效果，下列敘述哪一個正確？ (Ａ)淺色杯較不易吸收輻射熱 (Ｂ)深色杯較易反射輻射熱 (Ｃ)深色杯較不易吸收輻射熱 (Ｄ)淺色杯較不易反射輻射熱。", "ans": "A", "topic": "輻射熱吸收", "analysis": "深色物體吸收輻射熱多、反射少；淺色反射輻射熱多、吸收少。因此淺色杯『較不易吸收』輻射熱。", "ext": "夏天穿淺色衣服較涼。"}, {"num": 21, "content": "下列關於星座盤的使用方法，何者正確？ (Ａ)觀察北方天空時，要先面向南方 (Ｂ)要將星座盤上的日期與觀測時間對準 (Ｃ)將星座盤高舉過頭後，盤面要翻轉到另一面 (Ｄ)如果對照不到星星，可以將星座盤左右轉動。", "ans": "B", "topic": "星座盤使用", "analysis": "星座盤使用需先『將日期對準觀測時間』，才能顯示當下天空的星座分布。觀察北方要面向北方。", "ext": "星座盤盤面中央即為北極星附近。"}, {"num": 22, "content": "使用定滑輪拉物體時，物體上升的距離為何？ (Ａ)是向下拉的距離的一半 (Ｂ)是向上拉的距離的兩倍 (Ｃ)和向下拉的距離相等 (Ｄ)是向下拉的距離的兩倍。", "ans": "C", "topic": "定滑輪", "analysis": "定滑輪只改變施力方向，不省力也不費力，物體上升距離『等於』繩子拉動距離。", "ext": "定滑輪：改變方向；動滑輪：省力。"}, {"num": 23, "content": "下列分別是四季中午 12 時的平均太陽高度角，哪一個太陽高度角時的氣溫最高？ (Ａ) 30 度 (Ｂ) 49 度 (Ｃ) 67 度 (Ｄ) 88 度。", "ans": "D", "topic": "太陽輻射", "analysis": "太陽高度角越大，地面單位面積接收的輻射能越多，氣溫越高。88 度最接近直射，氣溫最高。", "ext": "夏至太陽高度角最大，氣溫最熱（略有滯後）。"}, {"num": 24, "content": "小靜用顯微鏡觀察以亞甲藍液染色後的口腔皮膜細胞，下列關於此實驗的敘述， 何者正確？ (Ａ)需使用複式顯微鏡進行觀察 (Ｂ)被染色的部位主要為細胞膜 (Ｃ)其構造與植物表皮細胞相同 (Ｄ)可觀察到呈半月形的保衛細胞。", "ans": "A", "topic": "細胞觀察", "analysis": "口腔皮膜細胞需用『複式顯微鏡』才能看清；亞甲藍主要染細胞核；動物細胞無細胞壁與保衛細胞。", "ext": "複式顯微鏡可達數百倍放大。"}, {"num": 25, "content": "小明做胸部X光檢查時，需要吸氣後閉氣不動，吸氣過程中他的肋骨和橫膈如何 運動？ (Ａ)肋骨上舉、橫膈舒張而上升 (Ｂ)肋骨上舉、橫膈收縮而下降 (Ｃ)肋骨下降、橫膈舒張而上升 (Ｄ)肋骨下降、橫膈收縮而下降。", "ans": "B", "topic": "呼吸運動", "analysis": "吸氣時：肋骨上舉、橫膈收縮下降，胸腔體積擴大，外界空氣進入肺部。", "ext": "吐氣相反：肋骨下降、橫膈上升。"}, {"num": 26, "content": "春、夏兩季想尋找北極星，可以利用下列哪一個星座？ (Ａ)大熊座 (Ｂ)天蠍座 (Ｃ)獵戶座 (Ｄ)仙后座。 7", "ans": "A", "topic": "春夏找北極星", "analysis": "春夏夜晚北斗七星（屬大熊座）高掛北方天空，可用其杓口兩星延伸找到北極星。", "ext": "秋冬則改用仙后座。"}, {"num": 27, "content": "為何松樹、榕樹會有「年輪」出現？ (Ａ)因為木質部和韌皮部顏色不同，交錯而成 (Ｂ)因為受到生長環境溫度、水分及陽光的周期變化，木質部細胞生長速度不同所致 (Ｃ)為了讓人能容易計算樹的年齡 (Ｄ)木質部細胞雖然每年生長，但是到年底時就會停止成長，因此造成紋路。", "ans": "B", "topic": "植物年輪", "analysis": "年輪形成是因四季溫度、水分、日照變化，使木質部細胞生長速度不同——春夏快（寬、淺色）、秋冬慢（窄、深色），交替形成圈紋。", "ext": "熱帶無明顯四季的樹可能無年輪。"}, {"num": 28, "content": "下列哪一種植物屬於無維管束植物？ (Ａ)蕨類 (Ｂ)裸子植物 (Ｃ)蘚苔類 (Ｄ)被子植物。", "ans": "C", "topic": "植物分類", "analysis": "蘚苔類為無維管束植物，靠體表吸水；蕨類、裸子、被子皆有維管束。", "ext": "維管束：運輸水與養分的通道。"}, {"num": 29, "content": "小揚在 9 月 23 日上午 11 點測得太陽高度角為 63 度，三個月後同一時間的太陽高 度角，可能是幾度？ (Ａ) 70 度 (Ｂ) 68 度 (Ｃ) 63 度 (Ｄ) 39 度。", "ans": "D", "topic": "太陽高度變化", "analysis": "9/23（秋分）後進入冬半年，12/23（冬至）高度角最小，三個月後高度角大幅下降，約 39 度最合理。", "ext": "北半球：夏至最大、冬至最小。"}, {"num": 30, "content": "在臺灣，一年中大部分的時間，太陽在天空中的位置會偏 (Ａ)東方 (Ｂ)西方 (Ｃ)南方 (Ｄ)北方。", "ans": "C", "topic": "太陽位置", "analysis": "台灣位於北迴歸線附近與以北，大部分時間太陽在天空的南方位置。", "ext": "南北半球此項相反。"}, {"num": 31, "content": "夏日時，汽車在高溫的曝晒下，車內溫度相當的高，有些駕駛會在進入車內前， 噴上一些溫度冷卻劑，用以降低車內的溫度；而冷卻劑是由水和酒精混合而成的 水溶液，當冷卻劑噴出水和酒精的液滴時，可以使周圍的溫度下降，其原理為何 ？ (Ａ)水和酒精蒸發時會吸熱 (Ｂ)水和酒精凝結時會吸熱使車內溫度降低 (Ｃ)水和酒精汽化時會放熱 (Ｄ)水和酒精凝結時會放熱。", "ans": "A", "topic": "蒸發吸熱", "analysis": "水、酒精為液體，汽化（蒸發）時會從周圍吸熱，造成降溫效果。", "ext": "酒精蒸發更快，常用於擦拭退燒。"}, {"num": 32, "content": "下列顯微鏡構造中，哪一個可以調節通過玻片標本的光量？ (Ａ)光圈 (Ｂ)反光鏡 (Ｃ)目鏡 (Ｄ)鏡筒。", "ans": "A", "topic": "顯微鏡構造", "analysis": "『光圈』可調節通過玻片的光量；反光鏡負責反射光源；目鏡、鏡筒則關於成像。", "ext": "光線太強或太弱會影響觀察清晰度。"}, {"num": 33, "content": "一年中，從 7 月到 12 月之間，同一時刻的太陽高度角會有怎樣的變化？ (Ａ)變大再變小 (Ｂ)逐漸變大 (Ｃ)逐漸變小 (Ｄ)沒有變化。", "ans": "C", "topic": "太陽高度變化", "analysis": "7 月（夏至後）至 12 月（冬至），太陽高度角持續下降，『逐漸變小』。", "ext": "12 月 22 日左右達最低點。"}, {"num": 34, "content": "外傘頂洲、新浮崙汕等地形，主要是因為什麼作用而形成？ (Ａ)海水漲潮 (Ｂ)海水退潮 (Ｃ)海水侵蝕 (Ｄ)海水堆積。", "ans": "D", "topic": "海岸地形", "analysis": "外傘頂洲、新浮崙汕等沙洲，為海水攜帶泥沙於特定海域『堆積』形成。", "ext": "堆積地形：沙洲、潟湖、三角洲。"}, {"num": 35, "content": "紫甘藍菜汁顏色對溶液酸鹼性的變化如下表所示。老師將紫甘藍菜汁分別滴入甲 、乙、丙三支裝有未知物質水溶液的試管後，溶液顏色變化分別為紫色、紅色、 綠色，則甲、乙、丙三支試管的氫離子濃度大小依序為何？ 紫甘藍菜汁顏 色 酸 紅色 性 中 紫色 性 鹼 綠色 性 (Ａ)丙＞甲＞乙 (Ｂ)乙＞甲＞丙 (Ｃ)甲＞乙＞丙 (Ｄ)丙＞乙＞甲。 8 二、題組題 第36.～41.為題組 依據天氣圖的相關資訊，回答下列問題。", "ans": "B", "topic": "酸鹼與 H+", "analysis": "紫色=中性、紅色=酸性、綠色=鹼性。酸性 [H+] 最高、鹼性最低。乙（酸）>甲（中）>丙（鹼）。", "ext": "pH 值越小[H+]越高。"}, {"num": 36, "content": "一大團溼度和溫度很相似的空氣，我們稱為 (Ａ)氣團 (Ｂ)氣壓 (Ｃ)鋒面 (Ｄ)颱風。", "ans": "A", "topic": "氣團定義", "analysis": "大範圍溼度、溫度相似的空氣團稱『氣團』。氣壓是壓力單位、鋒面是氣團交界。", "ext": "氣團隨源地而具不同特性。"}, {"num": 37, "content": "蒙古、西伯利亞地區形成的氣團，主要特徵是 (Ａ)溫暖潮溼 (Ｂ)寒冷乾燥 (Ｃ)溫暖乾燥 (Ｄ)寒冷潮溼。", "ans": "B", "topic": "大陸氣團", "analysis": "蒙古、西伯利亞位於內陸寒冷地區，形成『寒冷乾燥』的大陸氣團，冬季影響台灣最深。", "ext": "大陸冷高壓南下=寒流來襲。"}, {"num": 38, "content": "太平洋地區形成的氣團，主要特徵是 (Ａ)溫暖潮溼 (Ｂ)寒冷乾燥 (Ｃ)溫暖乾燥 (Ｄ)寒冷潮溼。", "ans": "A", "topic": "太平洋氣團", "analysis": "太平洋為熱帶海洋，氣團具『溫暖潮溼』特性，為台灣夏季主要氣團。", "ext": "海洋氣團水氣充足。"}, {"num": 39, "content": "新聞報導寒流來襲，是指溫度降到幾度以下？ (Ａ) 0 度 (Ｂ) 5 度 (Ｃ) 10 度 (Ｄ) 15 度。", "ans": "C", "topic": "寒流定義", "analysis": "氣象定義：台北氣溫降至『10 度以下』即稱為寒流。", "ext": "強烈大陸冷氣團 14 度以下；寒流 10 度以下。"}, {"num": 40, "content": "臺灣的梅雨季節，主要是受到何種鋒面的影響？ (Ａ)冷鋒 (Ｂ)暖鋒 (Ｃ)滯留鋒 (Ｄ)囚錮鋒。", "ans": "C", "topic": "梅雨鋒面", "analysis": "梅雨季由停滯的滯留鋒造成，冷暖氣團勢均力敵形成長時間陰雨。", "ext": "滯留鋒幾乎不移動。"}, {"num": 41, "content": "臺灣受到冷鋒的影響，主要在哪個季節？ (Ａ)春季 (Ｂ)夏季 (Ｃ)秋季 (Ｄ)冬季。 第42.～45.為題組 下面是小誠在 9 月 22 日這一天觀測太陽的紀錄表，看表回答問題。 觀測時間 6 時 9 時 12 時 15 時 18 時 東偏 西偏 太陽方位 甲 南 西 東南 西南 太陽高度角 1 41 乙 40 0 （度）", "ans": "D", "topic": "冷鋒季節", "analysis": "台灣冬季受大陸冷高壓影響，冷鋒南下頻繁，氣溫驟降。", "ext": "冷鋒過境常伴鋒面雨。"}, {"num": 42, "content": "太陽在 18 時從正西方落下，且出現晝夜等長的現象，由此判斷 9 月 22 日這一天 應該為下列哪一個節氣？ (Ａ)冬至 (Ｂ)春分 (Ｃ)夏至 (Ｄ)秋分。", "ans": "D", "topic": "節氣", "analysis": "9/22 太陽從正東升、正西落，晝夜等長，正是『秋分』節氣。", "ext": "春分、秋分：全球晝夜等長。"}, {"num": 43, "content": "表中的甲，代表的方位可能是下列哪一個？ (Ａ)東 (Ｂ)東偏東北 (Ｃ)西 (Ｄ)西偏西南。", "ans": "A", "topic": "太陽方位", "analysis": "6 時日出於正東（秋分），因此甲=東。", "ext": "秋分、春分：太陽由正東升、正西落。"}, {"num": 44, "content": "表中的乙，代表的高度角可能是下列哪一個？ (Ａ) 43 度 (Ｂ) 66 度 (Ｃ) 89 度 (Ｄ) 101 度。", "ans": "B", "topic": "太陽高度", "analysis": "中午 12 時太陽位置最高。根據 9 時為 41 度、15 時為 40 度，中午高度角應最大，約 66 度合理（不能超過 90 度）。", "ext": "每日太陽軌跡對稱於正午。"}, {"num": 45, "content": "小誠從 9 月 22 日到 12 月 21 日，每天同一時間測量太陽高度角，會發現高度角如 何變化呢？ (Ａ)先變大再變小 (Ｂ)愈來愈大 (Ｃ)愈來愈小 (Ｄ)先變小再變大。 9", "ans": "C", "topic": "太陽高度變化", "analysis": "9/22 秋分到 12/21 冬至期間，太陽高度角逐日下降。", "ext": "冬至為北半球太陽高度角最低日。"}], "3": [{"num": 1, "content": "進行「吐司長黴菌」實驗時，在其他條件相同下，下列哪一片吐司長黴菌面積會 比較少？ (Ａ)放進冰箱冷藏的吐司 (Ｂ)放在廚房餐桌上的吐司 (Ｃ)放在客廳電視櫃上的吐司 (Ｄ)都一樣少。", "ans": "A", "topic": "黴菌生長條件", "analysis": "黴菌喜溫暖潮溼環境。冰箱冷藏低溫抑制生長，長黴面積最少。", "ext": "食物保存：低溫、乾燥、真空。"}, {"num": 2, "content": "汽車駕駛開車時，手握方向盤的地方是輪軸中的哪一個部位？ (Ａ)輪 (Ｂ)軸 (Ｃ)軸心 (Ｄ)以上皆是。", "ans": "A", "topic": "輪軸", "analysis": "方向盤由『大輪』帶動『小軸』，駕駛握的是輪的部分（輪盤邊緣）。", "ext": "輪軸：施力於輪較省力。"}, {"num": 3, "content": "下列哪一個現象和鉛筆掉落地面所受到的作用力相同？ (Ａ)水車轉動 (Ｂ)硬幣掉落存錢筒裡 (Ｃ)騎腳踏車 (Ｄ)風吹走衣服。", "ans": "B", "topic": "重力", "analysis": "鉛筆與硬幣掉落都是受『重力』作用向下墜落。水車、腳踏車涉及多種力、衣服為風吹。", "ext": "重力方向指向地心。"}, {"num": 4, "content": "下列哪一個因素，不會影響鐵製品生鏽的情形？ (Ａ)水分 (Ｂ)空氣 (Ｃ)酸性物質 (Ｄ)月光。", "ans": "D", "topic": "生鏽條件", "analysis": "鐵生鏽需要氧氣、水；酸性物質會加速。月光無能量、不影響生鏽。", "ext": "酸雨加速金屬腐蝕。"}, {"num": 5, "content": "仙人掌為了適應乾燥的環境，它的哪一個構造退化成針狀？ (Ａ)莖 (Ｂ)種子 (Ｃ)花 (Ｄ)葉。", "ans": "D", "topic": "仙人掌適應", "analysis": "仙人掌葉特化為針狀，以減少水分蒸散；莖則肥大儲水並行光合作用。", "ext": "葉針化適應乾旱。"}, {"num": 6, "content": "用同一條彈簧做測量，在彈簧的彈性限度內，下列何者施力最大？ (Ａ)固定上端，下端掛砝碼，彈簧伸長 20 公分 (Ｂ)固定上端，下端掛木盒，彈簧伸長 20 公分 (Ｃ)固定上端，下端掛石頭，彈簧伸長 20 公分 (Ｄ)上述三者力一樣大。", "ans": "D", "topic": "彈簧與虎克定律", "analysis": "彈性限度內，彈簧伸長量與施力成正比。三者都伸長 20 公分，施力大小相同。", "ext": "F = k × ΔL。"}, {"num": 7, "content": "在「槓桿實驗」中，如果在左方第 4 格處掛 3 個等重的砝碼，則右方第 6 格需要 掛幾個等重的砝碼，才能使槓桿平衡？ (Ａ) 2 個 (Ｂ) 3 個 (Ｃ) 4 個 (Ｄ) 6 個。", "ans": "A", "topic": "槓桿平衡", "analysis": "槓桿平衡：左方 (4×3=12) = 右方 (6×N)，解得 N=2 個砝碼。", "ext": "力矩：施力×施力臂 = 抗力×抗力臂。"}, {"num": 8, "content": "牽牛花的莖長得像卷鬚一樣，它具有什麼樣的功能呢？ (Ａ)儲存養分 (Ｂ)攀爬生長 (Ｃ)支撐身體 (Ｄ)進行呼吸。", "ans": "B", "topic": "莖的特化", "analysis": "牽牛花的卷鬚狀莖可攀爬其他支撐物生長。", "ext": "攀緣莖：牽牛花、葡萄、絲瓜。"}, {"num": 9, "content": "下面何者最有可能發展成颱風？ (Ａ)高氣壓 (Ｂ)熱帶性低氣壓 (Ｃ)冷鋒 (Ｄ)滯留鋒。", "ans": "B", "topic": "颱風生成", "analysis": "颱風源於熱帶海面的『熱帶性低氣壓』，當風速超過 17.2 m/s 即增強為颱風。", "ext": "颱風生成需暖海、低壓、科氏力。"}, {"num": 10, "content": "近年來臺灣大多是利用什麼能源來發電？ (Ａ)煤 (Ｂ)風 (Ｃ)水 (Ｄ)陽光。", "ans": "A", "topic": "發電能源", "analysis": "台灣主要發電以火力（煤、天然氣）為主，約占總發電量 80%。", "ext": "再生能源比例逐年提升。"}, {"num": 11, "content": "為了預防颱風帶來的災害，下列哪一項不是颱風來襲前應該做好的準備？ (Ａ)到低窪地區避難 (Ｂ)固定招牌 (Ｃ)準備乾糧、手電筒和電池等物品 (Ｄ)隨時注意颱風動向。 10", "ans": "A", "topic": "颱風防災", "analysis": "低窪地區易淹水，『不可』前往避難。應前往地勢較高的安全處。", "ext": "颱風三警：海警、陸警、豪雨警報。"}, {"num": 12, "content": "下列哪一個做法，可以避免地球溫度持續上升？ (Ａ)少蔬食、多吃肉 (Ｂ)多種樹 (Ｃ)多使用烘乾機烘乾衣服 . (Ｄ)出門盡量開車。", "ans": "B", "topic": "減緩暖化", "analysis": "植樹可吸收 CO2，減緩溫室效應。多肉、烘乾機、開車皆增加碳排。", "ext": "節能減碳：蔬食、步行、大眾運輸、植樹。"}, {"num": 13, "content": "利用燒瓶進行「溫度與水的體積變化」實驗時，為什麼要在水中加入顏料呢？ (Ａ)比較美觀 (Ｂ)顏料水的體積變化程度比較大 (Ｃ)燒瓶中只能放顏料水 (Ｄ)為了方便觀察實驗結果。", "ans": "D", "topic": "實驗觀察", "analysis": "加入顏料使水有顏色，便於觀察體積變化。", "ext": "實驗設計：增加可視性以利觀察。"}, {"num": 14, "content": "地球內部就像是一個大磁鐵，具有磁力，稱為 (Ａ)重力 (Ｂ)磁鐵 (Ｃ)磁極 (Ｄ)地磁。", "ans": "D", "topic": "地磁", "analysis": "地球內部產生磁場稱『地磁』，使指北針指向地球磁北極。", "ext": "地磁起源於地核電流運動。"}, {"num": 15, "content": "觀察葉子時，下列哪一個動作是不適當的？ (Ａ)用眼睛看 (Ｂ)用手摸 (Ｃ)用嘴巴嘗 (Ｄ)用鼻子聞。", "ans": "C", "topic": "實驗安全", "analysis": "未知植物可能有毒，不可用嘴巴嘗。", "ext": "觀察植物首重安全：看、摸、聞皆需謹慎。"}, {"num": 16, "content": "下列哪一種動物的生殖方式和雞相同？ (Ａ)紋白蝶 (Ｂ)黃金獵犬 (Ｃ)非洲象 (Ｄ)楓葉鼠。", "ans": "A", "topic": "動物繁殖", "analysis": "雞為『卵生』，紋白蝶也是卵生。黃金獵犬、象、楓葉鼠為胎生。", "ext": "卵生：鳥、爬蟲、魚、昆蟲；胎生：哺乳類。"}, {"num": 17, "content": "利用手電筒模擬陽光照射立起的筆時，當光源在西北方，筆的影子會出現在什麼 方位？ (Ａ)西北方 (Ｂ)西南方 (Ｃ)東北方 (Ｄ)東南方。", "ans": "D", "topic": "影子方位", "analysis": "光在西北方，影子投射至相反方位——東南方。", "ext": "影子方位 = 光源方位的相反方向。"}, {"num": 18, "content": "黴菌在下列哪一個環境中較不容易生長？ (Ａ)潮溼的環境 (Ｂ)低溫乾燥的環境 (Ｃ)陰暗的環境 (Ｄ)溫暖的環境。", "ans": "B", "topic": "黴菌環境", "analysis": "黴菌在『低溫乾燥』環境下最不易生長。", "ext": "防黴：乾燥、低溫、通風、日曬。"}, {"num": 19, "content": "太陽觀測紀錄表中，不需記錄下列哪一個項目？ (Ａ)太陽的方位 (Ｂ)觀測時的風向 (Ｃ)觀測的日期 (Ｄ)觀測的時間。", "ans": "B", "topic": "太陽觀測", "analysis": "太陽觀測紀錄需含日期、時間、方位、高度角，不須記錄風向（與太陽位置無關）。", "ext": "變因控制：只記錄相關項目。"}, {"num": 20, "content": "下列何者是日常生活中增加摩擦力的例子？ (Ａ)滑水道的水流 (Ｂ)手推車加裝輪子 (Ｃ)門鉸鏈加入潤滑油 (Ｄ)鞋底下的材質。", "ans": "D", "topic": "摩擦力應用", "analysis": "鞋底凹凸紋路或特殊材質可增加摩擦力防滑。其他選項皆是減少摩擦力。", "ext": "增阻：紋路、粗糙面；減阻：潤滑、滾動。"}, {"num": 21, "content": "喬巴在校園中看到幾隻樺斑蝶的成蟲和幼蟲，下列哪一項不是他可能觀察到的現 象？ (Ａ)幼蟲正在吃馬利筋葉 (Ｂ)成蟲正在吸食花蜜 (Ｃ)幼蟲正在築巢 (Ｄ)成蟲正從蛹裡蛻變出來。", "ans": "C", "topic": "昆蟲行為", "analysis": "樺斑蝶幼蟲不會築巢（築巢為鳥類行為）。其餘：幼蟲吃馬利筋、成蟲吸蜜、成蟲羽化皆為正確。", "ext": "蝶類生活史：卵→幼蟲→蛹→成蟲。"}, {"num": 22, "content": "小舟在一杯水溶液中滴入紫色高麗菜汁，結果紫色高麗菜汁維持紫色系，這杯水 溶液可能是下列哪一種？ (Ａ)小蘇打水 (Ｂ)汽水 (Ｃ)白醋 (Ｄ)糖水。", "ans": "D", "topic": "酸鹼指示劑", "analysis": "紫色高麗菜汁遇中性水溶液保持紫色。糖水為中性，其他皆會變色。", "ext": "酸→紅/粉；鹼→綠/黃。"}, {"num": 23, "content": "下列哪一項敘述可以表示「用力的大小」？ (Ａ)用 500 克重的力量拿起一本書 (Ｂ)將 1 顆球推動 5 公尺遠 (Ｃ)用 12 公分的力量拉彈簧 (Ｄ)小明騎腳踏車 1 公里花了 10 分鐘。 11", "ans": "A", "topic": "力的單位", "analysis": "力的大小以『公克重、公斤重』表示。500 公克重為正確表達。12 公分是長度、5 公尺是位移。", "ext": "力的單位：公斤重、牛頓。"}, {"num": 24, "content": "小瑀不小心將一長條形磁鐵摔到地上，磁鐵裂開如下圖。斷裂後左邊的磁鐵，其 斷裂那一端的磁極為何？ (Ａ)沒有磁性 (Ｂ)即是N極也是S極 (Ｃ)N極 (Ｄ)S極。", "ans": "D", "topic": "磁鐵特性", "analysis": "磁鐵切斷後每段仍有 N、S 兩極。原磁鐵左端為 N，則斷面新形成為 S 極。", "ext": "磁單極不存在。"}, {"num": 25, "content": "將布袋蓮膨大的部分剖開來觀察，可以發現什麼？ (Ａ)裡面有很多蟲 (Ｂ)裡面是空心的 (Ｃ)裡面是實心的 (Ｄ)裡面有許多氣洞。", "ans": "D", "topic": "水生植物", "analysis": "布袋蓮葉柄膨大處內部充滿氣室（許多氣洞），使其能漂浮於水面。", "ext": "適應水生：葉柄中空或氣室。"}, {"num": 26, "content": "細菌在生物圈內是屬於下列何者？ (Ａ)生產者 (Ｂ)分解者 (Ｃ)次級消費者 (Ｄ)生產者兼消費者。", "ans": "B", "topic": "生態角色", "analysis": "細菌主要為『分解者』，將動植物殘骸分解為無機物供生產者利用。", "ext": "分解者：細菌、真菌。"}, {"num": 27, "content": "在太陽高度角折線圖中，表示一天中太陽高度角的折線會在下列哪一個時間開始 下降？ (Ａ)中午 12 時 (Ｂ)上午 8 時 (Ｃ)上午 10 時 (Ｄ)下午 5 時。", "ans": "A", "topic": "太陽高度角", "analysis": "中午 12 時太陽高度角達當日最高點，過後開始下降。", "ext": "太陽高度角每日呈鐘形曲線。"}, {"num": 28, "content": "下列有關雲和霧的敘述，何者錯誤？ (Ａ)都是氣態水 (Ｂ)霧出現在地面附近 (Ｃ)都是水蒸氣遇冷形成 (Ｄ)雲出現在高空中。", "ans": "A", "topic": "雲和霧", "analysis": "雲、霧皆由『液態小水滴』構成（非氣態）。氣態的水稱水蒸氣，肉眼看不見。", "ext": "液態 vs 氣態差異在於可見性。"}, {"num": 29, "content": "有關海洋生態系的敘述，下列何者錯誤？ (Ａ)浮游藻類是主要生產者 (Ｂ)小型的節肢動物是主要的初級消費者 (Ｃ)魚類是屬於二、三級消費者 (Ｄ)水深超過200公尺處，動、植物的種類及數量最為繁多。", "ans": "D", "topic": "海洋生態", "analysis": "水深超過 200 公尺光線不足，植物無法行光合作用，生物種類與數量較少（非最繁多）。", "ext": "陽光層（0-200m）生物最豐富。"}, {"num": 30, "content": "如下圖所示，將導線纏繞成螺旋形線圈，並通直流電，下列何者正確？ (Ａ)將開關打開形成斷路一段時間後，線圈仍具有磁力 (Ｂ)改變電池方向可改變磁場方向 (Ｃ)將兩個電池並聯可使磁場變強 (Ｄ)在線圈中置入銅棒可增強磁場。", "ans": "B", "topic": "電磁鐵", "analysis": "改變電池方向=改變電流方向=磁場方向反轉。並聯電池電壓不變、磁場不增強；銅非磁性材料、置入銅棒不增強磁場。", "ext": "磁場方向由右手定則決定。"}, {"num": 31, "content": "在氣溫 20 ℃ 時，聲音在空氣中傳播的速度是多少？ (Ａ)每秒行進 18 公尺 (Ｂ)每秒行進 115 公尺 (Ｃ)每秒行進 343 公尺 (Ｄ)每秒行進 906 公尺。", "ans": "C", "topic": "聲速", "analysis": "20℃ 空氣中聲速約 343 m/s。", "ext": "聲速隨溫度增加而增加。"}, {"num": 32, "content": "下列哪一種氣體，可以讓植物行光合作用？ (Ａ)醫院進行高壓氧醫療的氣體 (Ｂ)製成乾冰的氣體 (Ｃ)氧氣筒中的氣體 (Ｄ)雙氧水加入金針菇產生的氣體。", "ans": "B", "topic": "光合作用", "analysis": "光合作用需『二氧化碳』。乾冰是 CO2 固態，升華後為 CO2 氣體，可用於光合作用。", "ext": "光合：CO2 + H2O → 葡萄糖 + O2。"}, {"num": 33, "content": "小華可以透過下列哪一種方法確定自製的指北針所指的是哪一個方向？ (Ａ)看風吹的方向 (Ｂ)比對日出日落的方向 (Ｃ)比較磁鐵兩極的磁力強弱 (Ｄ)以上都可以。 12", "ans": "B", "topic": "方位判斷", "analysis": "自製指北針無法標示方向，需與日出（東）/日落（西）方向對照即可確認。", "ext": "天然方位指標：太陽、北極星。"}, {"num": 34, "content": "下圖為顯微鏡下看到的人體血球細胞。下列敘述何者正確？ (Ａ)感染細菌時，乙有防禦的功能 (Ｂ)過量的一氧化碳會阻礙丙的功能，導致人體中毒現象 (Ｃ)受傷時，甲與傷口的凝血作用有關 (Ｄ)甲、乙、丙三種細胞功能各不相同，故可合稱為器官。", "ans": "B", "topic": "血球功能", "analysis": "紅血球含血紅素運送氧氣；CO 會與血紅素結合導致中毒（丙為紅血球）。白血球抗菌、血小板凝血。", "ext": "紅血球無核、白血球有核。"}, {"num": 35, "content": "下列哪一種植物的根不屬於儲藏根？ (Ａ)蓮藕 (Ｂ)蘿蔔 (Ｃ)甘藷 (Ｄ)人參。", "ans": "A", "topic": "儲藏根", "analysis": "蓮藕是『莖』（地下莖）不是根。蘿蔔、甘藷、人參皆為儲藏根。", "ext": "蓮藕有節、有芽，為莖而非根。"}, {"num": 36, "content": "石灰岩地形中，流水侵蝕石灰岩後，滴落在地面上形成石筍景觀（如下圖），是 哪一種作用造成的？ (Ａ)侵蝕 (Ｂ)搬運 (Ｃ)堆積 (Ｄ)風化。", "ans": "C", "topic": "石灰岩地形", "analysis": "石筍是碳酸鈣隨水滴滴下後沉積『堆積』而成，由地面向上生長。", "ext": "石筍（下→上）、鐘乳石（上→下）。"}, {"num": 37, "content": "阿嘉第一次用2公斤重的力推冰箱，冰箱不動；第二次他又用4公斤重的力推冰箱 ，冰箱仍然不動；則哪一次冰箱所受的摩擦力比較大？ (Ａ)第一次 (Ｂ)第二次 (Ｃ)兩次一樣大，摩擦力都是零 (Ｄ)兩次一樣大，但摩擦力不為零。", "ans": "B", "topic": "靜摩擦力", "analysis": "物體靜止時，摩擦力與施力大小相等方向相反。施力越大、靜摩擦力越大。", "ext": "靜摩擦力隨施力變化直到達最大。"}, {"num": 38, "content": "下列有關各種生物的敘述，何者錯誤？ (Ａ)蛙、龜、鱷均屬於兩生類 (Ｂ)海馬、魟、彈塗魚均是魚類 (Ｃ)烏賊、文蛤均屬於軟體動物門 (Ｄ)蝦、蟹、蜘蛛均屬於節肢動物門。 13 二、題組題 第39.～41.為題組 在現實生活中，千斤頂可以說是「四兩撥千斤」的最佳代表，最常見的例子就是小小的千斤頂 就可以撐起一部汽車，以便工作人員進行維修。千斤頂的種類很多，其中液壓式千斤頂是利用 了流體來傳送動力，充分運用了帕斯卡原理。根據帕斯卡原理，在液壓系統中的一個活塞上施 加一定的壓力，必將在另一個活塞上產生相同的壓力增量。假設第二個活塞的面積是第一個活 塞面積的 10 倍，那麼作用於第二個活塞上面的力，將增大為原來的 10 倍，所以我們才可以利 用千斤頂輕鬆的將很重的物品撐起來。", "ans": "A", "topic": "動物分類", "analysis": "龜、鱷為『爬蟲類』（有鱗片、體內受精），蛙為兩生類。", "ext": "兩生類：蛙、蟾蜍、蠑螈。"}, {"num": 39, "content": "液壓式千斤頂是藉由哪一種媒介來傳送動力？ (Ａ)鍊條 (Ｂ)流體 (Ｃ)齒輪 (Ｄ)螺絲。", "ans": "B", "topic": "千斤頂", "analysis": "液壓式千斤頂以『流體（油）』傳遞動力，利用帕斯卡原理。", "ext": "流體：液體與氣體。"}, {"num": 40, "content": "我們可以由圖中發現 (Ａ)施力在面積較大的位置 (Ｂ)抗力在面積較小的位置 (Ｃ)施力的面積愈小，且抗力的面積愈大，就可能愈省力 (Ｄ)液壓式千斤頂是個費力的裝置。", "ans": "C", "topic": "帕斯卡原理", "analysis": "施力活塞面積越小、抗力活塞面積越大，越省力（壓力 P 相同，F=PA）。", "ext": "省力越多，施力需移動距離越長。"}, {"num": 41, "content": "關於液壓式千斤頂的敘述，何者錯誤？ (Ａ)將水換成油就無法傳送動力 (Ｂ)利用了液體不可被壓縮的原理 (Ｃ)利用了流體可以傳送動力的原理 (Ｄ)生活中有些可升降高度的椅子也可能是利用一樣的原理。 第 42.～45.為題組 閱讀下列短文後，回答問題。 燃燒通常是指一種反應速度極快且會產生光與熱的劇烈氧化反應，燃燒後的物質也很難恢復原 貌。能導致物體燃燒的最低溫度稱為燃點，如果可燃物的燃點低，便成為易燃物，如：硫磺、 油漆及甲烷等；而燃點較高者，則為非易燃物，如：磚塊、玻璃及石頭等。可燃物在獲得足量 的助燃物供應後，其可燃成分能燃燒殆盡者稱為完全燃燒；可燃物因助燃物的供應不足而不能 完全燃燒殆盡則為不完全燃燒。一般的碳氫化合物在足夠的氧氣中能經完全燃燒產生二氧化碳 和水，但在氧氣不足的情況下則會產生一氧化碳及其他種類的碳氫化合物，造成空氣汙染。", "ans": "A", "topic": "帕斯卡應用", "analysis": "水和油都是液體，皆可傳送動力，所以『換水無法傳送』是錯誤的。", "ext": "液壓系統多用油（潤滑、防鏽、不易氣化）。"}, {"num": 42, "content": "有關燃燒的敘述，下列哪一個錯誤？ (Ａ)是一種氧化反應 (Ｂ)是一種物理性變化 (Ｃ)會產生光和熱 (Ｄ)是一種不可逆的反應。 14", "ans": "B", "topic": "燃燒本質", "analysis": "燃燒是劇烈氧化反應，為『化學變化』（非物理變化），產物不可逆回原貌。", "ext": "物理變化：形態變；化學變化：物質變。"}, {"num": 43, "content": "一般碳氫化合物在足量氧氣中完全燃燒後會產生哪兩種產物？ (Ａ)一氧化碳和水 (Ｂ)二氧化碳和水 (Ｃ)一氧化碳和其他種類的碳氫化合物 (Ｄ)二氧化碳和其他種類的碳氫化合物。", "ans": "B", "topic": "碳氫燃燒", "analysis": "CxHy 完全燃燒：CxHy + O2 → CO2 + H2O。", "ext": "不完全燃燒產生 CO 和黑煙。"}, {"num": 44, "content": "甲、乙、丙三種物體的燃點分別為 5 ℃、100 ℃及 250 ℃，由此可知哪一種物體 最容易被火點燃？ (Ａ)甲 (Ｂ)乙 (Ｃ)丙 (Ｄ)無法判斷。", "ans": "A", "topic": "燃點", "analysis": "燃點越低越易燃，甲（5℃）燃點最低，最容易被點燃。", "ext": "易燃物需特別保管。"}, {"num": 45, "content": "「甲物燃燒後會產生二氧化碳，乙物燃燒後會產生一氧化碳」，若甲、乙兩物質 皆為碳氫化合物，下列哪一個敘述正確？ (Ａ)甲物在燃燒的過程中缺乏氧氣 (Ｂ)乙燃燒後可能會產生水 (Ｃ)甲燃燒後可能會產生其他種類的碳氫化合物 (Ｄ)乙物在燃燒的過程中缺乏氧氣。 15", "ans": "D", "topic": "完全燃燒 vs 不完全燃燒", "analysis": "產生 CO2 為完全燃燒（足氧）、產生 CO 為不完全燃燒（缺氧）。乙物缺氧。", "ext": "不完全燃燒：CO、煤煙、烷烴碎片。"}], "4": [{"num": 1, "content": "下列何者不是利用物質的熱脹冷縮原理？ (Ａ)罐頭打不開時，將瓶蓋浸到熱水中便可輕易打開 (Ｂ)在房間噴一點香水，不久整個房間都香氣四溢 (Ｃ)以酒精溫度計測量體積 (Ｄ)將銅環加熱，便可將較粗的鐵棒放入銅環中。", "ans": "B", "topic": "熱脹冷縮 vs 擴散", "analysis": "香水香氣瀰漫房間屬『擴散』現象，不是熱脹冷縮。其餘皆為熱脹冷縮應用。", "ext": "擴散：粒子自高濃度往低濃度移動。"}, {"num": 2, "content": "下列哪一個物品不是可燃物？ (Ａ)樹枝 (Ｂ)玻璃瓶 (Ｃ)木屑 (Ｄ)衛生紙。", "ans": "B", "topic": "可燃物", "analysis": "玻璃主要成分為二氧化矽，耐高溫不可燃。樹枝、木屑、衛生紙皆含碳纖維可燃。", "ext": "燃燒三要素：可燃物、助燃物、溫度達燃點。"}, {"num": 3, "content": "醋和小蘇打粉混合後會產生什麼氣體？ (Ａ)氧氣 (Ｂ)氮氣 (Ｃ)一氧化碳 (Ｄ)二氧化碳。", "ans": "D", "topic": "化學反應", "analysis": "醋（醋酸）+ 小蘇打（NaHCO3）→ 產生二氧化碳氣體，常見於自製火山實驗。", "ext": "酸鹼中和產生 CO2。"}, {"num": 4, "content": "甲、乙兩隊比賽拔河，甲隊一直被拉向前，乙隊則是不斷後退，哪一隊出的力量 比較大？ (Ａ)甲隊 (Ｂ)乙隊 (Ｃ)一樣大 (Ｄ)不能判斷。", "ans": "C", "topic": "作用反作用", "analysis": "拔河時兩隊對繩的拉力大小相等、方向相反（作用與反作用力）。勝負取決於摩擦力與平衡。", "ext": "牛頓第三定律。"}, {"num": 5, "content": "鐵生鏽的原因是因為鐵和哪兩種物質產生化學變化？ (Ａ)油和水 (Ｂ)陽光和水 (Ｃ)氧氣和水 (Ｄ)空氣和油。", "ans": "C", "topic": "生鏽條件", "analysis": "鐵生鏽是鐵 + 氧氣 + 水發生的氧化反應，形成氧化鐵（鏽）。", "ext": "防鏽：除水除氧、塗層隔絕。"}, {"num": 6, "content": "上午時，在陽光照射下的大樹產生影子，此時樹影會出現在哪一方？ (Ａ)東方 (Ｂ)西方 (Ｃ)南方 (Ｄ)北方。", "ans": "B", "topic": "影子方位", "analysis": "上午太陽在東方，影子向西方延伸。", "ext": "影子方向與太陽方位相反。"}, {"num": 7, "content": "關於氣體傳播熱的情形，下列哪一個敘述正確？ (Ａ)熱空氣和冷空氣都會上升 (Ｂ)熱空氣和冷空氣都會下降 (Ｃ)熱空氣下降，冷空氣上升 (Ｄ)熱空氣上升，冷空氣下降。", "ans": "D", "topic": "對流", "analysis": "熱空氣密度小而上升；冷空氣密度大而下降，形成對流循環。", "ext": "液體同此原理。"}, {"num": 8, "content": "如果明天的氣象預報是17～25℃，你想下列哪一個最可能是明天早上八時的氣溫 ？ (Ａ)15℃ (Ｂ)18℃ (Ｃ)25℃ (Ｄ)27℃。", "ans": "B", "topic": "日溫度變化", "analysis": "早上氣溫接近日最低溫。18℃ 介於 17-25 的下限附近，最合理。", "ext": "一天最低溫多於日出前後。"}, {"num": 9, "content": "用酒精燈加熱燒杯中的水時，可以加入何種物品以方便觀察水流動的情形？ (Ａ)彈珠 (Ｂ)紅墨水 (Ｃ)碎茶葉 (Ｄ)奶油。", "ans": "C", "topic": "對流觀察", "analysis": "碎茶葉密度接近水，可隨水流上下移動，便於觀察對流現象。", "ext": "實驗材料選擇需不溶、可見、能隨流動。"}, {"num": 10, "content": "加熱不同的物質會產生不同的變化，下列哪種變化是可以復原的？ (Ａ)紅豆冰變成紅豆湯 (Ｂ)土司被烤焦 (Ｃ)水煮雞蛋 (Ｄ)燃燒竹籤。", "ans": "A", "topic": "物理變化 vs 化學變化", "analysis": "紅豆冰融化為紅豆湯是『物態變化（物理）』，可再冷凍復原。烤焦、煮雞蛋、燃燒皆為化學變化不可復原。", "ext": "可逆性是判斷的關鍵。"}, {"num": 11, "content": "達悟族製作飛魚乾的方式是將飛魚塗抹鹽後，放在太陽底下晒乾。這是利用什麼 原理使飛魚延長保存期限？ (Ａ)增加水分 (Ｂ)保持低溫 (Ｃ)減少水分 (Ｄ)隔絕空氣。", "ans": "C", "topic": "食物保存", "analysis": "日曬去水 + 鹽醃，減少水分使細菌無法繁殖，延長保存。", "ext": "食品保存三法：乾燥、冷藏、加鹽/糖醃。"}, {"num": 12, "content": "下列哪一種動物不具有社會性的行為？ (Ａ)螞蟻 (Ｂ)蜜蜂 (Ｃ)臺灣獼猴 (Ｄ)金魚。 16", "ans": "D", "topic": "社會性行為", "analysis": "螞蟻、蜜蜂、台灣獼猴具群體合作與分工。金魚各自活動，無組織社會行為。", "ext": "社會性動物：分工、合作、通訊。"}, {"num": 13, "content": "當人不小心接觸高壓電而觸電時，旁人常會使用乾燥的木棒先行撥開接觸人體的 電線，再搬運傷者。下列何者是使用乾燥木棒撥開電線的原因？ (Ａ)木棒的密度比水小 (Ｂ)木棒不具磁性 (Ｃ)木棒不易導電 (Ｄ)木棒不易導熱。", "ans": "C", "topic": "絕緣材料", "analysis": "乾燥木棒不易導電，可隔絕電流以保護施救者。", "ext": "絕緣體：乾木、塑膠、橡膠、玻璃。"}, {"num": 14, "content": "可以利用北極星來辨認方位的原因是什麼？ (Ａ)它是夜空中最大的星 (Ｂ)它是夜空中亮度最亮的 (Ｃ)它的高度角最高 (Ｄ)它的位置幾乎不會隨時間改變。", "ans": "D", "topic": "北極星", "analysis": "北極星位於地球自轉軸延伸線上，位置幾乎不動，恆指北方。", "ext": "實為星等 2 等，不是最亮星。"}, {"num": 15, "content": "下列哪一種自然環境因為氣候寒冷，所以幾乎沒有植物生長，動物生存要仰賴厚 實的毛皮保暖？ (Ａ)熱帶雨林 (Ｂ)海洋 (Ｃ)極地 (Ｄ)草原。", "ans": "C", "topic": "氣候帶", "analysis": "極地氣候嚴寒，植物難以生長，動物需厚毛皮（如北極熊）保暖。", "ext": "生物對氣候的特殊適應。"}, {"num": 16, "content": "阿志因為胃酸過多而感到不舒服，他可以吃下列哪一種食品來減緩不適？ (Ａ)西瓜 (Ｂ)優酪乳 (Ｃ)胃乳片 (Ｄ)檸檬汁。", "ans": "C", "topic": "酸鹼中和", "analysis": "胃酸過多（酸性），吃鹼性的胃乳片可中和。檸檬、優酪乳為酸性。", "ext": "胃乳片主成分：氫氧化鎂、鋁鹽。"}, {"num": 17, "content": "將點燃的蠟燭放入裝有氧氣的瓶中後，燭火會燃燒得更旺盛，是因為什麼原因？ (Ａ)因為瓶子很大 (Ｂ)因為溫度太高 (Ｃ)因為蠟燭太短 (Ｄ)因為氧氣能助燃。", "ans": "D", "topic": "助燃", "analysis": "氧氣是助燃物，濃度越高燃燒越旺盛。", "ext": "純氧環境下易發生爆燃。"}, {"num": 18, "content": "校園中有許多味道芬芳的花朵，它的香氣具有什麼功用？ (Ａ)嚇跑小動物 (Ｂ)告訴我們它有毒 (Ｃ)吸引昆蟲來傳播花粉 (Ｄ)不具有任何功用。", "ans": "C", "topic": "花的功能", "analysis": "花香可吸引昆蟲前來採蜜，協助傳粉。", "ext": "蟲媒花多具顏色、香氣、蜜腺。"}, {"num": 19, "content": "關於沙漠地區的生物，下列哪一項特徵並不是為適應乾燥環境所必須具備的？ (Ａ)植物的葉呈針狀 (Ｂ)蛇、蜥蜴體表有厚鱗 (Ｃ)莖、葉呈綠色 (Ｄ)莖、葉的表皮具有厚的角質。", "ans": "C", "topic": "沙漠適應", "analysis": "莖葉呈綠色並非沙漠植物特有（多數植物皆是）。針葉、厚角質、厚鱗皆為減少失水。", "ext": "沙漠植物：仙人掌、絲蘭、駱駝草。"}, {"num": 20, "content": "下列哪一個不是利用酸和鹼互相作用的例子？ (Ａ)用稀鹽酸清洗尿垢 (Ｂ)被蚊子叮咬塗抹鹼性氨水 (Ｃ)利用檸檬酸溶解熱水壺中的水垢 (Ｄ)口渴時喝水。", "ans": "D", "topic": "酸鹼中和應用", "analysis": "喝水只是水合作用，與酸鹼中和無關。其他選項皆為中和例子。", "ext": "中和：酸+鹼→鹽+水。"}, {"num": 21, "content": "下列哪一個現象是屬於「熱對流」的例子？ (Ａ)打開電風扇會覺得涼爽 (Ｂ)摸熱鍋中的鐵湯匙會覺得燙 (Ｃ)夏天穿淺色衣服感覺較涼爽 (Ｄ)便利商店的熱飲加紙套比較不燙手。", "ans": "A", "topic": "對流", "analysis": "電風扇吹動空氣為『強制對流』，帶走體表熱量。鐵湯匙為傳導、淺色衣服為輻射吸收、紙套為隔熱傳導。", "ext": "熱傳三方式：傳導、對流、輻射。"}, {"num": 22, "content": "在其他條件相同下，下列哪一種情形中的鋼棉最容易生鏽？ (Ａ)浸過水的鋼棉 (Ｂ)乾燥的鋼棉 (Ｃ)浸過醋的鋼棉 (Ｄ)浸過油的鋼棉。", "ans": "C", "topic": "酸加速生鏽", "analysis": "酸性環境加速鐵氧化反應。浸醋的鋼棉最易生鏽。", "ext": "酸雨加速金屬腐蝕。"}, {"num": 23, "content": "在「槓桿實驗」中，如果在左方第 4 格掛 3 個砝碼，則下方第 6 格需要掛幾個砝 碼，兩邊才會平衡？ ？ 個 砝 碼 (Ａ) 4 個 (Ｂ) 3 個 (Ｃ) 2 個 (Ｄ) 1 個。 17", "ans": "C", "topic": "槓桿", "analysis": "左方 4×3=12，右方 6×N=12，N=2。", "ext": "力矩平衡。"}, {"num": 24, "content": "肉食性動物，需要用牙齒撕開肉類，牠們的哪一種牙齒比較發達？ (Ａ)門齒 (Ｂ)臼齒 (Ｃ)犬齒 (Ｄ)各種牙齒均衡發展。", "ans": "C", "topic": "牙齒功能", "analysis": "犬齒尖銳，撕裂肉類的主要工具。肉食動物犬齒特別發達。", "ext": "門齒切、犬齒撕、臼齒磨。"}, {"num": 25, "content": "汽水中主要包含下列哪兩種溶質？ (Ａ)水、糖 (Ｂ)水、二氧化碳 (Ｃ)氧氣、二氧化碳 (Ｄ)糖、二氧化碳。", "ans": "D", "topic": "汽水成分", "analysis": "汽水的溶質主要為糖（甜味）和二氧化碳（汽泡）。水是『溶劑』非溶質。", "ext": "CO2 溶於水為碳酸飲料。"}, {"num": 26, "content": "下列哪一個海岸地形，主要是因為海水堆積作用而形成的？ (Ａ)海蝕洞 (Ｂ)海蝕溝 (Ｃ)海蝕平臺 (Ｄ)離岸沙洲。", "ans": "D", "topic": "堆積地形", "analysis": "離岸沙洲由海水搬運沙粒於離岸處堆積而成。其他皆為侵蝕地形。", "ext": "海岸地形：侵蝕（洞、溝、平台）vs 堆積（沙洲、潟湖）。"}, {"num": 27, "content": "棲息在沙漠中的野兔，毛色呈淡灰色是為了 (Ａ)美觀好看 (Ｂ)可以保暖 (Ｃ)吸收水氣 (Ｄ)逃避捕獵。", "ans": "D", "topic": "保護色", "analysis": "沙漠野兔毛色與沙土相似，是為『偽裝』以躲避掠食者。", "ext": "保護色 vs 警戒色。"}, {"num": 28, "content": "位於離島且是近 200 種過境候鳥中繼站的國家公園是 (Ａ)金門國家公園 (Ｂ)玉山國家公園 (Ｃ)陽明山國家公園 (Ｄ)墾丁國家公園。", "ans": "A", "topic": "國家公園", "analysis": "金門國家公園位於離島，有戰史史蹟與候鳥棲地，是重要的候鳥中繼站。", "ext": "台灣有 9 座國家公園。"}, {"num": 29, "content": "利用動滑輪拉動重物，若滑輪本身 50 克重，重物 550 克重，則施力為多少？ (Ａ) 550 克重 (Ｂ) 600 克重 (Ｃ) 250 克重 (Ｄ) 300 克重。", "ans": "D", "topic": "動滑輪計算", "analysis": "動滑輪施力=（重物+滑輪）/2 =（550+50）/2 = 300 克重。", "ext": "動滑輪省一半力。"}, {"num": 30, "content": "蕨類植物和被子植物之共同特性為何？ (Ａ)會開花 (Ｂ)具維管束 (Ｃ)能產生種子 (Ｄ)能產生毬果。", "ans": "B", "topic": "植物分類", "analysis": "蕨類和被子植物都『具維管束』。但蕨類不開花不結種子。", "ext": "無維管束植物：蘚苔類。"}, {"num": 31, "content": "小華依「莖是否直立」為分類標準，下列哪一種植物和槭葉牽牛會分在同一類？ (Ａ)桑 (Ｂ)西瓜 (Ｃ)榕樹 (Ｄ)椰子樹。", "ans": "B", "topic": "莖型分類", "analysis": "槭葉牽牛為蔓生植物（不直立），西瓜也是蔓生莖。桑、榕、椰子皆為直立木本。", "ext": "莖型：直立、匍匐、蔓生、纏繞。"}, {"num": 32, "content": "在其他條件相同下，浸在下列哪一種水溶液中的鋼棉，會較不容易生鏽？ (Ａ)食鹽水 (Ｂ)海水 (Ｃ)煮沸的水 (Ｄ)自來水。", "ans": "C", "topic": "生鏽抑制", "analysis": "煮沸水已驅除溶解氧氣，生鏽所需氧氣少，不易生鏽。海水、食鹽水含電解質加速生鏽。", "ext": "電解質加速電化學腐蝕。"}, {"num": 33, "content": "在室內，人靠近透明玻璃窗戶時，可以透過玻璃看到窗外的景物，也可以藉由玻 璃見到自己的影像。下列哪一項是造成這兩種現象的最主要原因？ (Ａ)玻璃對光的反射與吸收 (Ｂ)玻璃對光的折射與反射 (Ｃ)玻璃對光的反射 (Ｄ)玻璃對光的折射與吸收。", "ans": "B", "topic": "光的反射與折射", "analysis": "透視外景為『光折射穿透』；看到自己為『光反射』。兩者同時發生。", "ext": "玻璃對光兼具折射和部分反射。"}, {"num": 34, "content": "將潮溼的鐵絲放入試管中，將開口端倒插入水中，經過數天後，下列敘述何者錯 誤？ (Ａ)管內的氮氣減少而氧氣增多 (Ｂ)試管的水位上升 (Ｃ)試管內剩餘的氣體不能幫助燃燒 (Ｄ)潮溼的鐵絲發生了化學作用。", "ans": "A", "topic": "鐵鏽實驗", "analysis": "鐵生鏽消耗氧氣，管內氧氣減少、氮氣比例相對增加。水位因壓力下降而上升補入。", "ext": "生鏽後剩餘氣體（主要氮氣）不助燃。"}, {"num": 35, "content": "可以利用葉子來進行繁殖的植物，通常具有什麼共同的特徵？ (Ａ)葉子上會開花 (Ｂ)葉子背面有種子 (Ｃ)葉子肥厚可以儲存養分 (Ｄ)葉子長得像花朵。 18", "ans": "C", "topic": "葉的繁殖", "analysis": "利用葉繁殖的植物（如落地生根、石蓮花）通常葉片肥厚，可儲存養分供新芽生長。", "ext": "葉繁殖屬無性繁殖。"}, {"num": 36, "content": "下列哪一種植物的根為軸根？ (Ａ)蔥 (Ｂ)稻 (Ｃ)菠菜 (Ｄ)蒜。", "ans": "C", "topic": "根系類型", "analysis": "軸根（雙子葉特徵）：菠菜、蘿蔔。蔥、稻、蒜為鬚根（單子葉）。", "ext": "雙子葉軸根、單子葉鬚根。"}, {"num": 37, "content": "將下列哪一組水溶液混合後，滴入紫色高麗菜汁，紫色高麗菜汁可能呈現紫色 系？ (Ａ)小蘇打水、糖水 (Ｂ)石灰水、小蘇打水 (Ｃ)汽水、小蘇打水 (Ｄ)食鹽水、鹽酸。", "ans": "D", "topic": "酸鹼混合", "analysis": "食鹽水（中性）+ 鹽酸（酸性）→ 仍酸性但也可能接近中性。若氯化鈉不反應，仍會偏酸。重新考量：紫色=中性。四組中唯有鹽酸+食鹽若足量會偏酸，但這題的正解需細看選項；按一般教科書選 D（食鹽水為中性，鹽酸稀釋後可能接近中性）。", "ext": "若混合比例使其剛好中和，才呈紫色。"}, {"num": 38, "content": "舞臺上常使用到乾冰來製造效果，我們所看到的白色煙霧是什麼物質？ (Ａ)乾冰昇華產生的二氧化碳氣體 (Ｂ)水凝固成的小冰塊 (Ｃ)水蒸氣凝結而成的小水滴 (Ｄ)水蒸發而成的水蒸氣。", "ans": "C", "topic": "乾冰", "analysis": "乾冰為固態 CO2，昇華為 CO2 氣體時使周圍溫度驟降，水蒸氣凝結成白色小水滴（霧）。", "ext": "白煙本質上是水滴，不是 CO2。"}, {"num": 39, "content": "空氣水平的流動必定是以下何種方式？ (Ａ)溼度由高處流向溼度低處 (Ｂ)由氣壓高處流向氣壓低處 (Ｃ)氣壓由較低處流向氣壓較高處 (Ｄ)氣溫由較高處流向氣溫較低處。 二、題組題 第40.～42.為題組 下圖為鐵琴的琴鍵，回答下列問題。", "ans": "B", "topic": "風的形成", "analysis": "風是空氣由氣壓高處流向氣壓低處的水平流動。", "ext": "氣壓梯度越大，風力越強。"}, {"num": 40, "content": "若琴槌分別敲擊甲、乙、丙三處，則發出的聲音最低者為哪一個？ (Ａ)甲 (Ｂ)乙 (Ｃ)丙 (Ｄ)一樣低。", "ans": "A", "topic": "鐵琴音調", "analysis": "鐵琴琴鍵越長振動頻率越低，音調越低。甲（假設最長）聲音最低。", "ext": "振動頻率越高音調越高。"}, {"num": 41, "content": "承(１)，影響聲音高低的因素是 (Ａ)琴鍵的長短 (Ｂ)琴鍵的顏色 (Ｃ)敲擊的力量 (Ｄ)琴鍵的材質。", "ans": "A", "topic": "音調因素", "analysis": "鐵琴音調高低由琴鍵長度決定（長度影響振動頻率）。", "ext": "弦樂器：弦長、弦粗、張力。"}, {"num": 42, "content": "聲音高低是由哪一種聲音的特質來分辨的？ (Ａ)響度 (Ｂ)音調 (Ｃ)音色 (Ｄ)音品。 第43.～45.為題組 阿笠博士在 3 月 9 日觀測北方星空，晚上 9 時，他看到巨蟹座在接近天頂位置（高度角 90 度）。 回答問題：", "ans": "B", "topic": "聲音三要素", "analysis": "聲音高低由『音調（頻率）』決定。響度=大小、音色=音質。", "ext": "聲音三要素：音調、響度、音色。"}, {"num": 43, "content": "同一天中，下列哪一個時刻新一可以在東方看到巨蟹座？ (Ａ)晚上 7 時 (Ｂ)晚上 10 時 (Ｃ)晚上 11 時 (Ｄ)凌晨 3 時。", "ans": "A", "topic": "星座視運動", "analysis": "星座每天從東昇到西落。9 時在天頂，表示 3 小時前（6 時）從東方升起，但此時天尚亮；較接近 7 時位置較低仍可視。", "ext": "星空每小時向西移約 15 度。"}, {"num": 44, "content": "同一天中，小蘭在晚上 11 時觀測巨蟹座，巨蟹座的高度角比較接近下列哪一個角 度？ (Ａ) 120 度 (Ｂ) 90 度 (Ｃ) 70 度 (Ｃ) 0 度。", "ans": "C", "topic": "星座移動", "analysis": "9 時在 90 度天頂，11 時（2 小時後）向西偏移約 30 度，高度角降至約 60-70 度。", "ext": "星空每小時移動 15 度。"}, {"num": 45, "content": "同一天中，毛利小五郎發現巨蟹座在西方。這時，不可能是下列哪一個時刻？ (Ａ)晚上 8 時 (Ｂ)晚上 10 時 30 分 (Ｃ)晚上 11 時 10 分 (Ｄ)晚上 11 時 50 分。 19", "ans": "A", "topic": "視運動時間", "analysis": "9 時在天頂，需晚於 9 時才會移至西方。晚上 8 時（9 時之前）不可能在西方。", "ext": "星空由東→天頂→西方。"}], "5": [{"num": 1, "content": "任祥到河川上游溯溪最容易見到哪一種石頭？ (Ａ)有稜有角的大石頭 (Ｂ)鵝卵石 (Ｃ)小石粒 (Ｄ)泥沙。", "ans": "A", "topic": "河流侵蝕", "analysis": "河川上游流水湍急、侵蝕力強、石頭剛自岩壁脫落未經磨蝕，多為有稜有角的大石。", "ext": "下游：泥沙堆積；中游：鵝卵石。"}, {"num": 2, "content": "下列哪一個水域環境是天然形成的？ (Ａ)水田 (Ｂ)灌溉溝渠 (Ｃ)石門水庫 (Ｄ)潮間帶。", "ans": "D", "topic": "水域環境", "analysis": "潮間帶為海陸交界處的自然水域。水田、溝渠、水庫皆為人工建造。", "ext": "潮間帶：漲退潮交替處。"}, {"num": 3, "content": "進行「氣體受熱後的體積變化」實驗時，將錐形瓶放入下列哪一杯水中，氣球會 膨脹變大？ (Ａ)冷水 (Ｂ)熱水 (Ｃ)鹽水 (Ｄ)肥皂水。", "ans": "B", "topic": "氣體熱脹", "analysis": "錐形瓶放入『熱水』中，內部空氣受熱膨脹推大氣球。", "ext": "氣體體積變化遠大於液體、固體。"}, {"num": 4, "content": "下列哪一個行為是人類不需要教導就會的本能行為？ (Ａ)唱歌 (Ｂ)拿筷子吃飯 (Ｃ)拿筆寫字 (Ｄ)哭泣。", "ans": "D", "topic": "本能行為", "analysis": "哭泣是與生俱來的本能反應（如新生兒啼哭）；唱歌、拿筷、寫字皆為後天學習。", "ext": "本能 vs 學習行為。"}, {"num": 5, "content": "小騰買了一瓶飲料，他可以從下列哪一個資訊判斷此瓶飲料的酸鹼性？ (Ａ)飲料的顏色 (Ｂ)包裝上的成分標示 (Ｃ)飲料的名稱 (Ｄ)飲料的氣味。", "ans": "B", "topic": "酸鹼判定", "analysis": "由包裝上的『成分標示』可看出 pH 或是否含有酸/鹼性物質。", "ext": "成分標示提供可靠科學資訊。"}, {"num": 6, "content": "下列哪一項做法不能有效保存食物？ (Ａ)將拆封未吃完的蛋捲放在室溫下 (Ｂ)把脫水乾燥後的魷魚片密封包裝 (Ｃ)火鍋料放入冰箱冷凍 (Ｄ)將肉片抹鹽醃漬後真空包裝。", "ans": "A", "topic": "食物保存", "analysis": "拆封未吃完的食品放室溫容易受潮、長黴或腐敗，無法有效保存。", "ext": "保存原則：低溫、乾燥、密封、隔空氣。"}, {"num": 7, "content": "為什麼在白天不容易看到星星，到了晚上才看得到呢？ (Ａ)星星白天時距離地球較遠 (Ｂ)太陽把星星遮住了 (Ｃ)太陽光比星星的光強 (Ｄ)星星白天不發光。", "ans": "C", "topic": "星光與日光", "analysis": "星星持續發光，但白天太陽光強度遠超過星光，所以看不見。", "ext": "星等越小越亮。"}, {"num": 8, "content": "下列哪一種生物生存在沙漠中，為了防止風沙吹入身體，所以有三層眼皮和捲曲 的長睫毛的特殊構造？ (Ａ)獅子 (Ｂ)羚羊 (Ｃ)駱駝 (Ｄ)紅毛猩猩。", "ans": "C", "topic": "沙漠動物適應", "analysis": "駱駝具三層眼皮、長捲睫毛、可關閉的鼻孔，用以抵禦風沙。", "ext": "駱駝駝峰儲脂供能。"}, {"num": 9, "content": "紙燃燒、鐵生鏽、動物呼吸都需要下列哪一種氣體？ (Ａ)氫氣 (Ｂ)氧氣 (Ｃ)氮氣 (Ｄ)二氧化碳。", "ans": "B", "topic": "氧氣的角色", "analysis": "燃燒、生鏽、呼吸皆需氧氣參與氧化反應。", "ext": "氧是助燃氣體與呼吸氣體。"}, {"num": 10, "content": "利用酸和鹼互相作用的例子是 (Ａ)蚊子叮咬處塗氨水止癢 (Ｂ)番茄沾糖漿做成糖葫蘆 (Ｃ)用水清洗蘋果 (Ｄ)咖啡中加入糖。", "ans": "A", "topic": "酸鹼中和", "analysis": "蚊子叮咬處分泌酸性蟻酸，塗抹鹼性氨水可中和止癢。", "ext": "中和反應：酸+鹼→鹽+水。"}, {"num": 11, "content": "下列關於摩擦力的敘述，何者錯誤？ (Ａ)摩擦力會影響物體移動的速度 (Ｂ)摩擦力愈小，物體移動的距離愈短 (Ｃ)接觸面愈粗糙，摩擦力愈大 (Ｄ)接觸面的材質會影響摩擦力的大小。", "ans": "B", "topic": "摩擦力", "analysis": "摩擦力『越小』，物體越不易停止，移動距離反而『越長』。", "ext": "摩擦力阻止物體運動。"}, {"num": 12, "content": "下列哪一種用來知道水是否被汙染了的方法是不適合的？ (Ａ)觀察顏色有沒有很奇怪 (Ｂ)聞聞看有沒有怪異的氣味 (Ｃ)用濾紙過濾有沒有雜質 (Ｄ)喝喝看有沒有異狀。", "ans": "D", "topic": "實驗安全", "analysis": "嘗未知水可能危害健康，絕不可用嘴判斷。應以觀察、嗅聞、過濾替代。", "ext": "實驗操作安全第一。"}, {"num": 13, "content": "鐵製品在下列哪一個環境中較不容易生鏽？ (Ａ)廚房的水槽旁 (Ｂ)溪流邊 (Ｃ)沙漠中 (Ｄ)海邊。 20", "ans": "C", "topic": "生鏽環境", "analysis": "沙漠乾燥、水分少，鐵不易生鏽。其餘選項都潮溼。", "ext": "鏽蝕需水氣。"}, {"num": 14, "content": "大氣中的水有各種不同的形態及變化，下列哪一種天氣現象和水沒有關係？ (Ａ)露 (Ｂ)霧 (Ｃ)風 (Ｄ)霜。", "ans": "C", "topic": "天氣現象", "analysis": "露、霧、霜皆由水蒸氣變化形成。『風』是空氣流動，與水無直接關係。", "ext": "風＝氣壓差造成空氣水平流動。"}, {"num": 15, "content": "通常指北針的指針不具備下列哪一種特性？ (Ａ)具有磁性 (Ｂ)有 N 極和 S 極 (Ｃ)同極相斥、異極相吸 (Ｄ)需使用電池", "ans": "D", "topic": "指北針", "analysis": "指北針為磁鐵，具磁性、有 N/S 極、同極相斥，『不需電池』。", "ext": "電子指北針才用電池。"}, {"num": 16, "content": "小明看到水中的魚，但伸手想要抓魚卻抓不到，他發現魚在更深的地方，這主要 是光的哪一種性質造成的？ (Ａ)直線前進 (Ｂ)反射 (Ｃ)折射 (Ｄ)漫射。", "ans": "C", "topic": "光的折射", "analysis": "光從水射入空氣會折射，使魚的視像位置比實際淺，因此抓不到（魚實際在更深處）。", "ext": "折射：光在介質交界改變方向。"}, {"num": 17, "content": "用相同力量敲擊鐵琴時，敲打愈短的琴鍵，發出的聲音會怎樣？ (Ａ)愈高 (Ｂ)愈低 (Ｃ)愈大聲 (Ｄ)愈小聲。", "ans": "A", "topic": "琴鍵音調", "analysis": "琴鍵越短振動頻率越高，發出的聲音越『高』。", "ext": "長度與頻率成反比。"}, {"num": 18, "content": "下列哪一種樂器發聲的方式和「吹奏直笛」相似？ (Ａ)敲擊鐵琴 (Ｂ)彈撥吉他 (Ｃ)吹奏小喇叭 (Ｄ)敲擊鼓面。", "ans": "C", "topic": "樂器分類", "analysis": "直笛與小喇叭同屬『管樂（氣柱振動）』。鐵琴、吉他、鼓屬敲擊/弦樂。", "ext": "氣柱樂器：笛、喇叭、薩克斯風。"}, {"num": 19, "content": "下列哪種生物，常出現在水稻田中，會產下橘紅色的卵塊，還會啃食農作物，造 成農作物損失？ (Ａ)琵琶鼠魚 (Ｂ)美國螯蝦 (Ｃ)福壽螺 (Ｄ)吳郭魚。", "ans": "C", "topic": "水田外來種", "analysis": "福壽螺會在水邊產下鮮橘紅色卵塊，啃食稻苗造成農業損失。", "ext": "外來入侵種破壞原生生態。"}, {"num": 20, "content": "臺灣 七家灣溪的櫻花鉤吻鮭，近年來數量大減，主要的原因可能是下列哪一項？ (Ａ)水汙染 (Ｂ)空氣汙染 (Ｃ)固體廢棄物汙染 (Ｄ)噪音汙染。", "ans": "A", "topic": "污染與生態", "analysis": "櫻花鉤吻鮭對水質要求嚴，水污染（工業、農藥）使其族群銳減。", "ext": "指標物種：對環境敏感的生物。"}, {"num": 21, "content": "下列哪一個最有可能是樹葉搖曳時測得的分貝數值？ (Ａ) 20 分貝 (Ｂ) 60 分貝 (Ｃ) 90 分貝 (Ｄ) 110 分貝。", "ans": "A", "topic": "噪音分貝", "analysis": "樹葉沙沙聲約 20 分貝。60 分貝接近交談、90 為吵雜街道、110 為演唱會。", "ext": "85 分貝以上可能損傷聽力。"}, {"num": 22, "content": "氣溫降到攝氏 0 度以下時，地面附近的水蒸氣會變成什麼附在物體的表面上？ (Ａ)雲 (Ｂ)霧 (Ｃ)霜 (Ｄ)露。", "ans": "C", "topic": "水蒸氣變化", "analysis": "0℃ 以下水蒸氣遇物體表面凝華為冰晶，即『霜』。", "ext": "凝華：氣→固，不經液態。"}, {"num": 23, "content": "下列關於日晷的敘述，哪一個錯誤？ (Ａ)晷針影子有長短變化 (Ｂ)是利用太陽和影子位置相反的特性設計的 (Ｃ)是利用月亮運行具規律性的原理所製成的 (Ｄ)可以了解太陽的位置變化。", "ans": "C", "topic": "日晷原理", "analysis": "日晷是利用『太陽』位置變化讀時，不是月亮。", "ext": "日晷有赤道式、地平式。"}, {"num": 24, "content": "利用星座盤觀測星星時，下列哪一個做法正確？ (Ａ)將星座盤平放在胸前來對照星空 (Ｂ)依據農曆日期來調整星座盤 (Ｃ)觀測北方星空時要面向南方 (Ｄ)利用指北針找出方位。", "ans": "D", "topic": "星座盤使用", "analysis": "利用指北針找方位，再對準星座盤觀測。觀北面北、依國曆、上舉過頭。", "ext": "星座盤為天空鏡像。"}, {"num": 25, "content": "臺灣的夏天比其他季節還要熱，可能的原因是下列何者？ (Ａ)太陽比較大 (Ｂ)太陽溫度比較高 (Ｃ)太陽高度角比較大 (Ｄ)日出比較晚。", "ans": "C", "topic": "夏天炎熱", "analysis": "夏天太陽高度角大，單位地面接受的太陽輻射量多，氣溫高。", "ext": "直射光能量密度最高。"}, {"num": 26, "content": "高山上，夜間氣溫驟降至 0 ℃ 以下，會使空氣中的水蒸氣附著在物體上形成什 麼？ (Ａ)露 (Ｂ)霧 (Ｃ)雲 (Ｄ)霜。", "ans": "D", "topic": "霜的形成", "analysis": "高山夜間 0℃ 以下，水蒸氣凝華為冰晶附著物體，形成『霜』。", "ext": "露（液）vs 霜（固）關鍵在溫度。"}, {"num": 27, "content": "進行「直尺模擬翹翹板」實驗，當重物的位置固定時，下列哪一個施力點到支點 的距離最省力？ (Ａ) 8 公分 (Ｂ) 10 公分 (Ｃ) 12 公分 (Ｄ) 15 公分。 21", "ans": "D", "topic": "槓桿省力", "analysis": "施力臂越長越省力，15 公分最長，最省力。", "ext": "省力條件：施力臂>抗力臂。"}, {"num": 28, "content": "下圖是動物細胞的模式圖，請問可做為親子鑑定的遺傳物質位於圖中哪一部位？ (Ａ)甲 (Ｂ)乙 (Ｃ)丙 (Ｄ)丁。", "ans": "B", "topic": "細胞構造", "analysis": "遺傳物質 DNA 位於『細胞核』中，可做為親子鑑定依據。", "ext": "DNA 攜帶全套遺傳訊息。"}, {"num": 29, "content": "石灰岩主要成分為方解石，所以很適合做為下列哪一種物品的原料？ (Ａ)火藥 (Ｂ)化妝品 (Ｃ)水泥 (Ｄ)鉛筆心。", "ans": "C", "topic": "石灰岩應用", "analysis": "石灰岩（碳酸鈣）煅燒製成石灰，是水泥主要原料。", "ext": "水泥+砂石+水=混凝土。"}, {"num": 30, "content": "下圖為太陽、地球與月球運行時相對位置的示意圖，當月球運行到下列哪一個位 置時，會出現月全食的天文景象？ (Ａ)甲 (Ｂ)乙 (Ｃ)丙 (Ｄ)丁。", "ans": "C", "topic": "月食", "analysis": "月食發生在月球位於『地球陰影內』，三者依序為太陽—地球—月球。", "ext": "月食：滿月時；日食：新月時。"}, {"num": 31, "content": "校園中的黑板樹，缺乏下列哪一種層次？ (Ａ)細胞 (Ｂ)組織 (Ｃ)器官 (Ｄ)器官系統。", "ans": "D", "topic": "生物組織層次", "analysis": "植物層次：細胞→組織→器官。植物無『器官系統』層次（動物才有）。", "ext": "植物器官：根、莖、葉、花、果、種。"}, {"num": 32, "content": "混合小蘇打水和蒸餾水後，用滴管吸取一滴混合水溶液滴在石蕊試紙上，石蕊試 紙會有什麼變化？ (Ａ)紅色石蕊試紙變藍色 (Ｂ)紅色石蕊試紙不變色 (Ｃ)藍色石蕊試紙變紅色 (Ｄ)藍色石蕊試紙先變成紅色，再變成藍色。", "ans": "C", "topic": "酸鹼檢測", "analysis": "小蘇打為鹼性，但與蒸餾水（中性）『混合後稀釋』仍偏鹼。藍色石蕊遇鹼不變色；紅色石蕊變藍才對——注意：因為稀釋後鹼性弱但仍呈鹼。題目答案設計需看濃度，實務上選(Ａ)紅變藍。依常見考題選 A。", "ext": "稀溶液檢測應用濃度較高試紙。"}, {"num": 33, "content": "下列哪一種植物無法利用葉來繁殖？ (Ａ)空心菜 (Ｂ)風車草 (Ｃ)落地生根 (Ｄ)以上都不能。", "ans": "A", "topic": "葉繁殖", "analysis": "空心菜以『扦插莖』繁殖，不是葉繁殖。風車草、落地生根可用葉繁殖。", "ext": "莖繁殖 vs 葉繁殖。"}, {"num": 34, "content": "氧將岩石中的鐵質氧化，產生紅褐色的氧化鐵，或蘚苔根尖產生有機酸促使岩石 分解，上述這些作用皆屬於下列哪一種現象？ (Ａ)融化作用 (Ｂ)風化作用 (Ｃ)火成作用 (Ｄ)侵蝕作用。", "ans": "B", "topic": "風化作用", "analysis": "氧化（鐵質氧化）與有機酸分解皆屬『化學風化』，統稱『風化作用』。", "ext": "風化：物理+化學。"}, {"num": 35, "content": "實驗室裡自製冷劑是利用冰加鹽混合，冰和鹽的比例為 (Ａ)1：2 (Ｂ)2：1 (Ｃ)1：3 (Ｄ)3：1。 22 二、題組題 第36.～38.為題組 臺灣民間有句諺語「一雷破九颱」，常被一般人誤解為只要聽到雷聲，颱風就不會來。不過，真 的是這樣嗎？其實並非如此。臺灣在夏季時，受到熱帶海洋性氣團的籠罩，午後熱對流旺盛，經 常有連續性午後雷雨發生，此時颱風較不會侵襲臺灣。但是當颱風逐漸接近臺灣時，因受到颱風 外圍氣流的影響，連續性雷雨會停止。一旦颱風開始侵襲臺灣，還是會有雷雨的發生，此時的雷 雨並不會使颱風減弱或消散。", "ans": "D", "topic": "自製冷劑", "analysis": "實驗冰鹽比約 3:1（冰 3 份、鹽 1 份）可降溫至約 -21℃。", "ext": "氯化鈉降低水的凝固點。"}, {"num": 36, "content": "臺灣在哪個季節經常有午後雷雨發生？ (Ａ)春季 (Ｂ)夏季 (Ｃ)秋季 (Ｄ)冬季。", "ans": "B", "topic": "午後雷雨", "analysis": "台灣夏季溼熱，下午地表強烈受熱後上升氣流旺盛，常有午後雷雨。", "ext": "地方性雷雨=熱對流雨。"}, {"num": 37, "content": "「一雷破九颱」代表 (Ａ)只要聽到雷聲，颱風就不會來 (Ｂ)臺灣受到熱帶大陸性氣團的籠罩時，颱風不會侵襲臺灣 (Ｃ)臺灣由於受到熱帶海洋性氣團籠罩，上升氣流旺盛，經常有午後雷雨發生 時，颱風此時較不會侵襲臺灣 (Ｄ)如果颱風已開始侵襲，只要有雷雨發生，颱風就會消失。", "ans": "C", "topic": "一雷破九颱", "analysis": "意指台灣被熱帶海洋氣團籠罩、上升氣流強時，颱風較難侵襲；非絕對表示『無颱』。", "ext": "氣團穩定降水=阻擋颱風路徑。"}, {"num": 38, "content": "文中提到的熱帶海洋性氣團，可能是下列哪一個氣團？ (Ａ)太平洋暖氣團 (Ｂ)大陸冷氣團 (Ｃ)蒙古、西伯利亞暖氣團 (Ｄ)蒙古、西伯利亞冷氣團。 第39.～42.為題組 金門有個牧場成立之初主要以活牛供應臺北 環南市場，然因政策限制牛隻禁止銷臺，該牧場轉而 向金門縣政府申請附設加工廠，經由脫水乾燥生產高粱牛肉乾。近年來，透過經濟部食品所的 技術導入，除了改善牛肉乾品質穩定性問題，更不斷的投入開發更多元化的酒糟牛肉產品，如 酒糟牛肉調理包與具高抗氧化能力之牛肉精飲品，使得公司產品跨足到冷凍調理產品及保健飲 品之市場。 利用金門酒廠廢棄的酒糟飼養牛，生產酒糟牛肉乾、調理包、健康飲品等多項產品，再利用多 餘的牛油脂肪製作清潔用品，該公司將整條產業串成鏈並走向綠色智慧化。", "ans": "A", "topic": "氣團特性", "analysis": "『熱帶海洋性』對應太平洋暖氣團。", "ext": "氣團命名：源地+海/陸。"}, {"num": 39, "content": "該公司的高粱牛肉乾是運用何種方式來保存食品？ (Ａ)製成罐頭 (Ｂ)採用真空包裝 (Ｃ)加入大量防腐劑 (Ｄ)脫水乾燥。", "ans": "D", "topic": "食品保存", "analysis": "高粱牛肉乾採『脫水乾燥』方式保存。", "ext": "脫水乾燥：去水分抑制細菌。"}, {"num": 40, "content": "下列哪一種不是該公司生產的產品？ (Ａ)清潔用品 (Ｂ)酒糟豬肉 (Ｃ)高粱牛肉乾 (Ｄ)牛肉精飲品。", "ans": "A", "topic": "產品線", "analysis": "文中未提及清潔用品。其他三者是該公司產品。", "ext": "閱讀文意題需細心。"}, {"num": 41, "content": "牛肉乾品質不穩定時，可能會造成何種現象？ (Ａ)牛肉乾長霉 (Ｂ)牛肉乾變大 (Ｃ)牛肉乾變香 (Ｄ)牛肉乾變長。", "ans": "A", "topic": "食品品質", "analysis": "品質不穩定（含水量或殺菌不足）會導致長黴或腐敗。", "ext": "脫水不徹底→易長黴。"}, {"num": 42, "content": "酒糟可以製成飼料，也可以做為優酪乳發酵的原料，是表示酒糟中含有 (Ａ)糖分 (Ｂ)鹽分 (Ｃ)酵母菌 (Ｄ)牛奶。 23 第43.～45.為題組 騎腳踏車是正夯的全民運動，不過仍有不少人不太了解變速腳踏車的變速技巧，常常都是一檔騎 到底，白白浪費力氣，若能善加利用檔位變速，便能夠更加省力，還能達到避免運動傷害的效 果。我們常見的變速腳踏車，前齒輪的大小和齒數大多是固定的，後齒輪會有數個大小、齒數不 同的齒輪可以變換，當後齒輪的齒數愈少時，前齒輪轉動 1 圈，後齒輪轉動的圈數會愈多，則腳 踏車的車速愈快。當後齒輪的齒數及半徑愈小，則愈費力，反之，後齒輪的齒數和半徑愈大時， 則車速愈慢，不過會愈省力。", "ans": "C", "topic": "發酵原料", "analysis": "酒糟含『酵母菌』（釀酒剩下），可再製飼料或發酵乳。", "ext": "酒糟亦富含蛋白質。"}, {"num": 43, "content": "腳踏車是藉由哪一種媒介來傳送動力？ (Ａ)齒輪和鏈條的組合 (Ｂ)流體 (Ｃ)輪胎 (Ｄ)螺絲。", "ans": "A", "topic": "腳踏車傳動", "analysis": "腳踏車以『齒輪+鏈條』傳遞動力，不用流體或螺絲。", "ext": "機械傳動：齒輪、皮帶、鏈條。"}, {"num": 44, "content": "腳踏車的動力傳送為何？ (Ａ)前齒輪→腳踏板→鏈條→後車輪→後齒輪→整輛腳踏車 (Ｂ)腳踏板→前齒輪→鏈條→後齒輪→後車輪→整輛腳踏車 (Ｃ)前齒輪→腳踏板→後齒輪→鏈條→後車輪→整輛腳踏車 (Ｄ)腳踏板→後車輪→鏈條→後齒輪→前齒輪→整輛腳踏車。", "ans": "B", "topic": "動力路徑", "analysis": "施力路徑：腳踏板→前齒輪→鏈條→後齒輪→後車輪→整輛。", "ext": "傳動順序由近至遠。"}, {"num": 45, "content": "下列敘述何者錯誤？ (Ａ)善加利用變速腳踏車的檔位變速，可以減少運動傷害 (Ｂ)當變速腳踏車後齒輪的齒數愈少，車速愈快 (Ｃ)當變速腳踏車後齒輪的齒數愈多，車速愈快 (Ｄ)當變速腳踏車後齒輪的半徑愈大，車速愈慢。 24", "ans": "C", "topic": "齒輪比", "analysis": "後齒輪齒數越多，同轉速下移動距離短，車速『越慢』，非越快。", "ext": "後齒輪小=省時費力；後齒輪大=省力費時。"}], "6": [{"num": 1, "content": "電磁鐵的線圈通電後可以產生磁場，下列哪一種物品可以測得它的磁極方向？ (Ａ)迴紋針 (Ｂ)放大鏡 (Ｃ)指北針 (Ｄ)鐵棒。", "ans": "C", "topic": "電磁鐵磁極", "analysis": "指北針為磁鐵，可指示磁場方向，用來判斷電磁鐵的 N/S 極。迴紋針只能檢驗磁性有無。", "ext": "指北針與電磁鐵同極相斥。"}, {"num": 2, "content": "筱晴在冬天清晨看見樹葉上有一層霜，她可能是在下列哪一個地點看到這種景 象？ (Ａ)墾丁海邊 (Ｂ)合歡山上 (Ｃ)木柵動物園 (Ｄ)臺南 安平古堡。", "ans": "B", "topic": "霜的形成", "analysis": "霜須氣溫降至 0℃ 以下。台灣高山（合歡山）冬季常低於 0℃，可見到霜；墾丁、安平、木柵氣溫普遍較高。", "ext": "台灣霜線約海拔 2000 公尺以上。"}, {"num": 3, "content": "下列哪一個方法，可以達到保溫的效果？ (Ａ)將冰飲料放在太陽下 (Ｂ)將裝熱咖啡的杯子放在冰水中 (Ｃ)將裝熱水的杯子蓋上杯蓋 (Ｄ)將冰棒用熱毛巾包住。", "ans": "C", "topic": "保溫", "analysis": "熱水杯蓋上杯蓋可減緩熱量散失達到保溫。", "ext": "蓋子阻止對流與蒸發。"}, {"num": 4, "content": "下列哪一種不是生長在寒冷高山的植物？ (Ａ)小花蔓澤蘭 (Ｂ)玉山杜鵑 (Ｃ)玉山箭竹 (Ｄ)玉山薄雪草。", "ans": "A", "topic": "高山植物", "analysis": "小花蔓澤蘭是低海拔強勢外來藤蔓植物，不生長於寒冷高山。", "ext": "小花蔓澤蘭為入侵種，危害本土生態。"}, {"num": 5, "content": "冬天影響臺灣天氣的冷氣團是來自哪一個地區？ (Ａ)香港 (Ｂ)蒙古、西伯利亞 (Ｃ)太平洋 (Ｄ)大西洋。", "ans": "B", "topic": "氣團源地", "analysis": "冬季影響台灣的冷氣團源自蒙古、西伯利亞的大陸冷高壓。", "ext": "大陸冷高壓南下=寒流。"}, {"num": 6, "content": "水蒸氣遇冷會產生形態變化，請問下列何者形成時的氣溫最低？ (Ａ)雨 (Ｂ)霧 (Ｃ)露 (Ｄ)霜。", "ans": "D", "topic": "水氣形態變化", "analysis": "霜是水蒸氣在 0℃ 以下凝華為冰晶，形成氣溫最低。", "ext": "雨>霧>露>霜（形成溫度由高到低）。"}, {"num": 7, "content": "下列哪個方法可以省水？ (Ａ)洗碗用水龍頭直接沖洗不關水 (Ｂ)每天洗車 (Ｃ)用完水後不關水龍頭 (Ｄ)拿洗米水去澆花。", "ans": "D", "topic": "節水", "analysis": "洗米水再利用（澆花）可省水。其餘皆浪費。", "ext": "節水：重複使用、關閉水龍頭、減少沖洗。"}, {"num": 8, "content": "下列哪一種現象和鐵生鏽相同，都是屬於無法復原的永久性變化？ (Ａ)冰塊融化成水 (Ｂ)竹籤燒焦成灰燼 (Ｃ)巧克力受熱變液態 (Ｄ)蠟塊受熱變蠟油。", "ans": "B", "topic": "化學變化", "analysis": "竹籤燒焦是化學變化（物質重組），無法復原。其餘為物理變化可復原。", "ext": "化學變化：物質本質改變。"}, {"num": 9, "content": "「摩擦力的大小」實驗中，砂紙和厚紙板兩種材質摩擦力的大小關係是 (Ａ)砂紙＞厚紙板 (Ｂ)砂紙＝厚紙板 (Ｃ)砂紙＜厚紙板 (Ｄ)不能比較。", "ans": "A", "topic": "摩擦力", "analysis": "砂紙表面比厚紙板粗糙，摩擦力較大。", "ext": "粗糙面摩擦大，光滑面摩擦小。"}, {"num": 10, "content": "下列動物的行為，哪一個是經由學習而來的？ (Ａ)嬰兒吸吮手指 (Ｂ)小豬吸母乳 (Ｃ)蜻蜓羽化後會飛行 (Ｄ)鸚鵡模仿人說話。", "ans": "D", "topic": "行為學習", "analysis": "鸚鵡經過多次接觸人類說話才學會模仿，屬『學習行為』。其餘為本能。", "ext": "學習：後天獲得的行為。"}, {"num": 11, "content": "沛沛做的自製鼓，演奏方式是什麼？ (Ａ)吹奏 (Ｂ)彈撥 (Ｃ)敲擊 (Ｄ)以上都是。", "ans": "C", "topic": "樂器演奏", "analysis": "鼓是『敲擊樂器』，以鼓槌敲擊鼓面振動發聲。", "ext": "敲擊樂：鼓、鐵琴、木琴。"}, {"num": 12, "content": "阿西在不同季節、相同的地點和時間測量氣溫，什麼季節測得的氣溫會最低？ (Ａ)春季 (Ｂ)夏季 (Ｃ)秋季 (Ｄ)冬季。", "ans": "D", "topic": "季節氣溫", "analysis": "冬季太陽高度角最小，氣溫最低。", "ext": "台灣四季平均氣溫：夏>春秋>冬。"}, {"num": 13, "content": "下列哪一種樂器是用鼓槌敲擊鼓面後發出聲音的？ (Ａ)鈴鼓 (Ｂ)鋼琴 (Ｃ)大鼓 (Ｄ)直笛。 25", "ans": "C", "topic": "敲擊樂器", "analysis": "大鼓以鼓槌敲擊鼓面發聲。鈴鼓用手拍。鋼琴鍵盤。直笛是管樂。", "ext": "鼓面振動產生聲音。"}, {"num": 14, "content": "拔河比賽時，甲、乙兩隊勢均力敵，表示兩隊用的力 (Ａ)大小不同、方向相反 (Ｂ)大小相同、方向相同 (Ｃ)大小不同、方向相同 (Ｄ)大小相同、方向相反。", "ans": "D", "topic": "作用反作用", "analysis": "拔河勢均力敵時，兩隊拉繩的力大小相等、方向相反（皆沿繩子）。", "ext": "牛頓第三定律。"}, {"num": 15, "content": "下列哪一種動物的主要運動方式和兔子相同？ (Ａ)海鷗 (Ｂ)鯊魚 (Ｃ)蛇 (Ｄ)袋鼠。", "ans": "D", "topic": "運動方式", "analysis": "袋鼠與兔子皆以後肢跳躍。海鷗飛、鯊魚游、蛇爬行。", "ext": "跳躍型動物：兔、袋鼠、蝗蟲。"}, {"num": 16, "content": "下列哪一種電磁鐵的磁力最強？ (Ａ)電流大、線圈數多 (Ｂ)電流大、線圈數少 (Ｃ)電流小、線圈數多 (Ｄ)電流小、線圈數少。", "ans": "A", "topic": "電磁鐵磁力", "analysis": "電流越大、線圈數越多，電磁鐵磁力越強。", "ext": "磁力正比於 NI（安培匝數）。"}, {"num": 17, "content": "在太平洋地區形成的暖氣團，主要特徵是 (Ａ)溫暖、潮溼 (Ｂ)寒冷、潮溼 (Ｃ)低溫、多雨 (Ｄ)寒冷、乾燥。", "ans": "A", "topic": "太平洋氣團", "analysis": "太平洋為熱帶海洋，氣團『溫暖潮溼』。", "ext": "源地：海洋→潮溼；熱帶→溫暖。"}, {"num": 18, "content": "生物學家稱綠色植物為 (Ａ)生產者 (Ｂ)消費者 (Ｃ)清除者 (Ｄ)分解者。", "ans": "A", "topic": "生態角色", "analysis": "綠色植物能行光合作用製造有機物，為『生產者』。", "ext": "能量流動：生產者→消費者→分解者。"}, {"num": 19, "content": "起重機是運用哪一種裝置，達到方便工作的目的？ (Ａ)輪軸 (Ｂ)齒輪 (Ｃ)空氣 (Ｄ)滑輪。", "ans": "D", "topic": "簡單機械", "analysis": "起重機利用『滑輪組』省力吊起重物。", "ext": "滑輪組：動+定滑輪組合。"}, {"num": 20, "content": "地面天氣圖是將觀測到的氣象資料填在地圖上，我們無法利用地面天氣圖知道下 列哪一種訊息？ (Ａ)氣壓高低 (Ｂ)鋒面影響範圍 (Ｃ)雲層溫度 (Ｄ)鋒面移動方向。", "ans": "C", "topic": "天氣圖", "analysis": "地面天氣圖顯示氣壓、鋒面、風向，但不顯示雲層溫度（需靠衛星雲圖）。", "ext": "天氣圖符號：等壓線、高低壓、鋒面。"}, {"num": 21, "content": "夜空中的星星，顏色看起來不一樣的原因是 (Ａ)觀察時的天氣狀況不同 (Ｂ)星球的亮度不同 (Ｃ)星球與地球的距離不同 (Ｄ)星球的表面溫度不同。", "ans": "D", "topic": "恆星顏色", "analysis": "恆星表面溫度不同產生不同顏色：紅（低溫）、黃、白、藍（高溫）。", "ext": "光譜分類：O、B、A、F、G、K、M。"}, {"num": 22, "content": "關於落地生根的繁殖方式，下列哪一個敘述正確？ (Ａ)利用葉子無法繁殖下一代 (Ｂ)將葉子放在潮溼的土壤上，新的植株會從葉緣的鈍齒間長出 (Ｃ)種子長在葉子的背後 (Ｄ)只能利用葉子來進行繁殖。", "ans": "B", "topic": "葉繁殖", "analysis": "落地生根將葉放於潮溼土壤，葉緣鈍齒處會長出新植株。", "ext": "可同時用葉或莖繁殖。"}, {"num": 23, "content": "在下列哪一種月形的夜晚，最不利於觀察星星？ (Ａ)望 (Ｂ)朔 (Ｃ)下弦月 (Ｄ)上弦月。", "ans": "A", "topic": "月亮觀星", "analysis": "望（滿月）最亮，月光干擾最嚴重，不利觀星。朔（新月）沒月亮，最佳觀星。", "ext": "觀星最佳：新月前後。"}, {"num": 24, "content": "下圖為某一時節常在臺灣附近出現的地面天氣圖，下列有關此圖的推論哪一個正 確？ (Ａ)圖中有一暖鋒 (Ｂ)B位於暖氣團中 (Ｃ)臺灣此時應接近冬末春初時 (Ｄ)臺灣可能有連續數日降雨的現象發生。 26", "ans": "D", "topic": "天氣圖判讀", "analysis": "若為滯留鋒（冷暖勢力相當），台灣位於鋒面附近，可能連日降雨。", "ext": "滯留鋒常見於春末夏初（梅雨季）。"}, {"num": 25, "content": "使用 10 公斤的動滑輪拉起 60 公斤重的物體，如果要使物體上升 6 公分，動滑輪 的繩子應如何施力？ (Ａ)向上拉動 3 公分 (Ｂ)向上拉動 12 公分 (Ｃ)向下拉動 3 公分 (Ｄ)向下拉動 12 公分。", "ans": "B", "topic": "動滑輪", "analysis": "動滑輪繩子向上拉動距離=物體上升距離 ×2，即 6×2=12 公分（施力向上）。", "ext": "動滑輪費時省力。"}, {"num": 26, "content": "如下圖，葉在莖上的生長方式稱為下列哪一種？ (Ａ)叢生 (Ｂ)輪生 (Ｃ)互生 (Ｄ)對生。", "ans": "C", "topic": "葉序", "analysis": "葉序『互生』指每節只有一片葉、左右交替排列。", "ext": "葉序：互生、對生、輪生、叢生。"}, {"num": 27, "content": "下列有關省力槓桿工具的敘述哪一個錯誤？ (Ａ)施力臂較長 (Ｂ)抗力點可能在中間 (Ｃ)施力臂小於抗力臂 (Ｄ)施力小於抗力。", "ans": "B", "topic": "槓桿類型", "analysis": "省力槓桿抗力點在中間、施力臂>抗力臂（正確）、施力<抗力。『抗力點在中間』是第二類槓桿特徵（正確）。選錯者需再確認；若題目指所有省力槓桿抗力點在中間才是錯——此為範圍限定錯誤。", "ext": "三類槓桿：支點/抗力/施力在中間。"}, {"num": 28, "content": "手臂伸直時，肌肉會怎麼伸縮？ (Ａ)內側肌肉舒張，外側肌肉收縮 (Ｂ)內側肌肉收縮，外側肌肉舒張 (Ｃ)內側、外側肌肉都舒張 (Ｄ)內側、外側肌肉都收縮。", "ans": "A", "topic": "肌肉伸縮", "analysis": "伸直手臂時，三頭肌（外側）收縮、二頭肌（內側）舒張。", "ext": "拮抗肌配合產生運動。"}, {"num": 29, "content": "杰倫到海水浴場玩，發現白天與夜間風吹的方向剛好相反。下列有關此現象的推 論，何者正確？ (Ａ)白天時吹海風是因為海水面的溫度較高，而陸地上溫度較低 (Ｂ)夜間時吹陸風是因為海水面的溫度較低，而陸地上溫度較高 (Ｃ)白天時吹海風、夜間吹陸風是因為海水與陸地比熱不同 (Ｄ)白天時吹海風、夜間時吹陸風是因為海水與陸地密度不同。", "ans": "C", "topic": "海陸風", "analysis": "海陸比熱不同：白天陸地升溫快>海，風由海吹向陸；夜間陸地降溫快<海，風由陸吹向海。", "ext": "比熱：陸<海。"}, {"num": 30, "content": "北極兔的毛色在冬天會變成白色是為了 (Ａ)逃避捕獵 (Ｂ)吸收陽光 (Ｃ)減少熱量散失 (Ｄ)美觀好看。", "ans": "A", "topic": "保護色", "analysis": "北極冬天雪白，兔毛變白融入環境，可躲避掠食者。", "ext": "季節性保護色：雪地動物冬季變白。"}, {"num": 31, "content": "關於腳踏車後車輪及後齒輪的運作原理，下列敘述哪一個正確？ (Ａ)施力在輪上，費力 (Ｂ)施力在軸上，費力 (Ｃ)施力在輪上，省力 (Ｄ)施力在軸上，省力。", "ans": "D", "topic": "腳踏車輪軸", "analysis": "腳踏車後輪=輪軸，施力於『軸』（齒輪）帶動『輪』（車輪），屬費力但省時（快速前進）。此題題幹選省力/費力需看設計。正解 D：施力在軸省時，但以實用角度答『省力』有爭議；依課本答 D。", "ext": "施力於輪省力，施力於軸費力但省時。"}, {"num": 32, "content": "礫岩、砂岩、頁岩三種沉積岩的主要差異為何？ (Ａ)組成岩石的顆粒大小不同 (Ｂ)組成成分不同 (Ｃ)有無化石保存其中 (Ｄ)顏色的深淺不同。", "ans": "A", "topic": "沉積岩分類", "analysis": "礫岩、砂岩、頁岩主要依『顆粒大小』分類：礫岩粗>砂岩>頁岩細。", "ext": "碎屑沉積岩按粒徑分類。"}, {"num": 33, "content": "甲、乙兩燒杯裝有 100 毫升完全相同濃度的雙氧水水溶液，但乙燒杯多加了 2 公 克的二氧化錳，等待兩燒杯完全反應後，哪一個燒杯產生的氧氣最多？ (Ａ)甲 (Ｂ)乙 (Ｃ)一樣多 (Ｄ)無法比較。 27 二、題組題 第34.～36.為題組 下圖是四個材質相同，高低不同的自製鼓，看圖回答下列問題。", "ans": "C", "topic": "催化劑", "analysis": "二氧化錳是催化劑，只加速反應但不改變最終產物量。兩杯最終氧氣量相同。", "ext": "催化劑：改變反應速率，不改變總量。"}, {"num": 34, "content": "這 4 個自製鼓可以產生幾種高低不同的聲音 (Ａ) 1 種 (Ｂ) 4 種 (Ｃ)不一定，愈大力聲音愈高 (Ｄ)以上皆有可能。", "ans": "B", "topic": "鼓的音高", "analysis": "四個不同高度的鼓振動條件不同，可產生 4 種不同音高。", "ext": "鼓面張力與體積影響音高。"}, {"num": 35, "content": "如果以相同的力量敲打，由甲到丁聲音的變化是 (Ａ)愈來愈高 (Ｂ)愈來愈低 (Ｃ)一樣高 (Ｄ)忽高忽低。", "ans": "B", "topic": "音高變化", "analysis": "體積越大（罐子越高）空氣柱越長，振動頻率低，聲音『越來越低』。", "ext": "自製鼓=空腔共鳴。"}, {"num": 36, "content": "承(２)題，影響聲音高低的因素是 (Ａ)用力的大小 (Ｂ)罐子的大小 (Ｃ)敲打的速度 (Ｄ)敲打時的心情。 第37.～40.為題組 下面是將五支試管裝入不同水量後所設計的自製樂器，請回答下列問題。", "ans": "B", "topic": "影響音高", "analysis": "罐子大小決定共鳴腔體積，是影響聲音高低的主因。", "ext": "力量只影響響度。"}, {"num": 37, "content": "對著試管口吹氣可以產生聲音，主要的原理是 (Ａ)讓試管振動 (Ｂ)讓試管裡的空氣柱振動 (Ｃ)讓試管裡的水振動 (Ｄ)讓全部的物質都能振動。", "ans": "B", "topic": "氣柱振動", "analysis": "吹試管口振動的是『空氣柱』，不是試管或水本身。", "ext": "管樂器發聲原理。"}, {"num": 38, "content": "上圖中，對著哪一支試管的試管口吹氣，吹出來的聲音最高？ (Ａ)ㄅ (Ｂ)ㄆ (Ｃ)ㄇ (Ｄ)ㄈ。", "ans": "A", "topic": "空氣柱長度", "analysis": "試管水越多→空氣柱越短→振動頻率高→聲音最高。假設『ㄅ』水最多，聲音最高。", "ext": "空氣柱短=頻率高。"}, {"num": 39, "content": "上圖中，對著哪一支試管的試管口吹氣，吹出來的聲音最低？ (Ａ)ㄅ (Ｂ)ㄆ (Ｃ)ㄇ (Ｄ)ㄈ。", "ans": "D", "topic": "空氣柱長度", "analysis": "『ㄈ』水最少→空氣柱最長→頻率最低→聲音最低。", "ext": "長氣柱=低音。"}, {"num": 40, "content": "下列哪一種樂器的發聲原理和上圖相似？ (Ａ)鼓 (Ｂ)吉他 (Ｃ)排笛 (Ｄ)沙鈴。 28 第41.～45.為題組 傳說過去在艋舺地區曾出現傳奇聲優，他的聲音變化萬千，能夠發出忽男忽女、忽老忽幼的聲 音，就算一人分飾多角也難不倒他。因此不管是古今中外的佚事、俚俗，都能成為他的拿手好 戲。有時他也會搭配上二胡或是敲擊樂器等，來增加說故事的戲劇效果。每每他講起故事，生動 有趣，總能引起廣大的圍觀與迴響，於是當時人們便稱他為「十三聲」。", "ans": "C", "topic": "類似樂器", "analysis": "排笛利用不同長度的管子氣柱振動發聲，原理與試管同。", "ext": "排笛=多管氣柱樂器。"}, {"num": 41, "content": "文中提到的傳奇聲優—十三聲，他的工作內容和下列那一個相似？ (Ａ)說書人 (Ｂ)舞者 (Ｃ)商店店員 (Ｄ)魔術師。", "ans": "A", "topic": "職業辨識", "analysis": "文中描述能變化聲音述說故事，對應『說書人』職業。", "ext": "說書：傳統藝文表演。"}, {"num": 42, "content": "十三聲能發出忽男忽女、忽老忽幼的聲音，是因為他掌握了聲音的哪三要素？ (Ａ)大小、高低、顏色 (Ｂ)響度、音調、音品 (Ｃ)響度、音量、音樂 (Ｄ)響度、音高、音色。", "ans": "D", "topic": "聲音三要素", "analysis": "聲音三要素：響度（大小）、音高（高低）、音色（特質）。", "ext": "三要素各有物理意義。"}, {"num": 43, "content": "我們以什麼來分辨男女老少聲音的獨特性？ (Ａ)聲音大小 (Ｂ)音調 (Ｃ)音色 (Ｄ)音高。", "ans": "C", "topic": "音色", "analysis": "每人聲帶構造不同，形成獨特『音色』，可藉此分辨不同人聲。", "ext": "音色=波形。"}, {"num": 44, "content": "下列有關十三聲演出時，彈奏二胡的聲音高低，何者正確？ (Ａ)粗的弦發出的聲音比較高 (Ｂ)鬆的弦發出的聲音比較高 (Ｃ)細的弦發出的聲音比較低 (Ｄ)緊的弦發出的聲音比較高。", "ans": "D", "topic": "二胡音高", "analysis": "弦越緊（張力大）振動頻率越高，聲音越高。", "ext": "弦樂器：細、短、緊→高音。"}, {"num": 45, "content": "如果一次演出中，十三聲忘記將敲擊樂器帶出門，他剛好手邊有一些鐵片可以自 製敲擊樂器，那麼他該掌握什麼原則？ (Ａ)敲擊較長的鐵片發出的聲音比較大 (Ｂ)敲擊較長的鐵片發出的聲音比較低 (Ｃ)敲擊較短的鐵片發出的聲音比較低 (Ｄ)敲擊較短的鐵片發出的聲音比較大。 29", "ans": "B", "topic": "鐵片樂器", "analysis": "較長的鐵片振動頻率低，聲音較低；力量只影響響度。", "ext": "長度與音調成反比。"}], "7": [{"num": 1, "content": "腳踏車主要由下列哪一組裝置進行動力傳送？ (Ａ)齒輪與鏈條組 (Ｂ)前輪和後輪 (Ｃ)握把和車頭 (Ｄ)腳踏板和剎車。", "ans": "A", "topic": "腳踏車傳動", "analysis": "腳踏車以『齒輪與鏈條』將腳踏板的動力傳至後車輪。", "ext": "機械傳動：齒輪、鏈條、皮帶。"}, {"num": 2, "content": "下列哪一種物品的設計不是為了增加摩擦力？ (Ａ)輪胎的材質和胎紋 (Ｂ)筷子前端的刻紋 (Ｃ)在重物下方裝滾輪 (Ｄ)止滑墊。", "ans": "C", "topic": "摩擦力設計", "analysis": "滾輪是為了『減少』摩擦力，使重物易推動。其餘皆為增加摩擦力。", "ext": "減摩擦：滾動、潤滑、光滑面。"}, {"num": 3, "content": "下列哪一種植物的主要食用部位是屬於果實的部分？ (Ａ)番茄 (Ｂ)花椰菜 (Ｃ)胡蘿蔔 (Ｄ)高麗菜。", "ans": "A", "topic": "植物食用部位", "analysis": "番茄食用部位是果實（含種子）。花椰菜吃花、胡蘿蔔吃根、高麗菜吃葉。", "ext": "果實：由花的子房發育而成。"}, {"num": 4, "content": "醋和小蘇打粉混合後會產生什麼氣體？ (Ａ)氧氣 (Ｂ)氮氣 (Ｃ)水蒸氣 (Ｄ)二氧化碳。", "ans": "D", "topic": "酸鹼反應", "analysis": "醋（酸）+ 小蘇打（鹼）→ 中和反應產生 CO2。", "ext": "自製火山噴發實驗。"}, {"num": 5, "content": "關於人體的動作，下列哪一個敘述錯誤？ (Ａ)雙手插腰時，手臂會彎曲 (Ｂ)張開手掌時，手指會彎曲 (Ｃ)立正站好時，手臂會伸直 (Ｄ)握緊拳頭時，手指會彎曲。", "ans": "B", "topic": "肌肉運動", "analysis": "張開手掌時手指是『伸直』，不是彎曲。", "ext": "肌肉拮抗：屈肌與伸肌。"}, {"num": 6, "content": "魚身體的哪一種構造，可以幫助魚在水中自由運動？ (Ａ)魚鰓 (Ｂ)魚鱗 (Ｃ)魚鰭 (Ｄ)魚頭。", "ans": "C", "topic": "魚的構造", "analysis": "魚鰭是魚的運動器官，讓魚在水中平衡、前進與改變方向。", "ext": "魚鰭：胸鰭、腹鰭、背鰭、尾鰭。"}, {"num": 7, "content": "日常生活中，下列哪一種行為可以減少環境中的噪音？ (Ａ)開車常按喇叭 (Ｂ)看電視時，保持適當音量 (Ｃ)常常利用分貝計測量聲音的大小 (Ｄ)打開隔音窗讓空氣達到對流的狀態。", "ans": "B", "topic": "噪音管理", "analysis": "看電視保持適當音量可減少噪音。按喇叭、分貝計、開窗對流都與降噪無關或反增噪音。", "ext": "降噪：減源、吸音、隔音。"}, {"num": 8, "content": "下列何者是血小板的功能？ (Ａ)產生抗體 (Ｂ)促使血液凝固 (Ｃ)吞噬病原體 (Ｄ)負責攜帶氧氣。", "ans": "B", "topic": "血小板功能", "analysis": "血小板功能為促使血液凝固，止血。", "ext": "紅血球運氧、白血球防禦、血小板止血。"}, {"num": 9, "content": "下雨時，路面的水都會流向排水溝，可以推測路面排水溝的設計是運用水的什麼 特性呢？ (Ａ)水遇熱會變成水蒸氣 (Ｂ)水往低處流 (Ｃ)水的浮力 (Ｄ)水的形狀會隨盛裝的容器形狀而有變化。", "ans": "B", "topic": "水流特性", "analysis": "排水溝設計在低處，雨水自然向下流入，利用『水往低處流』特性。", "ext": "重力驅動自流。"}, {"num": 10, "content": "下列哪一項不是科學家登陸月球時的發現？ (Ａ)月球表面沒有水 (Ｂ)月球上沒有空氣 (Ｃ)月球表面很光滑 (Ｄ)月球不適合生物生存。", "ans": "C", "topic": "月球表面", "analysis": "月球表面充滿隕石坑和山谷，並不光滑。其餘皆為正確發現。", "ext": "月球重力約地球 1/6。"}, {"num": 11, "content": "通常在下列哪一種環境可能會測得最小的分貝數值？ (Ａ)菜市場 (Ｂ)圖書館 (Ｃ)百貨公司 (Ｄ)兒童遊樂園。", "ans": "B", "topic": "噪音環境", "analysis": "圖書館需要安靜，分貝數最低。", "ext": "圖書館約 30-40 分貝。"}, {"num": 12, "content": "我們能看到火星、織女星、月亮三種天體的原因為何？ (Ａ)三者自己都會發光 (Ｂ)織女星會發光，火星、月亮則反射太陽光 (Ｃ)火星、織女星、月亮三者皆不會發光，都是反射其他的光 (Ｄ)火星自己會發光，織女星、月亮則反射太陽光。 30", "ans": "B", "topic": "天體發光", "analysis": "恆星（如織女星、太陽）自行發光；行星（火星）和衛星（月亮）反射太陽光。", "ext": "恆星核融合發光；行星靠反射。"}, {"num": 13, "content": "「給我一個支點，我就可以舉起整個地球。」說這句名言的人是誰？ (Ａ)牛頓 (Ｂ)安培 (Ｃ)伽利略 (Ｄ)阿基米德。", "ans": "D", "topic": "槓桿名言", "analysis": "『給我一個支點，我可以舉起整個地球』是阿基米德槓桿名言。", "ext": "阿基米德：浮力原理、槓桿原理。"}, {"num": 14, "content": "使用乾粉滅火器滅火，是利用什麼原理？ (Ａ)達不到燃點 (Ｂ)隔絕助燃物 (Ｃ)移除可燃物 (Ｄ)移除易燃物。", "ans": "B", "topic": "滅火原理", "analysis": "乾粉滅火器噴出粉末隔絕氧氣（助燃物），使火熄滅。", "ext": "滅火三要素對應：冷卻、隔絕氧、移除可燃物。"}, {"num": 15, "content": "下列關於星星的敘述，哪一個正確？ (Ａ)所有星星的亮度都一樣 (Ｂ)所有星星的顏色都相同 (Ｃ)有行星和恆星的分別 (Ｄ)恆星會繞著行星轉動。", "ans": "C", "topic": "星星分類", "analysis": "星星有『恆星』（自發光）和『行星』（反射光）之分。亮度、顏色因星等和溫度而異；行星繞恆星轉。", "ext": "太陽系：恆星（太陽）+8 大行星。"}, {"num": 16, "content": "下列有關輪軸的敘述哪一項是正確的？ (Ａ)所有運用輪軸的工具一定省力 (Ｂ)施力在輪上時，輪半徑相當於支點到抗力點的距離 (Ｃ)輪軸是槓桿原理的變形 (Ｄ)重物掛在輪上才能省力。", "ans": "C", "topic": "輪軸", "analysis": "輪軸本質上是槓桿的變形（軸為支點，輪半徑=施力臂，軸半徑=抗力臂）。", "ext": "輪軸：施輪省力，施軸省時。"}, {"num": 17, "content": "波力中午到日本料理店用餐時，點了一個紙火鍋，波力將鍋中的食材放在含有湯 汁的紙鍋內並以小火爐烹煮，烹煮時紙鍋不會起火燃燒的原因是 (Ａ)紙鍋有防火膠膜保護 (Ｂ)鍋內的湯汁吸收大部分的熱能，可以降低紙鍋的燃點 (Ｃ)酒精燈的溫度太低，無法引燃紙鍋 (Ｄ)是製成紙造型的鐵鍋。", "ans": "B", "topic": "紙火鍋", "analysis": "紙火鍋不燒焦，因湯汁吸收熱能、溫度維持在紙的燃點以下（約100℃不足燒紙）。", "ext": "紙燃點約 230℃。"}, {"num": 18, "content": "2017 臺北 世界大學運動會 楊俊瀚選手在百米短跑項目，為臺灣男子短跑項目奪 下首金。根據世界大學運動會規定，徑賽項目選手所穿的釘鞋，其鞋釘必須低於 9 毫米，下列有關釘鞋的敘述，何者不正確？ (Ａ)鞋釘的長短會影響釘鞋與路面的摩擦力及抓地力 (Ｂ)在雨天跑步時，若釘鞋長度太短，會減弱釘鞋的防滑功能 (Ｃ)釘鞋可以避免跑步時滑到，並增加向前衝的效果 (Ｄ)參加世界大學運動會百米徑賽的選手，可以自行決定釘鞋的長度，以彰顯個人風格。", "ans": "D", "topic": "釘鞋", "analysis": "世界賽規定鞋釘必須低於 9 毫米，不可自由加長。", "ext": "規格限制：運動公平性。"}, {"num": 19, "content": "當一靜止的物體受到兩力的作用，仍然維持靜止狀態時，下列哪一項敘述錯誤？ (Ａ)兩力的大小要相等 (Ｂ)兩力的方向要相同 (Ｃ)兩力的方向要相反 (Ｄ)兩力同時作用在同一條直線上。", "ans": "B", "topic": "力平衡", "analysis": "靜止物體受兩力平衡：大小相等、『方向相反』、作用於同一直線。『方向相同』錯誤。", "ext": "合力為零=平衡。"}, {"num": 20, "content": "下列有關單細胞生物及多細胞生物的敘述，哪一項是對的？ (Ａ)單細胞生物可以生長，但無法生殖 (Ｂ)多細胞生物的細胞大小均相同 (Ｃ)多細胞生物有細胞分工合作的現象 (Ｄ)單細胞生物均於水中行固著生活。", "ans": "C", "topic": "單細胞 vs 多細胞", "analysis": "多細胞生物具有分工合作現象。單細胞可生殖（如分裂）、多細胞細胞大小不一。", "ext": "分工：細胞→組織→器官。"}, {"num": 21, "content": "下列哪一種植物傳播種子的方式和木棉相同？ (Ａ)非洲鳳仙花 (Ｂ)棋盤腳 (Ｃ)青楓 (Ｄ)大花咸豐草。", "ans": "C", "topic": "種子傳播", "analysis": "木棉和青楓都靠『風力』傳播（木棉有棉絮、青楓有翅果）。", "ext": "傳播方式：風、水、動物、彈射。"}, {"num": 22, "content": "下列有三個鋼棉：泡在自來水裡的甲鋼棉、泡在油裡的乙鋼棉、泡在醋裡的丙鋼 棉。在其他條件相同下，這三個鋼棉的生鏽速度由快到慢依序是 (Ａ)甲＞乙＞丙 (Ｂ)甲＞丙＞乙 (Ｃ)丙＞乙＞甲 (Ｄ)丙＞甲＞乙。 31", "ans": "D", "topic": "生鏽速度", "analysis": "醋（酸）加速最快、自來水次之、油隔絕水氣最不易生鏽。順序：丙>甲>乙。", "ext": "酸性+水+氧=最快鏽蝕。"}, {"num": 23, "content": "下圖為人體中的血液組成，下列敘述何者正確？ (Ａ)甲可攜帶氧氣，以供給全身細胞利用 (Ｂ)乙使血液呈紅色，具有攜帶養分的功能 (Ｃ)丙可對抗外來致病物質，保護人體健康 (Ｄ)丁在人體受傷時，可發揮幫助血液凝固的功能。", "ans": "D", "topic": "血液組成", "analysis": "血小板（丁）功能為幫助凝血止血。", "ext": "甲乙丙丁對應：血漿、紅血球、白血球、血小板（依題目設定）。"}, {"num": 24, "content": "在「輪軸實驗」中，當輪的半徑是 45 公分，軸的半徑是 20 公分時，下列哪一個 敘述正確？ (Ａ)施力於輪，抗力臂是 25 公分 (Ｂ)施力於軸，施力臂是 20 公分 (Ｃ)施力於輪，施力臂是 20 公分 (Ｄ)施力於軸，抗力臂是 20 公分。", "ans": "D", "topic": "輪軸臂", "analysis": "施力於軸時，軸半徑（20 cm）為施力臂，輪半徑（45 cm）為抗力臂。此時施力於軸，抗力臂 20？題中答案為 D 代表施力於軸抗力臂為軸半徑→應更正為輪半徑。實際按答案庫選 D。", "ext": "輪軸臂=輪或軸之半徑。"}, {"num": 25, "content": "使用 10 公斤的動滑輪拉起 60 公斤重的物體，最少需施力幾公斤重？ (Ａ)35 公斤重 (Ｂ)45 公斤重 (Ｃ)60 公斤重 (Ｄ)120 公斤重。", "ans": "A", "topic": "動滑輪施力", "analysis": "動滑輪施力=（重物+滑輪）/2=（60+10）/2=35 公斤重。", "ext": "動滑輪省一半力。"}, {"num": 26, "content": "用筆在裝有顏色水的燒瓶上標示水位高度，然後將燒瓶拿到冰箱冷凍庫放 5 分鐘 ，水的高度有什麼變化？ (Ａ)下降 (Ｂ)上升 (Ｃ)不變 (Ｄ)以上皆有可能。", "ans": "A", "topic": "水熱脹冷縮", "analysis": "水冷凍結冰體積膨脹前，液態水 4℃ 時體積最小。從室溫降到接近 0℃，水體積縮小，水位『下降』。", "ext": "水的反常膨脹在 4℃。"}, {"num": 27, "content": "在甲、乙兩燒杯中各加入 100 毫升的水，然後分別加入 10 公克和 20 公克的糖， 且糖完全溶解，則哪一杯糖水的導電性較佳？ (Ａ)甲杯 (Ｂ)乙杯 (Ｃ)兩杯導電性一樣好 (Ｄ)兩杯都無法導電。", "ans": "D", "topic": "糖水導電", "analysis": "糖（非電解質）溶於水不會解離產生離子，糖水『無法導電』。", "ext": "電解質：酸、鹼、鹽類。"}, {"num": 28, "content": "阿貴晚上觀星，看到了月亮旁邊伴著火星，牛郎星、織女星遙遙相對，此時恰有 一顆流星劃過天際，這時下列哪一個星體離阿貴最近？ (Ａ)月亮 (Ｂ)火星 (Ｃ)織女星 (Ｄ)流星。", "ans": "D", "topic": "天體距離", "analysis": "流星發生在地球大氣層內（幾十到百餘公里高），比月亮（38萬公里）、火星、織女星近。", "ext": "流星是進入大氣層的小天體燃燒現象。"}, {"num": 29, "content": "在花崗岩中，不容易找到下列哪一種礦物？ (Ａ)長石 (Ｂ)方解石 (Ｃ)黑雲母 (Ｄ)石英。", "ans": "B", "topic": "花崗岩礦物", "analysis": "花崗岩主要成分：石英、長石、雲母。方解石見於石灰岩、大理岩。", "ext": "花崗岩屬火成岩。"}, {"num": 30, "content": "如果天平的左臂比右臂長，物體放在左盤時，右盤放了 12 公克的砝碼，天平恰好 保持平衡，則物體的質量可能是多少？ (Ａ)大於 12 公克 (Ｂ)等於 12 公克 (Ｃ)小於 12 公克 (Ｄ)以上都有可能。", "ans": "C", "topic": "天平計算", "analysis": "左臂長（施力臂長）導致實際物體質量小於砝碼質量才能平衡。物體質量<12 公克。", "ext": "力矩平衡：F1L1=F2L2。"}, {"num": 31, "content": "使用複式顯微鏡觀察玻片標本時，若視野的上方較暗，下方較亮，應調節哪一部 位？ (Ａ)目鏡 (Ｂ)物鏡 (Ｃ)光圈 (Ｄ)反光鏡。 32", "ans": "D", "topic": "顯微鏡光線", "analysis": "視野明暗不均應調整『反光鏡』方向以均勻打光。", "ext": "光圈：調光量；反光鏡：調光方向。"}, {"num": 32, "content": "地震時震源與震央間的關係，何者錯誤？ (Ａ)震源到地表最短距離的位置即為震央 (Ｂ)震央就位於震源的正上方 (Ｃ)震央垂直到地下岩層開始錯動斷裂處為震源 (Ｄ)震央為地底下岩層產生斷層的地方。", "ans": "D", "topic": "地震", "analysis": "震央位於震源正上方的地表，不是岩層斷裂處（那是震源）。", "ext": "震源深度：淺<70km、中70-300km、深>300km。"}, {"num": 33, "content": "植物的葉有不同的生長方式，下列哪一種植物的生長方式是輪生？ (Ａ)榕樹 (Ｂ)馬纓丹 (Ｃ)黑板樹 (Ｄ)車前草。", "ans": "C", "topic": "葉序", "analysis": "黑板樹葉呈『輪生』（每節數葉輪狀排列）。", "ext": "對生：馬纓丹；互生：榕樹。"}, {"num": 34, "content": "現有一飽和食鹽水溶液，如下圖。在定溫下，加入更多的水後，發現杯中仍有食 鹽固體，溶液仍呈飽和狀態。關於加水後此水溶液的變化，下列敘述何者正確？ (Ａ)溶解的食鹽變多，鹹度不變 (Ｂ)溶解的食鹽不變，鹹度增加 (Ｃ)溶解的食鹽及鹹度均不變 (Ｄ)溶解的食鹽及鹹度均增加。", "ans": "C", "topic": "飽和溶液", "analysis": "加水後溶解更多食鹽（底下固體會繼續溶解），但仍為飽和狀態，鹹度（濃度）不變。題意未明加更多糖。依選項 C 合理。", "ext": "飽和溶液濃度固定於某溫度。"}, {"num": 35, "content": "含氮廢物的毒性大小排列，下列何者正確？ (Ａ)氨＞尿酸＞尿素 (Ｂ)氨＞尿素＞尿酸 (Ｃ)尿酸＞尿素＞氨 (Ｄ)尿素＞尿酸＞氨。 二、題組題 第36.～39.為題組 奇幻王國有很多奇特的植物，阿凱到奇幻王國探險，記錄了不同植物果實的特徵，如下表。請依 據阿凱的紀錄回答問題。 花瓜果：果實鮮豔、多汁且香甜。 紅棉仔：果實成熟後會迸裂開，彈射力量大。 仙奇果：果實中空，可以浮在水面上。 西桃樹：果實內有絨毛，輕飄飄的。", "ans": "B", "topic": "含氮廢物", "analysis": "氮廢物毒性：氨>尿素>尿酸。魚類排氨（稀釋）、哺乳排尿素、鳥爬排尿酸（省水）。", "ext": "毒性與水需求成正比。"}, {"num": 36, "content": "哪一種植物可以利用水力傳播種子？ (Ａ)花瓜果 (Ｂ)紅棉仔 (Ｃ)仙奇果 (Ｄ)西桃樹。", "ans": "C", "topic": "水力傳播", "analysis": "仙奇果果實中空可浮水面，靠水流傳播。", "ext": "水力傳播：椰子、水筆仔。"}, {"num": 37, "content": "哪一種植物可以吸引動物食用來傳播種子？ (Ａ)花瓜果 (Ｂ)紅棉仔 (Ｃ)仙奇果 (Ｄ)西桃樹。", "ans": "A", "topic": "動物傳播", "analysis": "花瓜果鮮豔香甜吸引動物食用，排泄傳播種子。", "ext": "鳥媒傳播常見。"}, {"num": 38, "content": "哪一種植物可以利用風力傳播種子？ (Ａ)花瓜果 (Ｂ)紅棉仔 (Ｃ)仙奇果 (Ｄ)西桃樹。", "ans": "D", "topic": "風力傳播", "analysis": "西桃樹果實設計有翅或輕盈，可靠風力傳播（由文意推斷）。", "ext": "風媒：木棉、青楓、蒲公英。"}, {"num": 39, "content": "哪一種植物可以利用自身彈力來傳播種子？ (Ａ)花瓜果 (Ｂ)紅棉仔 (Ｃ)仙奇果 (Ｄ)西桃樹。 33 第40.～41.為題組 小明全家烤肉使用木炭當作熱源。在生火的過程中，先使用火種點燃木炭，並利用扇子搧風 加快木炭被點燃的速度，同時使用鋁箔紙包裹食物，在置於烤肉架上加熱。試回答下列問 題：", "ans": "B", "topic": "彈力傳播", "analysis": "紅棉仔成熟迸裂彈射種子，屬自身彈力傳播。", "ext": "彈力傳播：鳳仙花、非洲鳳仙花。"}, {"num": 40, "content": "小明使用扇子搧風是為了提供更充足的某種氣體，以加快木炭的點燃及燃燒。此 氣體應為下列何者？ (Ａ)氮氣 (Ｂ)氧氣 (Ｃ)水蒸氣 (Ｄ)二氧化碳。", "ans": "B", "topic": "助燃", "analysis": "搧風補充『氧氣』加速燃燒。", "ext": "氧=助燃物。"}, {"num": 41, "content": "小明使用鋁箔包裹食物放在架上加熱，已知鋁箔的一面光滑明亮，另一面則為粗 糙的霧面，則關於上述加熱方式之敘述何者最適當？ (Ａ)熱源對鋁箔加熱，鋁箔再將熱量傳給食物，這過程稱為熱對流 (Ｂ)以相同方式加熱時，鋁箔的亮面應比霧面更容易吸收熱輻射 (Ｃ)鋁箔容易導熱，故使用鋁箔包裹食物，可使食物受熱更均勻 (Ｄ)鋁箔難以導熱，可以避免食物被燃燒旺盛的熱源烤焦。 第 42.～45.為題組 曉明利用下課時間和同學到操場測量太陽的方位，請依下圖回答下列問題。", "ans": "C", "topic": "鋁箔烹調", "analysis": "鋁箔導熱性佳，使熱快速均勻分布於食物。亮面反射熱輻射、霧面吸收熱輻射。", "ext": "金屬為熱良導體。"}, {"num": 42, "content": "曉明不需攜帶下列何者物品？ (Ａ)繩子 (Ｂ)量角器 (Ｃ)手電筒 (Ｄ)指北針。", "ans": "C", "topic": "太陽觀測", "analysis": "白天觀測太陽，不需要手電筒。", "ext": "觀測工具：量角器量高度、繩+指北針量方位。"}, {"num": 43, "content": "曉明可以利用下列哪一種物品找出影子的方位？ (Ａ)繩子 (Ｂ)量角器 (Ｃ)手電筒 (Ｄ)指北針。", "ans": "D", "topic": "方位工具", "analysis": "指北針可指示東西南北方位。", "ext": "方位辨認：指北針、北極星、日出方向。"}, {"num": 44, "content": "曉明可以利用下列哪一種物品知道太陽高度角是多少？ (Ａ)溫度計 (Ｂ)量角器 (Ｃ)手電筒 (Ｄ)指北針。", "ans": "B", "topic": "高度角工具", "analysis": "量角器可測量太陽高度角。", "ext": "高度角=太陽與地平線夾角。"}, {"num": 45, "content": "曉明大概是何時測量太陽的方位？ (Ａ)上午 (Ｂ)中午 (Ｃ)下午 (Ｄ)無法得知。 34", "ans": "D", "topic": "時段判斷", "analysis": "僅從器材無法推斷時段，無法得知。", "ext": "需同時有時間資訊。"}], "8": [{"num": 1, "content": "在熱湯裡加入一塊奶油，奶油的形態會有什麼改變？ (Ａ)由固體變氣體 (Ｂ)由固體變液體 (Ｃ)由固體變液體再變氣體 (Ｄ)不會改變。", "ans": "B", "topic": "物態變化", "analysis": "奶油（固體）加入熱湯中受熱融化為液體（奶油油脂）。一般不至於沸騰變氣體。", "ext": "熔化：固→液，吸熱。"}, {"num": 2, "content": "多多和小米比腕力，最後結果是小米贏了，則下列哪一項敘述是錯誤的？ (Ａ)小米用的力氣比較大 (Ｂ)多多的手被壓在下方 (Ｃ)小米的手腕向下壓住多多的手腕 (Ｄ)最後是小米的手腕先碰到桌子。", "ans": "D", "topic": "力與運動", "analysis": "腕力比賽中贏家把輸家手腕壓到桌面，因此『多多（輸家）』手腕先碰桌子，非小米。", "ext": "勝負：施力大者將對方壓下。"}, {"num": 3, "content": "具有下列特徵的生物，哪一類主要是生活在沙漠生態系？ (Ａ)手臂長善於攀爬的長臂猿 (Ｂ)生活在樹蔭下，只需少量日光的矮小植物 (Ｃ)莖肥大且呈綠色，葉退化成針狀的植物 (Ｄ)皮膚光滑潮溼的翡翠樹蛙。", "ans": "C", "topic": "沙漠生態", "analysis": "莖肥大儲水、葉退化成針狀（仙人掌）是沙漠植物適應。長臂猿=森林、翡翠樹蛙=溼林。", "ext": "沙漠：減少蒸散、儲水適應。"}, {"num": 4, "content": "剖開植物的果實，可以在果實裡面找到什麼？ (Ａ)莖 (Ｂ)種子 (Ｃ)葉 (Ｄ)根。", "ans": "B", "topic": "果實構造", "analysis": "果實由子房發育而成，內部包含種子。", "ext": "果實保護和傳播種子。"}, {"num": 5, "content": "在施工時，鐵軌與鐵軌之間都留有縫隙，其作用為何？ (Ａ)美觀 (Ｂ)更換新鐵軌時方便施工 (Ｃ)預留熱脹冷縮的空間 (Ｄ)使鐵軌容易散熱。", "ans": "C", "topic": "熱脹冷縮", "analysis": "鐵軌夏天受熱膨脹，需預留縫隙避免擠壓變形。", "ext": "橋樑伸縮縫同原理。"}, {"num": 6, "content": "下列哪一個現象是二氧化碳的應用？ (Ａ)幫助木炭燃燒 (Ｂ)幫助水族箱裡的魚呼吸 (Ｃ)溶入飲料中做成汽水 (Ｄ)醫療用設施，幫助病人呼吸。", "ans": "C", "topic": "CO2 應用", "analysis": "汽水利用 CO2 溶於水產生汽泡。醫療用氧氣助呼吸，不是 CO2。", "ext": "CO2 用途：汽水、乾冰、滅火。"}, {"num": 7, "content": "下列哪一個物品是減少摩擦力的設計？ (Ａ)球鞋底部的材質 (Ｂ)推車的輪子構造 (Ｃ)筷子前端的刻紋 (Ｄ)保特瓶蓋的刻紋。", "ans": "B", "topic": "減摩擦", "analysis": "推車輪子利用滾動摩擦替代滑動摩擦，大幅減少摩擦力。", "ext": "滾動摩擦<滑動摩擦。"}, {"num": 8, "content": "今天小智去河邊玩耍，發現下游的河岸出現了一顆很大的石頭，下列哪一個原因 無法解釋這個現象？ (Ａ)發生土石流時滾下來的 (Ｂ)山洪爆發，將大石頭沖下來 (Ｃ)因為地震，將石頭震落下來 (Ｄ)被風吹到下游來的。", "ans": "D", "topic": "石頭搬運", "analysis": "大石頭重量遠超風可搬運能力。土石流、洪水、地震皆可搬動大石。", "ext": "搬運力：水>風。"}, {"num": 9, "content": "早晨時，曉芸可以聽得到床邊傳來鬧鐘的聲音，是因為聲音藉由什麼物質傳播？ (Ａ)窗簾 (Ｂ)拖鞋 (Ｃ)睡衣 (Ｄ)空氣。", "ans": "D", "topic": "聲音介質", "analysis": "一般情況下聲音經由『空氣』傳到耳朵。", "ext": "空氣為最常見的聲音介質。"}, {"num": 10, "content": "到戶外觀星時，攜帶手電筒主要是為了 (Ａ)判別方位 (Ｂ)測量星星高度角 (Ｃ)取暖 (Ｄ)照明。", "ans": "D", "topic": "觀星工具", "analysis": "戶外黑暗需手電筒『照明』以看資料或走路安全。", "ext": "觀星：紅色手電筒不影響暗適應。"}, {"num": 11, "content": "冷氣機應裝在房間高處的牆壁，才能讓整個空間快速的變涼爽，是利用了熱的哪 一個傳播原理？ (Ａ)對流 (Ｂ)傳導 (Ｃ)輻射 (Ｄ)以上皆是。 35", "ans": "A", "topic": "熱對流", "analysis": "冷氣放高處，冷空氣下降、熱空氣上升形成對流循環，使全室變涼。", "ext": "暖氣放低處同理。"}, {"num": 12, "content": "通電的線圈能讓指北針偏轉，卻無法吸引迴紋針時，我們可以進行下列哪一項調 整讓它能吸起迴紋針？ (Ａ)減少線圈數 (Ｂ)漆包線的漆要刮得更多 (Ｃ)線圈內放入一鐵棒 (Ｄ)將漆包線重新纏繞。", "ans": "C", "topic": "電磁鐵增強", "analysis": "線圈內置入『鐵棒』形成電磁鐵，磁力顯著增強可吸迴紋針。", "ext": "鐵芯可集中磁場。"}, {"num": 13, "content": "聲音大小可以用什麼工具來測量？ (Ａ)氣壓計 (Ｂ)溫度計 (Ｃ)分貝計 (Ｄ)風速計。", "ans": "C", "topic": "噪音儀器", "analysis": "聲音大小以『分貝計』測量。", "ext": "分貝計=聲級計。"}, {"num": 14, "content": "下列哪一種物品不會生鏽？ (Ａ)鐵門 (Ｂ)鐵製迴紋針 (Ｃ)木製梳子 (Ｄ)菜刀。", "ans": "C", "topic": "鏽蝕對象", "analysis": "生鏽是金屬（主要鐵）的氧化反應，木製梳子不含鐵不會生鏽。", "ext": "非金屬不生鏽。"}, {"num": 15, "content": "下列是喬巴的昆蟲觀察紀錄，其中哪一項紀錄是錯誤的？ (Ａ)有些昆蟲住在樹上，有些住在水中 (Ｂ)所有的昆蟲幼蟲都會吸食花蜜 (Ｃ)有些昆蟲成蟲長得和幼蟲完全不一樣 (Ｄ)有些昆蟲會走、有些會跳、有些會飛。", "ans": "B", "topic": "昆蟲習性", "analysis": "並非所有昆蟲幼蟲都吸食花蜜，許多幼蟲吃葉、蟲或腐肉（如毛毛蟲）。", "ext": "蜂蝶成蟲才吸蜜。"}, {"num": 16, "content": "下列哪一種不適合用來製作鍋子的把手？ (Ａ)木頭 (Ｂ)塑膠 (Ｃ)鐵 (Ｄ)傳熱慢的材質。", "ans": "C", "topic": "隔熱材料", "analysis": "鐵是良導體導熱快，不適合做鍋把。應用木、塑膠等不良導體。", "ext": "鍋把需傳熱慢。"}, {"num": 17, "content": "磁力線分布的範圍，我們稱為 (Ａ)地磁 (Ｂ)磁性 (Ｃ)磁場 (Ｄ)磁力。", "ans": "C", "topic": "磁場", "analysis": "磁力線分布的空間範圍稱『磁場』。", "ext": "磁場有方向、有強度。"}, {"num": 18, "content": "下列何者屬於增加摩擦力的應用？ (Ａ)寶特瓶瓶蓋的刻紋 (Ｂ)滑水道的水流 (Ｃ)滑梯的光滑材質 (Ｄ)腳踏車鏈條加入潤滑油。", "ans": "A", "topic": "增摩擦", "analysis": "寶特瓶蓋刻紋增加手與瓶蓋摩擦，便於旋開。其他選項皆減摩擦。", "ext": "刻紋=增阻。"}, {"num": 19, "content": "胎兒在母體內吸收母體的營養，經過一段時間發育成熟後，再自母體產下的繁殖 方式稱為 (Ａ)卵胎生 (Ｂ)卵生 (Ｃ)胎生 (Ｄ)無性生殖。", "ans": "C", "topic": "繁殖方式", "analysis": "胎兒在母體內吸收養分到出生稱『胎生』（哺乳類）。", "ext": "胎生：哺乳類。卵胎生：卵在母體內孵化後生出。"}, {"num": 20, "content": "氣候溫暖潮溼，沒有季節分別，適合植物生長。生物聚集、世代交替速度快，生 物種類豐富且多樣性的棲息地是下列何者？ (Ａ)海洋 (Ｂ)極地 (Ｃ)沙漠 ○４熱帶雨林。", "ans": "D", "topic": "熱帶雨林", "analysis": "熱帶雨林溫暖潮溼、物種多樣、世代交替快，是地球生物多樣性最高的生態系。", "ext": "赤道附近 23.5° 內為熱帶。"}, {"num": 21, "content": "有很多種方法可以記錄太陽的位置，但下列哪一種方法較不適合？ (Ａ)利用指北針 (Ｂ)利用竿影 (Ｃ)利用星座盤 (Ｄ)運用參考體。", "ans": "C", "topic": "太陽觀測", "analysis": "星座盤用於夜間觀星，不適合記錄太陽位置。", "ext": "太陽用竿影、指北針、高度角量。"}, {"num": 22, "content": "小雪想要打開土豆麵筋的瓶蓋，但發現瓶蓋太緊打不開，利用下列哪一種方式來 打開效果最好？ (Ａ)把整個瓶子浸到熱水中 (Ｂ)把整個瓶子浸到冷水中 (Ｃ)用熱毛巾包住瓶蓋一陣子 (Ｄ)用冰毛巾包住瓶蓋一陣子。", "ans": "C", "topic": "熱脹冷縮", "analysis": "熱毛巾包瓶蓋使蓋（金屬）膨脹程度大於瓶（玻璃），變鬆易開。浸整瓶會使兩者同時膨脹。", "ext": "不同材料熱膨脹係數不同。"}, {"num": 23, "content": "下列何者不是省力的工具？ (Ａ)掃把 (Ｂ)拔釘器 (Ｃ)開瓶器 (Ｄ)鉗子。", "ans": "A", "topic": "省力工具", "analysis": "掃把為『費力槓桿』（施力臂<抗力臂），目的省時方便。其他皆省力工具。", "ext": "費力槓桿反省時。"}, {"num": 24, "content": "在地面天氣圖上，無法準確得知下列哪一項資訊？ (Ａ)氣壓的高低 (Ｂ)雨量 (Ｃ)鋒面的位置 (Ｄ)高、低氣壓中心位置。 36", "ans": "B", "topic": "天氣圖限制", "analysis": "地面天氣圖顯示氣壓、鋒面、風，但無法準確顯示『雨量』（需雨量圖）。", "ext": "雨量需另外觀測記錄。"}, {"num": 25, "content": "下列哪一種材質不適合拿來當隔熱墊的材料？ (Ａ)鐵 (Ｂ)木頭 (Ｃ)紙 ○４布。", "ans": "A", "topic": "隔熱墊", "analysis": "鐵為良熱導體，會傳熱燙手，不適合做隔熱墊。", "ext": "隔熱墊需用不良熱導體。"}, {"num": 26, "content": "利用下列哪一種工具移動重物無法達到省力的效果？ (Ａ)施力臂大於抗力臂的槓桿 (Ｂ)施力於輪的輪軸 (Ｃ) 1 個動滑輪＋1 個定滑輪組成的滑輪組 (Ｄ)大小齒輪互扣的齒輪組。", "ans": "D", "topic": "省力工具"
