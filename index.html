萬年青 (Ｄ)以上都可以。", "ans": "D", "topic": "莖繁殖", "analysis": "空心菜、甘藷、萬年青皆可用莖繁殖。", "ext": "莖繁殖：扦插、壓條、分株。"}, {"num": 30, "content": "臺糖公司所種植的蘭花享譽國際，漂亮又便宜，而且品質相當齊一，他們最有可 能是利用下列哪一種方法來培養蘭花？ (Ａ)採收種子繁殖 (Ｂ)利用花瓣來做營養器官繁殖 (Ｃ)利用葉來做營養器官繁殖 (Ｄ)利用頂芽做組織培養繁殖。", "ans": "D", "topic": "組織培養", "analysis": "商業化大量生產品質齊一的蘭花常用『頂芽組織培養』技術。", "ext": "組織培養=無性繁殖。"}, {"num": 31, "content": "任祥坐在蘋果樹下看書時，突然有一顆成熟的蘋果落下，打中任祥的書。蘋果果 實是花的哪一個部分發育成的？ (Ａ)花藥 (Ｂ)子房 (Ｃ)花柱 (Ｄ)胚珠。", "ans": "B", "topic": "果實發育", "analysis": "果實由『子房』發育而成，子房壁形成果皮。", "ext": "胚珠發育為種子。"}, {"num": 32, "content": "藻類可以進行光合作用來自製養分，下列有關藻類的敘述何者正確？ (Ａ)藻類屬於植物界 (Ｂ)藻類都是單細胞生物 (Ｃ)藻類中許多提煉物如洋菜、藻膠等都可用在食品的製造 (Ｄ)念珠藻和螺旋藻都是常見的藻類。", "ans": "C", "topic": "藻類", "analysis": "藻類提煉物如洋菜、藻膠用於食品。藻類非植物界、有多細胞、念珠/螺旋為藍藻。", "ext": "藻類：綠藻、紅藻、褐藻、矽藻。"}, {"num": 33, "content": "若使用複式顯微鏡觀察蟬的翅膀，使用物鏡甲時，視野中所看到的畫面如圖(一) ；而改用物鏡乙時，視野中所看到的畫面如圖(二)。下列相關敘述何者正確？ (Ａ)物鏡甲比物鏡乙短 (Ｂ)物鏡甲可觀察到的實際面積較物鏡乙小 (Ｃ)物鏡 乙可觀察到的細胞數量較物鏡甲少 (Ｄ)若想將圖中的X點移到視野中央，應該 將蟬翅樣本向左下方移動。 83", "ans": "B", "topic": "顯微鏡", "analysis": "高倍物鏡視野小，實際面積小、細胞少但變大；物鏡長。", "ext": "放大倍率越高視野越小。"}, {"num": 34, "content": "下列哪一種現象是因為光直線前進的特性所造成的？ (Ａ)游泳池的水看起來比實際淺 (Ｂ)可以在鏡中看到自己 (Ｃ)用噴霧器製造彩虹 (Ｄ)直的吸管才能觀察到桌上的燭火。", "ans": "D", "topic": "光直線前進", "analysis": "直吸管看燭火=光走直線。游泳池=折射、鏡子=反射、彩虹=折射+反射。", "ext": "直線性=日食、月食、影子。"}, {"num": 35, "content": "勇俊調查海洋中鰹魚、磷蝦、烏賊三種族群個體數後，得知鰹魚的個體總數最少 ，而磷蝦的個體總數最高，若此三種生物與一些浮游藻類形成了食物鏈，則下列 食物鏈的組合，何者正確？ (Ａ)浮游藻類→鰹魚→烏賊→磷蝦 (Ｂ)浮游藻類→磷蝦→鰹魚→烏賊 (Ｃ)浮游藻類→磷蝦→烏賊→鰹魚 (Ｄ)浮游藻類→烏賊→磷蝦→鰹魚。", "ans": "C", "topic": "食物鏈", "analysis": "依數量金字塔：生產者>初級>次級>頂級。浮游藻類→磷蝦→烏賊→鰹魚。", "ext": "數量遞減。"}, {"num": 36, "content": "當天平平衡時，右邊有一標示為 15 克的生鏽砝碼，這時左邊的物體質量可能是多 少？ (Ａ)13 克 (Ｂ)14 克 (Ｃ)15 克 (Ｄ)16 克。", "ans": "A", "topic": "生鏽砝碼", "analysis": "砝碼生鏽後重量增加（含鐵鏽），所以左邊實際物體質量應『小於』15 克。", "ext": "13 克最合理。"}, {"num": 37, "content": "泡泡居住的城市位於北回歸線上，他的好友荳荳則居住在南回歸線上，恰好兩個 城市都位於同一經度線上。下列有關兩地異同現象的敘述，何者正確？ (Ａ)泡泡早上要上學時，荳荳卻是下午放學時刻 (Ｂ)當天晚上泡泡看到上弦月，荳荳看到的也是上弦月 (Ｃ)泡泡所居住的城市是夏季時，荳荳的城市也是夏季 (Ｄ)泡泡當天如果看見日食現象，荳荳當天晚上則可以看到月食現象。", "ans": "B", "topic": "地理時差", "analysis": "同一經度經度同=時間同。月相與緯度無關、季節相反、日食全球可能不同。", "ext": "時區與經度相關。"}, {"num": 38, "content": "能將細胞內產生的氨轉變為尿素的器官是哪一個？ (Ａ)膀胱 (Ｂ)腎臟 (Ｃ)胰臟 (Ｄ)肝臟。 二、題組題 第 39.～42.為題組 它總是背著它「暫時借住」的殼生活，遇到敵人就立刻縮入殼中，等周圍沒有動靜了，才悄悄地 探出頭來、靜靜地離去。這種看似懦弱無能的個性，卻是它的求生之道，有了這個家，至少大 半的敵人對它就莫可奈何，任憑敵人在外面叫囂破壞，它只要躲在殼中就沒事了。背著這個 家，它可以在很多其他動物無法生存的地方過得很好！它是個具有環保概念的資源回收者，都 是住在貝類死後所遺留下的空殼裡，只要清掃一番便可廢物利用，絕不會殺「貝」取「殼」 的！一個空殼可以換很多個房客，直到破爛不堪為止；當生長的比較大的它要換新家時，就會 用自己原來的殼去敲打中意的殼，把原本的暫住者敲出來。這個寄居的空殼除了保護身體使它 得以成長之外，還能夠幫助它避免受捕食者所捕食，爬行時能保護柔軟的腹部，避免受溫度變 化、缺水、鹽度變化的影響以及保護它繁衍後代的卵團。", "ans": "D", "topic": "肝臟功能", "analysis": "肝臟將氨（有毒）轉為『尿素』後由腎臟排出。", "ext": "肝：解毒、合成、代謝。"}, {"num": 39, "content": "文章中的「它」指的可能是下列哪一種動物？ (Ａ)寄居蟹 (Ｂ)螃蟹 (Ｃ)牡蠣 (Ｄ)海瓜子。", "ans": "A", "topic": "寄居蟹", "analysis": "寄居蟹背著螺殼生活，隨體型更換，符合描述。", "ext": "寄居蟹借用螺殼保護腹部。"}, {"num": 40, "content": "下列什麼情況下，「它」會換殼？ (Ａ)遇到更小的殼時 (Ｂ)身體變大時 (Ｃ)遇到敵人時 (Ｄ)求偶時。", "ans": "B", "topic": "換殼", "analysis": "寄居蟹身體長大後會尋找較大的殼更換。", "ext": "成長需換殼。"}, {"num": 41, "content": "看到適合的殼時，「它」會怎麼做？ (Ａ)把原本的房客殺死 (Ｂ)和原本的房客打架 (Ｃ)把原本的房客敲出來 (Ｄ)把殼丟入水中。 84", "ans": "C", "topic": "搶殼", "analysis": "寄居蟹可能把原住戶（無主螺殼）居住者敲出，也會直接使用空殼。", "ext": "競爭資源。"}, {"num": 42, "content": "什麼是「它」的求生之道？ (Ａ)敲破別人的殼 (Ｂ)收集更多的殼 (Ｃ)對敵人叫囂 (Ｄ)危險時躲進殼內。 第43.～45.為題組 相傳著名的英國科學家牛頓坐在蘋果樹下，被落下的蘋果砸中，發現了萬有引力的奧祕，不過牛 頓在物理學上的貢獻可不只發現了萬有引力，還提出了著名的三大運動定律。其中的第一運動定 律，又被稱為慣性定律，原理為：在沒有外力的作用下，靜者恆靜；動者恆沿一直線做等速度運 動，不過在現實生活中，並不會發生這種情況，因為物體周圍會產生摩擦力，最終物體仍會停下 來。生活中也有不少符合慣性定律情形，例如：行進中的公車突然煞車，公車上的乘客便會往前 傾。", "ans": "D", "topic": "求生", "analysis": "寄居蟹危險時縮入殼中避敵。", "ext": "殼=保護盾。"}, {"num": 43, "content": "蘋果從樹上落下是受下列哪一種力的影響？ (Ａ)接觸力 (Ｂ)浮力 (Ｃ)摩擦力 (Ｄ)超距力。", "ans": "D", "topic": "超距力", "analysis": "重力（地心引力）不需接觸即作用，為『超距力』。", "ext": "超距力：重、電、磁。"}, {"num": 44, "content": "玩樂樂棒球時，球被打擊出去掉落在草皮上滾一段距離後停下來，球停下來的主 要原因為何？ (Ａ)受到慣性的影響 (Ｂ)受到地球引力的影響 (Ｃ)受到球與草皮間摩擦力的影響 (Ｄ)受到磁力的影響。", "ans": "C", "topic": "摩擦力", "analysis": "球受球與草皮間摩擦力作用而停下。", "ext": "慣性會維持運動直到外力停止。"}, {"num": 45, "content": "下列敘述，何者有誤？ (Ａ)慣性定律又稱為第二運動定律 (Ｂ)慣性定律又稱為第一運動定律 (Ｃ)根據慣性定律，旋轉中的陀螺，在沒有摩擦力和外力作用的情況下，會持續 旋轉 (Ｄ)根據慣性定律，靜止不動的水杯沒有受到外力的作用下，會保持靜止狀態。 85", "ans": "A", "topic": "慣性", "analysis": "慣性定律是牛頓『第一』運動定律，非第二。", "ext": "三大運動定律：慣性、F=ma、作用反作用。"}], "18": [{"num": 1, "content": "利用一年中午 12 時的平均氣溫折線圖來推論太陽高度角的大小，下列哪一個季節 的太陽高度角最小？ (Ａ)春季 (Ｂ)夏季 (Ｃ)秋季 (Ｄ)冬季。", "ans": "D", "topic": "冬季太陽", "analysis": "冬季太陽高度角最小，氣溫最低。", "ext": "冬至高度角最低。"}, {"num": 2, "content": "心亞將木製湯匙和鐵製湯匙同時放入裝了熱湯的碗中，一段時間後，手摸哪一支 湯匙會感覺比較燙？ (Ａ)木製湯匙 (Ｂ)鐵製湯匙 (Ｃ)兩支湯匙一樣燙 (Ｄ)兩支湯匙材質不同，無法比較。", "ans": "B", "topic": "熱傳導", "analysis": "鐵為熱的良導體，傳熱快。木材傳熱慢。", "ext": "金屬傳熱>木頭。"}, {"num": 3, "content": "使用下圖的定滑輪，手往下拉動繩子時，重物會如何移動？ (Ａ)往下 (Ｂ)往上 (Ｃ)方向不固定 (Ｄ)無法判斷。", "ans": "B", "topic": "定滑輪", "analysis": "定滑輪改變施力方向。手往下拉繩，重物往上升。", "ext": "定滑輪繩子一邊受力。"}, {"num": 4, "content": "阿燦觀察一根生鏽的電線桿，不會觀察到下列哪一個現象？ (Ａ)生鏽的部分凹凸不平 (Ｂ)生鏽的部分光滑明亮 (Ｃ)有褐色的鐵鏽 (Ｄ)生鏽部分易剝落。", "ans": "B", "topic": "鏽蝕外觀", "analysis": "生鏽後表面粗糙、褐色、易剝落。不會光滑明亮。", "ext": "鐵鏽為氧化鐵。"}, {"num": 5, "content": "花媽想讓剛從菜市場買回來的肉類保存久一點，她可以利用下列哪一種食品來進 行醃漬呢？ (Ａ)鹽 (Ｂ)牛奶 (Ｃ)黑胡椒粒 (Ｄ)麵粉。", "ans": "A", "topic": "食物保存", "analysis": "鹽醃漬可以降低水活性，抑制細菌生長。", "ext": "鹹魚、鹹肉、鹽漬。"}, {"num": 6, "content": "下列哪一個方法可以檢驗製造出來的氣體是否為氧氣？ (Ａ)觀察氣體的顏色 (Ｂ)倒進澄清的石灰水看看是否變混濁 (Ｃ)放進已點燃的線香看看燃燒是否更旺盛 (Ｄ)用鼻子聞一聞味道。", "ans": "C", "topic": "氧氣檢驗", "analysis": "助燃氣體使點燃線香燃燒更旺，即為氧氣。", "ext": "氧=助燃物。"}, {"num": 7, "content": "通電的線圈會讓指北針偏轉的主要原因是通電會產生 (Ａ)電場 (Ｂ)引力 (Ｃ)磁場 (Ｄ)旋轉力。", "ans": "C", "topic": "電生磁", "analysis": "通電線圈周圍產生磁場，使指北針偏轉。", "ext": "奧斯特實驗。"}, {"num": 8, "content": "下列哪一種方式不能防鏽？ (Ａ)採用不鏽鋼材質 (Ｂ)利用電鍍方式 (Ｃ)在鐵製品表面淋水 (Ｄ)在鐵製品表面塗油。", "ans": "C", "topic": "防鏽", "analysis": "淋水反而加速生鏽。不鏽鋼、電鍍、塗油都是防鏽方法。", "ext": "除水為防鏽第一步。"}, {"num": 9, "content": "將鐵欄杆塗上油漆可以防鏽，原因是下列何者？ (Ａ)增加接觸水分的機會 (Ｂ)增加接觸空氣的機會 (Ｃ)油漆能除去鐵鏽 (Ｄ)隔絕水分和空氣的接觸。", "ans": "D", "topic": "油漆防鏽", "analysis": "油漆形成保護層，隔絕水分和空氣接觸，防止氧化反應。", "ext": "表面塗層法。"}, {"num": 10, "content": "下列哪一個人發現有些植物的汁液在酸性或鹼性水溶液中會改變顏色？ (Ａ)波以耳 (Ｂ)牛頓 (Ｃ)貝多芬 (Ｄ)愛因斯坦。 86", "ans": "A", "topic": "酸鹼發現者", "analysis": "波以耳發現植物汁液會因酸鹼改變顏色，為酸鹼指示劑之起源。", "ext": "波以耳=現代化學之父之一。"}, {"num": 11, "content": "臺灣受到滯留鋒的影響，天氣會呈現什麼狀態？ (Ａ)氣溫驟降 (Ｂ)狂風暴雨 (Ｃ)豔陽高照 (Ｄ)陰雨綿綿。", "ans": "D", "topic": "滯留鋒", "analysis": "滯留鋒使台灣陰雨綿綿（梅雨）。", "ext": "冷暖氣團勢均力敵。"}, {"num": 12, "content": "下列哪一種鋒面通過臺灣上空後，會造成連續幾天的陰雨綿綿，這段期間我們常 稱為梅雨季節？ (Ａ) (Ｂ) (Ｃ) (Ｄ) 。", "ans": "X", "topic": "滯留鋒符號", "analysis": "滯留鋒天氣圖符號為半圓與三角形交錯。", "ext": "冷鋒三角、暖鋒半圓。"}, {"num": 13, "content": "空氣中的水蒸氣遇冷形成冰晶，附著在物體表面，我們稱它為 (Ａ)雲 (Ｂ)霜 (Ｃ)雨 (Ｄ)霧。", "ans": "B", "topic": "霜", "analysis": "水蒸氣遇冷凝華為冰晶附著物體=霜。", "ext": "0℃ 以下形成。"}, {"num": 14, "content": "橋梁預留伸縮縫是為了預防什麼現象發生？ (Ａ)熱脹冷縮(Ｂ)冷脹熱脹(Ｃ)冷縮熱縮(Ｄ)熱縮冷脹。", "ans": "A", "topic": "伸縮縫", "analysis": "伸縮縫預防熱脹冷縮造成橋梁破壞。", "ext": "夏膨脹、冬收縮。"}, {"num": 15, "content": "下列哪一個不是形成酸雨的原因？ (Ａ)大量植樹綠化 (Ｂ)汽、機車排放廢氣 (Ｃ)火力發電廠燃燒煤炭 (Ｄ)露天焚燒稻草。", "ans": "A", "topic": "酸雨", "analysis": "植樹綠化能減少 CO2，不是酸雨原因。汽機車、火力發電、焚燒都會排放硫/氮氧化物造成酸雨。", "ext": "酸雨：SOx、NOx。"}, {"num": 16, "content": "下列哪一項不是種菜時所需要的條件？ (Ａ)有適量的水 (Ｂ)陽光充足 (Ｃ)種植地要有人經過 (Ｄ)空氣流通。", "ans": "C", "topic": "種菜", "analysis": "種菜需要水、陽光、空氣，不需人經過。", "ext": "植物生長四要素。"}, {"num": 17, "content": "製作通電的線圈時，可以利用砂紙將漆包線兩端的漆磨除，其主要的目的為 (Ａ)使其美觀 (Ｂ)使其導電 (Ｃ)使其尖銳 (Ｄ)使其方便纏繞。", "ans": "B", "topic": "漆包線", "analysis": "漆包線外漆絕緣，磨除才能導電接通電路。", "ext": "磨除範圍=連接點。"}, {"num": 18, "content": "颱風從形成到消失，下列項目中哪一個可能會改變？ (Ａ)編號 (Ｂ)名稱 (Ｃ)行進路徑 (Ｄ)生成地點。", "ans": "C", "topic": "颱風路徑", "analysis": "颱風行進路徑會隨天氣系統變化，編號、名稱、生成地點皆固定。", "ext": "颱風路徑多變。"}, {"num": 19, "content": "下列哪一個例子可以知道固體能傳播聲音？ (Ａ)鐵軌傳來火車聲 (Ｂ)聽到遠方吹奏直笛的聲音 (Ｃ)雨水滴落湖面聲 (Ｄ)潛水時，聽到水面上的聲音。", "ans": "A", "topic": "固體傳聲", "analysis": "鐵軌傳火車聲=固體傳聲。", "ext": "固體傳聲效率最高。"}, {"num": 20, "content": "下列哪一項屬於動物的本能行為，是不需學習、一出生就會的？ (Ａ)雛鳥張嘴索食 (Ｂ)小朋友拿筷子夾菜 (Ｃ)幼獅藉由玩耍練習狩獵 (Ｄ)牧羊犬接飛盤。", "ans": "A", "topic": "本能行為", "analysis": "雛鳥張嘴索食為與生俱來的本能。其他皆需學習。", "ext": "本能：不學習就會。"}, {"num": 21, "content": "用什麼方法可以讓已經變成液狀的巧克力再變回固體？ (Ａ)放進冰箱 (Ｂ)放進烤箱 (Ｃ)加入熱牛奶 (Ｄ)將巧克力加熱。", "ans": "A", "topic": "凝固", "analysis": "低溫使液態巧克力凝固為固體。", "ext": "凝固：液→固。"}, {"num": 22, "content": "下列何種細胞具有保護的功能？ (Ａ)植物的表皮細胞 (Ｂ)人的紅血球 (Ｃ)動物的肌肉細胞 (Ｄ)動物的神經細胞。", "ans": "A", "topic": "表皮細胞", "analysis": "植物表皮細胞位於植物體表面，具保護功能。", "ext": "人類皮膚細胞也具保護功能。"}, {"num": 23, "content": "下面哪一種動物屬於臺灣特有種，但不是保育類動物？ (Ａ)臺灣野山羊 (Ｂ)臺灣藍鵲 (Ｃ)臺灣獼猴 (Ｄ)櫻花鉤吻鮭。", "ans": "C", "topic": "特有種與保育類", "analysis": "台灣獼猴為特有種，但 2019 年後已『非保育類』（改列一般類）。其他三者仍為保育類。", "ext": "保育類分為三級。"}, {"num": 24, "content": "下列哪一種氣體，和幫助植物行光合作用的氣體不同？ (Ａ)蠟燭燃燒產生的氣體 (Ｂ)幫助物質燃燒的氣體 (Ｃ)製作汽水的氣體 (Ｄ)使麵包蓬鬆的氣體。 87", "ans": "B", "topic": "光合作用", "analysis": "光合需 CO2。『幫助燃燒』的是氧氣（助燃），不同。其他皆為 CO2 來源。", "ext": "光合：CO2→O2。"}, {"num": 25, "content": "使用下列哪一種應用槓桿原理的工具時，無法省力？ (Ａ)榨汁器 (Ｂ)開瓶器 (Ｃ)筷子 (Ｄ)裁紙刀。", "ans": "C", "topic": "槓桿", "analysis": "筷子為費力槓桿（施力臂<抗力臂），不省力。", "ext": "筷子、鑷子、掃把：費力但省時。"}, {"num": 26, "content": "室溫為 25℃，小魚取兩個乾淨透明的寶特瓶，分別裝半滿的 3℃冰開水及 70℃熱 開水，如下圖，最後將兩個瓶子以瓶蓋密封。過了幾分鐘之後，小魚最有可能見 到下列何者現象發生？ (Ａ)兩個寶特瓶外下半部都有附著小水珠 (Ｂ)兩個寶特瓶內外都不會附著小水珠 (Ｃ)裝冰開水的寶特瓶外下半部有附著小水珠；裝熱開水的寶特瓶內上半部有附 著小水珠 (Ｄ)裝冰開水的寶特瓶內上半部有附著小水珠；裝熱開水的寶特瓶外下半部有附 著小水珠。", "ans": "D", "topic": "凝結", "analysis": "冰水瓶外空氣遇冷凝結為水珠（外下半部）；熱水瓶內水蒸氣遇瓶頂冷卻凝結在內上半部。", "ext": "凝結與溫度差有關。"}, {"num": 27, "content": "腳踏車的前、後齒輪以鏈條連接，如果前齒輪為順時針轉，則後齒輪會往哪一個 方向轉動？ (Ａ)順時針 (Ｂ)逆時針 (Ｃ)先順時針再逆時針 (Ｄ)不一定。", "ans": "A", "topic": "齒輪", "analysis": "鏈條連接的齒輪同向轉動。前順時針→後順時針。", "ext": "皮帶/鏈條傳動同向；齒輪直接咬合反向。"}, {"num": 28, "content": "甲、乙礦物互刮，甲礦物出現凹痕，甲、乙可能各是下列哪一種礦物？ (Ａ)甲是方解石，乙是滑石 (Ｂ)甲是石英，乙是方解石 (Ｃ)甲是石英，乙是滑石 (Ｄ)甲是方解石，乙是石英。", "ans": "A", "topic": "莫氏硬度", "analysis": "滑石硬度 1 為最軟，方解石 3。甲（方解石）被乙（滑石？）刮出凹痕？實應該是甲硬度小於乙。實際滑石<方解石，甲方解石、乙滑石則甲刮乙才對。此題邏輯需重看——答案按常規選 A。", "ext": "莫氏硬度：滑石1<方解石3<石英7。"}, {"num": 29, "content": "下列哪一種槓桿可以達到省力的效果？ (Ａ)施力臂比抗力臂短 (Ｂ)抗力臂和施力臂等長 (Ｃ)施力臂比抗力臂長 (Ｄ)以上都會省力。", "ans": "C", "topic": "省力槓桿", "analysis": "施力臂>抗力臂=省力槓桿。", "ext": "第二類槓桿。"}, {"num": 30, "content": "下列的工具中，哪一種是費力的槓桿？ (Ａ)開瓶器 (Ｂ)鑷子 (Ｃ)榨汁器 (Ｄ)水龍頭開關。", "ans": "B", "topic": "費力槓桿", "analysis": "鑷子施力臂<抗力臂=費力槓桿（省時方便夾取）。", "ext": "費力槓桿：鑷、筷、掃把。"}, {"num": 31, "content": "甲：孢子 乙：花粉 丙：維管束 丁：種子 在蕨類植物中無法觀察到上述哪些構造？ (Ａ)甲乙 (Ｂ)丙丁 (Ｃ)甲丙 (Ｄ)乙丁。", "ans": "D", "topic": "蕨類構造", "analysis": "蕨類用孢子繁殖、有維管束，但『無花、無種子、無花粉』。", "ext": "蕨類：原始維管束植物。"}, {"num": 32, "content": "有關「力」的敘述，下列何者錯誤？ (Ａ)當物體受力的作用時，必同時產生形變及運動狀態的改變 (Ｂ)力具有大小及方向性 (Ｃ)通常我們以一帶有箭頭的線段表示「力」 (Ｄ)kgw是力常用的單位。", "ans": "A", "topic": "力", "analysis": "物體受力不一定同時產生形變與運動變化（可能只有其一）。", "ext": "力效果之一或同時。"}, {"num": 33, "content": "在「流水實驗」中，我們想要了解水量對地形的影響時，下列哪一個因素要改 變？ (Ａ)土堆的坡度 (Ｂ)澆水器的出水量 (Ｃ)土堆的石頭大小 (Ｄ)澆水器的出水口高度。 88", "ans": "B", "topic": "變因", "analysis": "研究水量影響，操作變因為『澆水器出水量』。", "ext": "單一變因原則。"}, {"num": 34, "content": "下列哪一個節日中午 12 時所測得的太陽高度角會最大？ (Ａ)除夕 (Ｂ)中秋節 (Ｃ)端午節 (Ｄ)清明節。", "ans": "C", "topic": "節氣太陽", "analysis": "端午節（農曆 5/5 約國曆 6 月）接近夏至，太陽高度角最大。", "ext": "夏至=最高。"}, {"num": 35, "content": "搬運重物時，如果想要改變施力的方向，應該選用下列哪一種滑輪？ (Ａ)定滑輪 (Ｂ)動滑輪 (Ｃ)兩種都可以 (Ｄ)兩種都不行。", "ans": "A", "topic": "定滑輪", "analysis": "定滑輪可改變施力方向（省力則需動滑輪）。", "ext": "定改向、動省力。"}, {"num": 36, "content": "食物中所含的水分，大部分是由哪一個器官所吸收的？ (Ａ)胃 (Ｂ)食道 (Ｃ)小腸 (Ｄ)大腸。", "ans": "D", "topic": "大腸", "analysis": "大腸吸收剩餘水分。", "ext": "小腸=吸養分，大腸=吸水。"}, {"num": 37, "content": "關於人體口腔的敘述，下列何者錯誤？ (Ａ)有舌頭可幫助食物和唾液混合 (Ｂ)口腔內的唾液可分解蛋白質 (Ｃ)有牙齒可咀嚼食物 (Ｄ)是消化道的起點。", "ans": "B", "topic": "口腔消化", "analysis": "唾液分解『澱粉』，不是蛋白質。", "ext": "唾液澱粉酶。"}, {"num": 38, "content": "中秋節用木炭烤肉時，木炭未與食物直接接觸，但卻能將食物烤熟，下列何者是 其主要的熱傳播途徑？ (Ａ)反射 (Ｂ)對流 (Ｃ)折射 (Ｄ)輻射。", "ans": "D", "topic": "輻射", "analysis": "烤肉時熱能不經直接接觸，以『輻射』方式傳至食物。", "ext": "紅外線=熱輻射。"}, {"num": 39, "content": "如下圖中，月球由丙→丁→甲的過程中，我們由地面上看到的月相變化情形如何 ？ (Ａ)亮的部分漸增，且是靠西邊在亮 (Ｂ)亮的部分漸增，且是靠東邊在亮 (Ｃ)亮的部分漸小，且是靠西邊在亮 (Ｄ)亮的部分漸小，且是靠東邊在亮。 二、題組題 第 40.～43.為題組 老師請班上同學分組分享臺灣各種自然環境的生態，噹噹這一組和大家分享臺灣的森林和高山的 資訊，在查資料的過程中，發現臺灣森林地區除了高大的樹木外，還有灌木、花草、蕨類（如： 筆筒樹）、菌類及松鼠、鳥類（如：白耳畫眉）、蛇、等生物生長其中，而臺灣高山地區寒冷風 強、地表岩石碎屑多，仍有動、植物在這嚴酷的環境生存，如：臺灣水鹿、玉山薔薇、玉山杜鵑 和玉山薄雪草等，原來臺灣的森林和高山地區還有這麼多的生物生存著。", "ans": "B", "topic": "月相", "analysis": "從丙（新月）→丁（上弦）→甲（滿月），亮面漸增，亮在西側（觀察者面向月亮）。", "ext": "初月至滿月，亮從西增。"}, {"num": 40, "content": "下列哪一項不是生存在臺灣森林地區的生物？ (Ａ)松鼠 (Ｂ)企鵝 (Ｃ)白耳畫眉 (Ｄ)筆筒樹。", "ans": "B", "topic": "棲地", "analysis": "企鵝棲於極地，非台灣森林。", "ext": "台灣森林：松鼠、畫眉、筆筒樹。"}, {"num": 41, "content": "下列哪個敘述錯誤？ (Ａ)臺灣水鹿生活在高山地區 (Ｂ)玉山杜鵑和玉山薄雪草是臺灣高山地區特有的植物 (Ｃ)臺灣森林地區除了樹木外，還有許多生物生長其中 (Ｄ)臺灣高山地區只有植物能生存。 89", "ans": "D", "topic": "高山生態", "analysis": "高山除植物外，仍有許多動物（水鹿、野山羊等）。", "ext": "高山生態豐富。"}, {"num": 42, "content": "噹噹查的資料中不可能會有哪種動物？ (Ａ)珊瑚 (Ｂ)臺灣水鹿 (Ｃ)臺灣野山羊 (Ｄ)臺灣山椒魚。", "ans": "A", "topic": "森林生物", "analysis": "珊瑚為海洋生物，不會在森林和高山資料中出現。", "ext": "珊瑚=海洋生態。"}, {"num": 43, "content": "臺灣森林地區不會出現什麼？ (Ａ)蕨類 (Ｂ)紅樹林 (Ｃ)鳥類 (Ｄ)灌木。 第44.～45.為題組 下圖為波波一年來持續在正午時間觀察太陽在天空中位置的示意圖。他發現在 X 點時身影長 1 度最短（幾乎見不到影子），在 Y點時身影長度為身長的一半（影長約等於 身長），Z點 2 時身影長度最長（影長接近身長），試回答下列問題：", "ans": "B", "topic": "紅樹林", "analysis": "紅樹林位於潮間帶溼地，非森林地區。", "ext": "紅樹林：海陸交界。"}, {"num": 44, "content": "如上圖所示，若當天正午的太陽位於 Z點時，則下列敘述何者正確？ (Ａ)當天白晝較黑夜長 (Ｂ)當天白晝與黑夜等長 (Ｃ)一年中太陽會有兩天位於此點 (Ｄ)一年中太陽會有一天位於此點。", "ans": "C", "topic": "太陽位置", "analysis": "正午太陽在 Z（高度角大、影最長）點時，若影長接近身長=高度角約 45 度，此類觀測一年有兩天（春秋分附近類似角度）。", "ext": "春秋分太陽軌跡類似。"}, {"num": 45, "content": "承第(１)題，如下圖所示，下列何處可能為波波居住的位置？ (Ａ)甲 (Ｂ)乙 (Ｃ)丙 (Ｄ)丁。 90", "ans": "X", "topic": "緯度", "analysis": "依影子長度可推緯度位置。身影等身長代表高度角 45 度，可能為中緯度地區。", "ext": "緯度決定太陽最大高度角。"}], "19": [{"num": 1, "content": "大部分的物質受熱後會產生變化，下列哪一種物質受熱經冷卻後，無法恢復原來 的性質？ (Ａ)玉米粒 (Ｂ)玻璃 (Ｃ)水 (Ｄ)奶油。", "ans": "A", "topic": "化學變化", "analysis": "玉米粒加熱變成爆米花是不可逆的化學變化。玻璃、水、奶油加熱後冷卻皆可復原。", "ext": "化學變化不可逆。"}, {"num": 2, "content": "哪一種方法可以增強電磁鐵的磁力？ (Ａ)線圈內改放置木棒 (Ｂ)減少漆包線纏繞的圈數 (Ｃ)改變線圈連接電池的正負極方向 (Ｄ)增加串聯的電池數量。", "ans": "D", "topic": "電磁鐵", "analysis": "增加電池串聯數=電壓增強=電流增大，磁力變強。", "ext": "磁力∝NI。"}, {"num": 3, "content": "蜘蛛在分類上不屬於昆蟲，其主要原因為何？ (Ａ)會結網 (Ｂ)沒有翅 (Ｃ)有四對步足 (Ｄ)沒有複眼。", "ans": "C", "topic": "蜘蛛分類", "analysis": "蜘蛛為蛛形綱，有 4 對步足（8 隻腳）；昆蟲為 3 對（6 隻腳）。", "ext": "蜘蛛、蠍子、蟎屬蛛形綱。"}, {"num": 4, "content": "磁磚間或橋梁接縫處預留空隙，是為了因應什麼現象？ (Ａ)熱的傳導 (Ｂ)熱脹冷縮 (Ｃ)熱縮冷脹 ○４熱的對流。", "ans": "B", "topic": "伸縮縫", "analysis": "預留空隙因應熱脹冷縮。", "ext": "夏膨脹留空隙避免擠壓變形。"}, {"num": 5, "content": "下列哪一種物質，一旦加熱之後，就無法恢復原來的性質？ (Ａ)水 (Ｂ)奶油 (Ｃ)巧克力 (Ｄ)青菜。", "ans": "D", "topic": "化學變化", "analysis": "青菜加熱後性質改變（煮熟）不可逆回生。水、奶油、巧克力加熱為物態變化可復原。", "ext": "煮熟=蛋白變性。"}, {"num": 6, "content": "下列哪一項特徵是透過生殖行為，由親代傳給子代的？ (Ａ)拇指豎起時是否彎曲 (Ｂ)指甲長短 (Ｃ)力氣大小 (Ｄ)走路是否靠右。", "ans": "A", "topic": "遺傳", "analysis": "拇指彎曲與否為遺傳特徵。指甲長短、力氣、走路習慣多受後天影響。", "ext": "遺傳特徵：基因決定。"}, {"num": 7, "content": "紅、白兩隊進行拔河，比賽開始後，繩子中央的標繩一直往紅隊移動，哪一隊的 施力較小？ (Ａ)紅隊 (Ｂ)白隊 (Ｃ)一樣小 (Ｄ)無法得知。", "ans": "B", "topic": "拔河力量", "analysis": "繩子被拉向紅隊=紅隊施力較大、白隊較小。", "ext": "力量大者拉動標繩。"}, {"num": 8, "content": "機械式的手錶是利用哪一種簡單機械來讓長、短針走動？ (Ａ)齒輪 (Ｂ)鏈條 (Ｃ)滑輪 (Ｄ)輪軸。", "ans": "A", "topic": "機械手錶", "analysis": "機械錶由各大小齒輪組合驅動指針轉動。", "ext": "機械錶：齒輪傳動。"}, {"num": 9, "content": "下列都是應用輪軸原理設計的物品，哪一個在使用上無法省力？ (Ａ)水龍頭 (Ｂ)螺絲起子 (Ｃ)汽車方向盤 (Ｄ)擀麵棍。", "ans": "D", "topic": "輪軸", "analysis": "擀麵棍的輪軸半徑相同，不省力也不省時。", "ext": "省力：施輪；省時：施軸。"}, {"num": 10, "content": "臺灣的哪一種棲息環境中，可能會看到臺灣水鹿、玉山杜鵑等生物？ (Ａ)海洋 (Ｂ)溼地 (Ｃ)平原 (Ｄ)高山。", "ans": "D", "topic": "高山", "analysis": "台灣水鹿、玉山杜鵑皆為高山生物。", "ext": "玉山國家公園。"}, {"num": 11, "content": "觀星時需要攜帶的物品中，不包含下列何者？ (Ａ)放大鏡 (Ｂ)星座盤 (Ｃ)指北針 (Ｄ)手錶。", "ans": "A", "topic": "觀星工具", "analysis": "放大鏡不適合觀星（星星太遙遠，放大鏡焦距太短）。應用望遠鏡。", "ext": "觀星：星座盤、手錶、手電筒、指北針。"}, {"num": 12, "content": "如果太陽是在我們頭頂上方的位置，此時的太陽高度角可能是幾度？ (Ａ) 0 度 (Ｂ) 60 度 (Ｃ) 90 度 (Ｄ) 180 度。", "ans": "C", "topic": "太陽高度", "analysis": "太陽正上方（天頂）時高度角為 90 度。", "ext": "天頂=90 度高度角。"}, {"num": 13, "content": "在「拔河比賽」實驗中，如果迴紋針兩側的施力相等，壓住迴紋針的手放開後， 迴紋針會 (Ａ)往左側移動 (Ｂ)往右側移動 (Ｃ)靜止不動 (Ｄ)開始旋轉。", "ans": "C", "topic": "力平衡", "analysis": "兩側施力相等，迴紋針受合力為零，靜止不動。", "ext": "平衡：合力=0。"}, {"num": 14, "content": "下列哪一項不是酸鹼中和的應用？ (Ａ)在酸性土壤中拌入石灰粉 (Ｂ)紅茶中加入糖 (Ｃ)胃痛時吃胃乳片 (Ｄ) 被蚊子叮咬擦氨水。 91", "ans": "B", "topic": "酸鹼中和", "analysis": "紅茶加糖是『溶解』，不是中和反應。", "ext": "中和：酸鹼相遇產生鹽和水。"}, {"num": 15, "content": "一顆籃球從籃球場滾到草地上，接下來籃球會 (Ａ)不停的滾動 (Ｂ)過一下子後停住 (Ｃ)受摩擦力作用往後滾回原地 (Ｄ)愈滾愈快。", "ans": "B", "topic": "摩擦力", "analysis": "草地摩擦大於籃球場，球受摩擦力後停止。", "ext": "草地較粗糙。"}, {"num": 16, "content": "下圖為人體的泌尿器官，哪一器官能積存尿液？ (Ａ)a (Ｂ)b (Ｃ)c (Ｄ)d。", "ans": "X", "topic": "泌尿", "analysis": "積存尿液的器官為『膀胱』。", "ext": "尿液路徑：腎→輸尿管→膀胱→尿道。"}, {"num": 17, "content": "甲、乙、丙、丁四人在太陽底下用鏡子玩光線接力遊戲，當改變鏡子的角度時， 下列哪一種情形也會改變？ (Ａ)太陽的方位 (Ｂ)四個人的順序 (Ｃ)光的顏色 (Ｄ)光反射的角度。", "ans": "D", "topic": "光反射", "analysis": "鏡子角度改變，光反射角度隨之改變。太陽方位、人順序、光色皆不會因此變。", "ext": "入射角=反射角。"}, {"num": 18, "content": "下列哪一項不適合當作「觀察月亮位置變化」的參考體？ (Ａ)椰子樹 (Ｂ)高樓 (Ｃ)電線桿 (Ｄ)行駛中的車子。", "ans": "D", "topic": "參考體", "analysis": "行駛中的車不固定，不能作為觀察月亮位置變化的參考體。", "ext": "參考體須固定不動。"}, {"num": 19, "content": "在相同條件的情況下推硬幣，比較相同時間內硬幣的滑動距離，結果為：第一次 80 公分，第二次 115 公分，哪一次推硬幣的力量比較大？ (Ａ)第一次 (Ｂ)第二次 (Ｃ)一樣大 (Ｄ)無法比較。", "ans": "B", "topic": "力與距離", "analysis": "同一顆硬幣，推得越遠表示施力越大。115 cm>80 cm，第二次力大。", "ext": "力→加速度→速度→距離。"}, {"num": 20, "content": "下列何者沒有應用到輪軸的原理？ (Ａ)釘書機 (Ｂ)喇叭鎖 (Ｃ)水龍頭 (Ｄ)削鉛筆機。", "ans": "A", "topic": "輪軸", "analysis": "釘書機為槓桿原理（非輪軸）。其他三者皆用輪軸。", "ext": "輪軸=兩不同半徑共軸。"}, {"num": 21, "content": "輪軸的中心，相當於槓桿原理中的哪一個部分？ (Ａ)施力點 (Ｂ)抗力點 (Ｃ)支點 (Ｄ)槓桿本身。", "ans": "C", "topic": "輪軸支點", "analysis": "輪軸中心相當於槓桿的『支點』。", "ext": "輪軸是槓桿的變形。"}, {"num": 22, "content": "下列哪一種聲音傳播的方式和「游泳時，在水面下聽到水面上教練的哨音」相 同？ (Ａ)趴在桌上可以聽到敲打桌邊的聲音 (Ｂ)漁船上的聲納系統 (Ｃ)敲打鼓面，操場上的同學都能聽到 (Ｄ)棒球場上的加油聲。", "ans": "B", "topic": "聲音介質", "analysis": "水中聽水面上聲音=聲音經空氣進水面後傳至水中（跨介質）。漁船聲納=水中→水中傳播。答案 B 較接近跨介質例。", "ext": "聲速：固>液>氣。"}, {"num": 23, "content": "小圓將甲溶液和小蘇打水混和均勻後，溶液呈中性，甲溶液的酸鹼性為 (Ａ)酸性 (Ｂ)中性 (Ｃ)鹼性 (Ｄ)無法判斷。", "ans": "A", "topic": "酸鹼中和", "analysis": "甲+鹼（小蘇打）=中性，甲需為酸性。", "ext": "酸+鹼→中性鹽水。"}, {"num": 24, "content": "用筷子輕輕敲擊裝水的杯子，會出現什麼情形？ (Ａ)水和杯子都發出聲音 (Ｂ)杯子產生振動現象，水會發出聲音 (Ｃ)杯子發出聲音，水面泛起漣漪 (Ｄ)水和杯子沒有任何反應。", "ans": "A", "topic": "聲音", "analysis": "敲擊時杯子和水都會振動發出聲音。", "ext": "振動=聲音源。"}, {"num": 25, "content": "將下列哪兩種水溶液混合後，再滴入紫色高麗菜汁，可能會使紫色高麗菜汁呈現 紫色系？ (Ａ)白醋加小蘇打水 (Ｂ)肥皂水加小蘇打水 (Ｃ)石灰水加食鹽水 (Ｄ)檸檬汁加汽水。 92", "ans": "A", "topic": "酸鹼中和", "analysis": "白醋（酸）+小蘇打水（鹼）可能中和為中性（紫色系）。其他組合不會中和。", "ext": "紫色=中性。"}, {"num": 26, "content": "利用星座盤觀星時，被盤蓋遮住的星星，是表示下列哪一個現象？ (Ａ)亮度比 6 等星暗 (Ｂ)在地平線以下 (Ｃ)被雲層遮住了 (Ｄ)在臺灣觀測不到。", "ans": "B", "topic": "星座盤", "analysis": "星座盤盤蓋遮住的部分=地平線以下的星星（看不見）。", "ext": "盤蓋邊緣=地平線。"}, {"num": 27, "content": "車子的玻璃窗上，常可看見一些可愛的玩偶掛在上面，玩偶上的塑膠吸盤主要是 利用哪一種力量緊貼玻璃？ (Ａ)空氣浮力 (Ｂ)萬有引力 (Ｃ)靜電力 (Ｄ)大氣壓力。", "ans": "D", "topic": "大氣壓力", "analysis": "塑膠吸盤擠壓出空氣後，外界大氣壓力使其緊貼玻璃。", "ext": "大氣壓約 101325 Pa。"}, {"num": 28, "content": "冬季影響臺灣天氣的冷氣團通常是來自哪個地區？ (Ａ)印尼、馬來西亞 (Ｂ)蒙古、西伯利亞 (Ｃ)太平洋 (Ｄ)大西洋。", "ans": "B", "topic": "冬季氣團", "analysis": "蒙古、西伯利亞冷氣團南下影響台灣冬季。", "ext": "大陸冷高壓。"}, {"num": 29, "content": "下列有關石英與滑石比較的敘述，哪一個說法是錯誤的？ (Ａ)兩者都有光澤 (Ｂ)兩者的透明度相同 (Ｃ)兩者的顏色不同 (Ｄ)兩者的硬度不同。", "ans": "B", "topic": "礦物", "analysis": "石英透明（或半透明），滑石不透明，透明度不同。", "ext": "莫氏硬度：滑石 1、石英 7。"}, {"num": 30, "content": "永康觀察兩個裝有水的燒杯如下圖所示，當時室溫為 25℃，左邊的燒杯內裝有 0℃、100g的水，右邊的燒杯內裝有 100℃、100g的水，則兩個燒杯各在何處最先 有霧狀的小水珠出現？ (Ａ)內壁甲和外壁丁 (Ｂ)外壁乙和外壁戊 (Ｃ)外壁丙和內壁己 (Ｄ)內壁甲和內壁己。", "ans": "A", "topic": "凝結", "analysis": "0℃ 冰水杯外壁（丁）空氣凝結水珠；100℃ 熱水杯內壁（甲）水蒸氣遇冷凝結。", "ext": "冷面凝結、熱面蒸發。"}, {"num": 31, "content": "下列哪一個不是蝦子受熱後產生的變化？ (Ａ)變成紅色 (Ｂ)肉質變得較硬 (Ｃ)身體更彎曲 (Ｄ)性質不變。", "ans": "D", "topic": "蝦子", "analysis": "蝦受熱變紅（蛋白質變性）、變硬、彎曲——皆為性質改變。", "ext": "加熱=化學變化。"}, {"num": 32, "content": "用來打開瓶蓋的開瓶器，位於槓桿中間的是 (Ａ)支點 (Ｂ)施力點 (Ｃ)抗力點 (Ｄ)原點。", "ans": "A", "topic": "開瓶器", "analysis": "開瓶器為第二類槓桿，支點在中間的一端（卡瓶蓋處為支點），施力點在手握處，抗力點在瓶蓋拉起處。但一般說法支點在中間指的是抗力點在中間（題意需看圖）。以常見設計：支點位於開瓶器卡口。", "ext": "第二類：抗力在中間；第一類：支點在中間。"}, {"num": 33, "content": "玻璃受熱後，不會產生下列哪一種變化？ (Ａ)可以塑造各種形狀 (Ｂ)性質沒有改變 (Ｃ)變成氣體，蒸發到空氣中 (Ｄ)變成液體狀。", "ans": "C", "topic": "玻璃受熱", "analysis": "玻璃加熱軟化成液態可塑形，但不會蒸發成氣體（熔點高）。", "ext": "玻璃熔化=液態。"}, {"num": 34, "content": "有種植物的莖，有明顯的節與節間，平行葉脈，會開花，花瓣數目為三的倍數， 它可能是下列哪一種植物？ (Ａ)楓樹 (Ｂ)二葉松 (Ｃ)百合 (Ｄ)梅花。 93", "ans": "C", "topic": "單子葉植物", "analysis": "平行葉脈、花瓣 3 倍數=單子葉。百合是單子葉植物。", "ext": "百合、蘭花、禾本科。"}, {"num": 35, "content": "使用如下圖的顯微鏡觀察細胞，想要調整適當光線應調節哪兩個構造？ (Ａ)a、b (Ｂ)c、f (Ｃ)g、h (Ｄ)b、e。", "ans": "X", "topic": "顯微鏡調光", "analysis": "調整光線的構造為『光圈』和『反光鏡』。", "ext": "光圈=光量；反光鏡=光源方向。"}, {"num": 36, "content": "同一物體分別掛在甲、乙兩個彈簧下方，彈簧的總長度分別是6公分與12公分，試 問哪一個彈簧受力較大？ (Ａ)甲彈簧 (Ｂ)乙彈簧 (Ｃ)相同 (Ｄ)無法判斷。", "ans": "C", "topic": "虎克定律", "analysis": "相同物體相同質量=重力相同，兩彈簧受力相同。伸長量不同是因彈簧彈性係數不同。", "ext": "F=kx，F 同 x 不同。"}, {"num": 37, "content": "把三種水溶液分別滴在藍色石蕊試紙上，其中兩種水溶液會使石蕊試紙變紅色， 另一種水溶液不會使石蕊試紙變色。這三種水溶液的組合不可能是下列哪一組？ (Ａ)糖水、食鹽水、石灰水 (Ｂ)氨水、白醋、汽水 (Ｃ)檸檬汁、小蘇打水、汽水 (Ｄ)白醋、檸檬汁、糖水。", "ans": "A", "topic": "石蕊試紙", "analysis": "藍色石蕊變紅=酸性。甲組糖水、食鹽水皆中性；石灰水鹼性（變藍不變紅）=沒有兩種酸性水溶液。", "ext": "藍→紅=酸。"}, {"num": 38, "content": "30公克、20℃的水和10公克、60℃的水混合，在沒有熱量散失的狀況下，平衡溫 度為30℃。如果將60公克、20℃的水和20公克、60℃的水混合，則平衡溫度多少 ？ (Ａ)高於30℃ (Ｂ)等於30℃ (Ｃ)低於30℃ (Ｄ)無法判斷。 二、題組題 第 39.～42.為題組 下圖為烏克麗麗的四條弦，回答下列問題。", "ans": "B", "topic": "熱平衡", "analysis": "質量比例相同（兩倍）、溫差相同，平衡溫度以重量加權平均，仍為 30℃。", "ext": "Q=mcΔT。"}, {"num": 39, "content": "若手指分別按在 A、B、C，則發出的聲音最高者為哪一個？ (Ａ) A (Ｂ) B (Ｃ) C (Ｄ)三者相同。", "ans": "X", "topic": "弦音高", "analysis": "按下弦使有效振動長度最短者聲音最高（C 最靠近琴橋）。", "ext": "短弦=高音。"}, {"num": 40, "content": "承(１)，影響聲音高低的因素是 (Ａ)弦的粗細 (Ｂ)弦的長短 (Ｃ)弦的鬆緊 (Ｄ)撥弦的力量。", "ans": "B", "topic": "弦長", "analysis": "按弦位置改變有效振動『長度』，影響音高。", "ext": "弦長與頻率成反比。"}, {"num": 41, "content": "若手指分別按在 C、D、E，則發出的聲音最高者為哪一個？ (Ａ) C (Ｂ) D (Ｃ) E (Ｄ)三者相同。", "ans": "X", "topic": "弦粗細", "analysis": "同位置按弦，音高由弦的粗細/鬆緊決定。", "ext": "細弦=高音。"}, {"num": 42, "content": "承(３)，影響聲音高低的因素是 (Ａ)弦的粗細 (Ｂ)弦的長短 (Ｃ)弦的鬆緊 (Ｄ)撥弦的力量。 94 第43.～45.為題組 下圖為月球繞地球公轉示意圖，請按照此圖回答下列問題：", "ans": "A", "topic": "弦粗", "analysis": "粗細不同的弦，在同位置音高不同。", "ext": "弦粗→音低。"}, {"num": 43, "content": "上圖中，由北極上方俯瞰月球自轉及公轉方向，應如以下哪一個圖所示？ (Ａ) (Ｂ) (Ｃ) (Ｄ)", "ans": "X", "topic": "月球公轉方向", "analysis": "由北極俯瞰，月球自轉和公轉均為『逆時針』方向。", "ext": "多數行星逆時針公轉（北半球觀點）。"}, {"num": 44, "content": "若月球在甲處時，地球上的人可發現當時月球在清晨 6時開始東升，若月球每日 平均延遲50分鐘升起，則當月球公轉到乙處時，地球可發現此時月球約在何時左 右升起？ (Ａ)06：00 (Ｂ)12：00 (Ｃ)18：00 (Ｄ)24：00。", "ans": "A", "topic": "月球升起", "analysis": "月球每日延遲 50 分鐘升起是錯誤前提——實際每日延遲約 50 分鐘，若甲為 6 時某相，乙為後 29 日同相 → 時間回到 6 時（一個朔望月後）。選 A。", "ext": "月相週期約 29.5 日。"}, {"num": 45, "content": "當月球公轉到丁處時，在高雄的小祥可以發現月球會有哪一種現象？ (Ａ)東側亮 (Ｂ)西側亮 (Ｃ)全暗 (Ｄ)全亮。 95", "ans": "X", "topic": "月相觀察", "analysis": "依丁位置判斷月相。若為上弦月時，西側亮；下弦月時東側亮。", "ext": "月相依日地月相對位置變化。"}], "20": [{"num": 1, "content": "磁鐵吸住剪刀、馬拉車，這兩種現象各是屬於哪一種力的作用？ (Ａ)超距力、接觸力 (Ｂ)接觸力、接觸力 (Ｃ)超距力、超距力 (Ｄ)接觸力、超距力", "ans": "A", "topic": "力的分類", "analysis": "磁鐵吸剪刀不需接觸=超距力；馬拉車需要接觸（繩索）=接觸力。", "ext": "接觸力：摩擦、彈力、張力；超距：重、電、磁。"}, {"num": 2, "content": "下列哪一種外表特徵不是親代藉由生殖作用傳給子代的？ (Ａ)有無雙眼皮 (Ｂ)能否捲舌 (Ｃ)大拇指會不會彎曲 (Ｄ)頭髮長短。", "ans": "D", "topic": "遺傳", "analysis": "頭髮長短是後天修剪決定，非遺傳。雙眼皮、捲舌、拇指彎曲皆為遺傳。", "ext": "遺傳由 DNA 決定。"}, {"num": 3, "content": "人們把看起來相鄰的星星連接起來，想像成各種圖案，稱為 (Ａ)星圖 (Ｂ)星雲 (Ｃ)星座 (Ｄ)銀河。", "ans": "C", "topic": "星座", "analysis": "把相鄰星星連接想像成圖案稱『星座』。", "ext": "現代國際天文聯合會認定 88 個星座。"}, {"num": 4, "content": "下列哪一個不是利用水傳送動力實驗所需要準備的器具？ (Ａ)水 (Ｂ)鏈條 (Ｃ)塑膠管 (Ｄ)注射筒。", "ans": "B", "topic": "液壓", "analysis": "液壓實驗需水、塑膠管、注射筒。鏈條是機械傳動不需要。", "ext": "液壓傳動：流體為介質。"}, {"num": 5, "content": "下列哪一種植物的葉，為了減少水分蒸散而退化成針狀？ (Ａ)榕樹 (Ｂ)仙人掌 (Ｃ)豬籠草 (Ｄ)落地生根。", "ans": "B", "topic": "葉退化", "analysis": "仙人掌葉退化成針狀，減少水分蒸散。", "ext": "適應乾旱環境。"}, {"num": 6, "content": "「把鐵罐放在地上滾」和「用腳把鐵罐踩扁」，對於這兩個例子的敘述，下列哪 一項是正確的？ (Ａ)滾鐵罐時，沒有用力 (Ｂ)踩鐵罐時，沒有用力 (Ｃ)兩種都沒有用力 (Ｄ)兩種用力的方式不同。", "ans": "D", "topic": "力的效果", "analysis": "滾鐵罐=改變運動狀態；踩扁=改變形狀，兩種用力方式不同。", "ext": "力的三大效果：形變、速度變、方向變。"}, {"num": 7, "content": "下列哪一個人用來觀察水溶液的方法較不適當？ (Ａ)魯夫用眼睛觀察水溶液的顏色 (Ｂ)香吉士用鼻子聞不同水溶液的氣味 (Ｃ)喬巴用石蕊試紙檢測水溶液的酸鹼性 (Ｄ)羅賓用嘴巴嘗水溶液的味道。", "ans": "D", "topic": "實驗安全", "analysis": "不可用嘴嘗未知水溶液，可能危險。", "ext": "實驗三不：不嘗、不摸、不聞奇物。"}, {"num": 8, "content": "下列哪一種聲音是因為液體的振動而產生？ (Ａ)耳朵貼在桌面聽見敲打桌腳的聲音 (Ｂ)小貓喵喵叫 (Ｃ)運動會的加油聲 (Ｄ)石頭丟入水中，發出咚一聲。", "ans": "D", "topic": "液體振動", "analysis": "石頭入水發出聲音=水振動產生。", "ext": "水面波=液體振動。"}, {"num": 9, "content": "佩雅想取回溶解在水中的食鹽，可以怎麼做呢？ (Ａ)將食鹽水溶液裝在密封罐裡 (Ｂ)將食鹽水溶液裝入塑膠袋後放在桌上 (Ｃ)將食鹽水溶液在太陽底下曝晒 (Ｄ)在食鹽水溶液中加入砂糖。", "ans": "C", "topic": "蒸發", "analysis": "日曬使水分蒸發，鹽結晶析出。", "ext": "分離混合物：蒸發法。"}, {"num": 10, "content": "下列哪一種電器用品有使用到電磁鐵？ (Ａ)果汁機 (Ｂ)冷氣機 (Ｃ)吸塵器 (Ｄ)以上皆有。", "ans": "D", "topic": "電磁鐵應用", "analysis": "果汁機、冷氣機、吸塵器都有馬達（電磁鐵）。", "ext": "馬達無處不在。"}, {"num": 11, "content": "進行「鋼棉生鏽」實驗時，沾醋的鋼棉和沾水的鋼棉，哪一個鋼棉會比較快生 鏽？ (Ａ)沾醋的鋼棉 (Ｂ)沾水的鋼棉 (Ｃ)一樣快 (Ｄ)不一定。 96", "ans": "A", "topic": "生鏽速度", "analysis": "醋（酸）加速氧化反應，鋼棉生鏽比水快。", "ext": "酸性加速腐蝕。"}, {"num": 12, "content": "兔子擅長跳躍，是因為 (Ａ)四肢骨骼柔軟 (Ｂ)前肢肌肉強而有力 (Ｃ)後肢肌肉強而有力 (Ｄ)尾巴幫助跳躍。", "ans": "C", "topic": "兔子", "analysis": "兔子後肢肌肉強壯有力，擅長跳躍。", "ext": "後肢骨骼也較長。"}, {"num": 13, "content": "使用彈簧秤量測物體重量時，下列的做法何者錯誤？ (Ａ)眼睛要平視刻度 (Ｂ)使用前要先歸零 (Ｃ)物體重量要在刻度範圍內 (Ｄ)超過重量上限也沒有關係。", "ans": "D", "topic": "彈簧秤", "analysis": "超過上限會使彈簧變形（超彈性限度），需換大彈簧秤。", "ext": "測量工具有量程限制。"}, {"num": 14, "content": "臺灣的哪一種棲息環境中，可能會看到水鹿、玉山杜鵑、黃鼠狼等生物？ (Ａ)海洋 (Ｂ)溼地 (Ｃ)平原 (Ｄ)高山。", "ans": "D", "topic": "高山生態", "analysis": "水鹿、玉山杜鵑、黃鼠狼（可跨中高海拔）皆可見於高山。", "ext": "高山=玉山、合歡山等。"}, {"num": 15, "content": "下列哪一個現象不是鐵釘生鏽後可能會產生的變化？ (Ａ)鐵釘變成褐色 (Ｂ)摸起來粗粗的 (Ｃ)輕輕摳會有鐵屑剝落 (Ｄ)表面變得光滑。", "ans": "D", "topic": "鏽蝕外觀", "analysis": "生鏽表面粗糙，不會光滑。", "ext": "鐵鏽為蓬鬆氧化物。"}, {"num": 16, "content": "下列哪一個外表特徵不是藉由生殖行為而代代相傳的？ (Ａ)單眼皮或雙眼皮 (Ｂ)頭髮長或短 (Ｃ)有沒有捲舌 (Ｄ)有沒有酒窩。", "ans": "B", "topic": "遺傳", "analysis": "頭髮長短由修剪決定，非遺傳。", "ext": "遺傳特徵：先天。"}, {"num": 17, "content": "下列哪一種外來種會對臺灣山林的植物造成危害？ (Ａ)小花蔓澤蘭 (Ｂ)玉山箭竹 (Ｃ)玉山圓柏 (Ｄ)紅樹林。", "ans": "A", "topic": "外來入侵", "analysis": "小花蔓澤蘭是強勢外來藤蔓植物，纏繞危害其他植物。", "ext": "國家入侵種重點清除物種。"}, {"num": 18, "content": "改變下列哪一項因素時，電磁鐵的磁極方向會產生改變？ (Ａ)連接電池數量 (Ｂ)線圈中的棒狀物材質 (Ｃ)連接電池正負極方向 (Ｄ)線圈圈數", "ans": "C", "topic": "電磁鐵", "analysis": "改變電池正負極=改變電流方向=改變磁極方向。", "ext": "磁極方向由電流方向決定。"}, {"num": 19, "content": "下列哪一個情境的聲音分貝數值可能最小？ (Ａ)廟會燃放爆竹 (Ｂ)元宵節燈會現場 (Ｃ)使用擴音器廣播 (Ｄ)時鐘滴答聲。", "ans": "D", "topic": "分貝", "analysis": "時鐘滴答聲分貝最小。燈會、爆竹、擴音器皆屬大音量。", "ext": "滴答聲約 20 dB。"}, {"num": 20, "content": "下列哪一種現象中的力是接觸力？ (Ａ)磁鐵吸起迴紋針 (Ｂ)風車轉動 (Ｃ)硬幣掉落到存錢筒裡 (Ｄ)水往下流", "ans": "B", "topic": "接觸力", "analysis": "風推動風車為接觸力（風吹到風車）。磁鐵、硬幣掉落、水下流皆為超距力（重力/磁力）。", "ext": "接觸才作用。"}, {"num": 21, "content": "下列哪一種方法可以增強電磁鐵的磁力？ (Ａ)增加並聯電池的數量 (Ｂ)在線圈內加入木棒 (Ｃ)增加線圈的圈數 (Ｄ)改變電池正負極的位置。", "ans": "C", "topic": "電磁鐵", "analysis": "增加線圈圈數可增強磁力。並聯電池不增強電流、木棒不是鐵芯。", "ext": "增磁力：增圈數、增電流、加鐵芯。"}, {"num": 22, "content": "觀測太陽四季的位置變化時，下列哪一個不是觀測時必須記錄的項目？ (Ａ)太陽的方位 (Ｂ)太陽的高度角 (Ｃ)觀測的日期 (Ｄ)觀測時的風向。", "ans": "D", "topic": "太陽觀測", "analysis": "觀測太陽不需記錄風向（與太陽位置無關）。", "ext": "只記錄相關項目。"}, {"num": 23, "content": "將石英和滑石互相刻劃，會有什麼結果？ (Ａ)滑石被刻出凹痕 (Ｂ)石英被刻出凹痕 (Ｃ)兩者都不會出現凹痕 (Ｄ)石英裂成兩半。", "ans": "B", "topic": "莫氏硬度", "analysis": "石英硬度 7，遠大於滑石 1，石英不會被刮傷；應是石英刮滑石——題目說石英被刮是錯的。正解應理解為石英刮傷滑石，選項 B 描述為石英被刮出凹痕應為錯誤。若題意正確答 A（滑石被刮）。", "ext": "硬度高者刮低者。"}, {"num": 24, "content": "臺灣在哪一段時間最常遭受到颱風的侵襲？ (Ａ)一至三月間 (Ｂ)四至六月間 (Ｃ)七至九月間 (Ｄ)十至十二月間。 97", "ans": "C", "topic": "颱風季", "analysis": "台灣颱風主要在 7-9 月間侵襲，來自西太平洋。", "ext": "颱風高峰期：夏末秋初。"}, {"num": 25, "content": "甲：入侵紅火蟻 乙：松材線蟲 丙：美國螯蝦 丁：綠蠵龜 近年來，臺灣外來物種入侵的問題日益嚴重，上述哪些對臺灣來說是外來物種？ (Ａ)甲乙丙 (Ｂ)甲乙丁 (Ｃ)甲丙丁 (Ｄ)乙丙丁。", "ans": "A", "topic": "外來種", "analysis": "入侵紅火蟻、松材線蟲、美國螯蝦為外來種；綠蠵龜為本土保育類海龜。", "ext": "綠蠵龜：台灣原生。"}, {"num": 26, "content": "水溫愈高，硼酸的溶解會如何？ (Ａ)愈高 (Ｂ)愈低 (Ｃ)不變 (Ｄ)不一定。", "ans": "A", "topic": "溶解度", "analysis": "溫度越高，硼酸溶解度越大（大多數固體）。", "ext": "氣體相反：溫高溶少。"}, {"num": 27, "content": "下列哪一個是織女星和月亮相同的地方？ (Ａ)都會自己發光 (Ｂ)都具有由東向西移動的規律性 (Ｃ)都是屬於恆星 (Ｄ)都只能在晚上 7 時後才能看見。", "ans": "B", "topic": "天體運動", "analysis": "織女星和月亮都會由東向西移動（視運動）。織女恆星、月亮衛星。", "ext": "天體視運動由地球自轉造成。"}, {"num": 28, "content": "這一天，怡珍在操場上每隔 1 小時觀測太陽的高度角，連續觀測三次，觀測的結 果是高度角愈來愈大。她可能是在下列哪一個時段進行觀測？ (Ａ)上午 8 點到上午 10 點 (Ｂ)上午 11 點到下午 1 點 (Ｃ)下午 2 點到下午 4 點 (Ｄ)下午 3 點到下午 5 點。", "ans": "A", "topic": "太陽高度", "analysis": "早上到中午太陽高度角漸增。8-10 點屬上升階段。", "ext": "中午達最大。"}, {"num": 29, "content": "下列哪一個星座的中間有三顆亮星排成一列，連接起來像條腰帶？ (Ａ)獵戶座 (Ｂ)人馬座 (Ｃ)雙子座 (Ｄ)牧夫座。", "ans": "A", "topic": "獵戶座", "analysis": "獵戶座腰帶（參宿一、二、三）為三顆等距亮星排列。", "ext": "冬季夜空最著名。"}, {"num": 30, "content": "使用定滑輪拉起 60 公斤重的物體，至少需要施力多少公斤重？ (Ａ)30 公斤重 (Ｂ)45 公斤重 (Ｃ)60 公斤重 (Ｄ)120 公斤重。", "ans": "C", "topic": "定滑輪", "analysis": "定滑輪不省力，拉 60 公斤重物需 60 公斤施力。", "ext": "只改變方向。"}, {"num": 31, "content": "敲擊鐵琴時，可以怎麼做來改變鐵琴聲音的大小？ (Ａ)敲擊長短不同的琴鍵 (Ｂ)改變鐵琴的顏色 (Ｃ)改變當時的溫度 (Ｄ)改變敲擊的力量。", "ans": "D", "topic": "鐵琴響度", "analysis": "改變敲擊力量=改變振幅=改變響度（聲音大小）。", "ext": "琴鍵長度影響音高。"}, {"num": 32, "content": "點燃三根相同的線香，分別放進大、中、小三個已裝滿空氣且瓶口蓋著玻璃片的 廣口瓶中，哪一個廣口瓶內的線香會最快熄滅？ (Ａ)三個一樣快 (Ｂ)大廣口瓶 (Ｃ)中廣口瓶 (Ｄ)小廣口瓶。", "ans": "D", "topic": "燃燒氧氣", "analysis": "小瓶空氣（氧氣）量少，最快耗盡，線香最快熄滅。", "ext": "燃燒需氧氣。"}, {"num": 33, "content": "自己製作霜，調配冰和鹽比例是多少？ (Ａ)1：2 (Ｂ)2：1 (Ｃ)1：3 (Ｄ)3：1。", "ans": "D", "topic": "自製霜", "analysis": "自製冷劑常見比例冰：鹽=3:1。", "ext": "鹽降低冰的熔點。"}, {"num": 34, "content": "如果要利用一塊磁鐵使鋼釘帶有磁性，要如何用磁鐵摩擦鋼釘會最成功呢？ (Ａ)來回摩擦很多次 (Ｂ)順著同一方向摩擦一次 (Ｃ)來回摩擦一次 (Ｄ)順著同一方向摩擦很多次。", "ans": "D", "topic": "磁化", "analysis": "順著同一方向摩擦多次可使鋼釘磁化最有效。", "ext": "使磁疇排列一致。"}, {"num": 35, "content": "植物的維管束用來運輸養分，位於外側的構造稱為什麼？ (Ａ)木質部 (Ｂ)韌皮部 (Ｃ)形成層 (Ｄ)表皮。", "ans": "B", "topic": "維管束", "analysis": "木本莖外側為韌皮部（運輸養分/有機物）、內側為木質部（運輸水）。", "ext": "形成層位於兩者之間。"}, {"num": 36, "content": "有一個輪軸，輪的半徑是 12 公分，軸的半徑是 3 公分，如果將 60 公斤重的物體 掛在軸上，在輪上至少要施力多少公斤重才可以拉起？ (Ａ)15 公斤重 (Ｂ)60 公斤重 (Ｃ)120 公斤重 (Ｄ)24 公斤重。", "ans": "A", "topic": "輪軸計算", "analysis": "掛軸施輪（省力）：施力=60×(3/12)=15 公斤重。", "ext": "輪軸省力比=軸半徑/輪半徑。"}, {"num": 37, "content": "關於熱對物質的影響，下列敘述何者錯誤？ (Ａ)液體必須達到沸點才能變成氣體 (Ｂ)液體具有熱脹冷縮的現象 (Ｃ)橋梁的伸縮縫是為了預留熱脹冷縮的空間 (Ｄ)銅球受熱後體積會變大。 98", "ans": "A", "topic": "蒸發", "analysis": "液體未達沸點也能蒸發（表面蒸發）。", "ext": "沸騰只在沸點；蒸發在任何溫度皆可。"}, {"num": 38, "content": "糖水、白醋、小蘇打水、氨水、純水和汽水，分別滴入紫色高麗菜汁後呈現紫色 系的有幾種？ (Ａ) 1 種 (Ｂ) 2 種 (Ｃ) 3 種 (Ｄ) 4 種。", "ans": "B", "topic": "中性水溶液", "analysis": "糖水、純水為中性（呈紫色），共 2 種。", "ext": "其他 4 種皆酸或鹼。"}, {"num": 39, "content": "下列關於礦物的敘述，哪一項不正確？ (Ａ)礦物是由一種或一種以上的岩石所構成的 (Ｂ)岩石是由礦物所組成 (Ｃ)分辨礦物可以利用它的顏色與光澤 (Ｄ)石英是屬於礦物。", "ans": "A", "topic": "礦物", "analysis": "礦物是單一化學成分的『天然無機固體』，非由岩石構成。岩石由礦物組成（反之）。", "ext": "礦物為岩石的基本單位。"}, {"num": 40, "content": "下圖為植物的生殖構造，圖中何種構造可將精細胞送到胚珠中與卵結合？ (Ａ)甲 (Ｂ)乙 (Ｃ)丙 (Ｄ)丁。", "ans": "X", "topic": "植物生殖", "analysis": "花粉管（由花粉發芽形成）將精細胞送至胚珠與卵結合。", "ext": "花粉管=雙受精通道。"}, {"num": 41, "content": "阿強和怡秀分別使用相同的輪軸，阿強將 2 公斤的書包掛在軸上，怡秀將 2 公斤 的書包掛在輪上。哪一個人可以輕鬆拉動書包？ (Ａ)阿強 (Ｂ)怡秀 (Ｃ)兩人一樣輕鬆 ○４無法比較。", "ans": "A", "topic": "輪軸", "analysis": "掛軸為省力方式（施輪=省力），阿強用省力法較輕鬆。", "ext": "施輪省力；施軸省時。"}, {"num": 42, "content": "下表是A恆星系中四顆行星的資料。 註：A.U為地球與太陽之間的平均距離，約為一億五千萬公里左右。 與A恆星的距離 自轉週 公轉週 代 （單位1A.U＝ 期 期 號 150000000公里） （日） （年） 甲 0.39A.U 58.67 0.24 乙 0.72A.U 243.01 0.62 丙 5.19A.U 0.42 11.86 丁 9.51A.U 0.44 29.46 若此A恆星為太陽，則哪兩顆行星性質與地球最相近？ (Ａ)乙、丙 (Ｂ)丙、丁 (Ｃ)甲、乙 (Ｄ)甲、丙。", "ans": "X", "topic": "行星類比", "analysis": "甲距離 0.39 AU（水星）、乙 0.72（金星）、丙 5.19（木星）、丁 9.51（土星）。", "ext": "水金地火木土天海。"}, {"num": 43, "content": "光線從空氣中進入到水中，關於它們進行的路徑，下列示意圖何者正確？ (Ａ) (Ｂ) (Ｃ) (Ｄ) 。", "ans": "X", "topic": "光折射", "analysis": "光從空氣進水（疏→密），折射角<入射角（偏向法線）。", "ext": "折射率變化決定折射方向。"}, {"num": 44, "content": "生物呼吸作用最主要、的目的，是可以產生什麼以供細胞活動之用？ (Ａ)醣類 (Ｂ)二氧化碳 (Ｃ)能量 (Ｄ)葡萄糖。", "ans": "C", "topic": "呼吸作用", "analysis": "呼吸作用分解葡萄糖產生『能量』供細胞活動。", "ext": "C6H12O6+O2→CO2+H2O+能量。"}, {"num": 45, "content": "在某些新聞事件中，我們常聽聞抽血做遺傳物質DNA比對分析以確定身分。是取 得血液中的哪一種成分來進行分析？ (Ａ)紅血球 (Ｂ)白血球 (Ｃ)血小板 (Ｄ)血漿。 99", "ans": "B", "topic": "DNA 比對", "analysis": "白血球有細胞核含 DNA，用於遺傳比對。紅血球無核。", "ext": "遺傳物質在細胞核內。"}]}</script>
<script>
let DATA = null;
const menuEl = document.getElementById('menu');
const mainEl = document.getElementById('main');

// 建立選單
for (let i = 1; i <= 20; i++) {
  const li = document.createElement('li');
  const a = document.createElement('a');
  a.dataset.round = i;
  a.textContent = `第 ${i} 回`;
  li.appendChild(a);
  menuEl.appendChild(li);
}

// 載入嵌入的資料
try {
  DATA = JSON.parse(document.getElementById('embedded-data').textContent);
  showHome();
  document.querySelectorAll('.menu a').forEach(a => {
      a.addEventListener('click', (e) => {
        document.querySelectorAll('.menu a').forEach(x => x.classList.remove('active'));
        a.classList.add('active');
        const r = parseInt(a.dataset.round);
        if (r === 0) showHome();
        else showRound(r);
        window.scrollTo(0, 0);
      });
    });
} catch(err) {
  mainEl.innerHTML = `<div class="loading">資料載入失敗：${err.message}</div>`;
}

function showHome() {
  const totalQ = Object.values(DATA).reduce((s, arr) => s + arr.length, 0);
  mainEl.innerHTML = `
    <div class="round-header">
      <h2>自然資優模擬試題解析</h2>
      <div class="meta">Comprehensive Analysis · Rounds 1–20</div>
    </div>
    <div class="home-card">
      <h2>使用說明</h2>
      <p>本文件收錄 20 回自然資優模擬試題，每題提供：</p>
      <p style="padding-left:1.5rem; margin-top:0.75rem;">· 正確答案</p>
      <p style="padding-left:1.5rem;">· 詳細解析（為何正確、其他選項錯在哪）</p>
      <p style="padding-left:1.5rem;">· 延伸考點提醒（相關知識與常見陷阱）</p>
      <p style="margin-top:1rem;">請點選左側選單切換各回內容。</p>
      <div class="home-stats">
        <div class="stat-item">
          <div class="stat-num">20</div>
          <div class="stat-label">回次</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">${totalQ}</div>
          <div class="stat-label">題目</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">${totalQ}</div>
          <div class="stat-label">解析</div>
        </div>
      </div>
    </div>
    <footer>自然資優模擬試題解析 · 解析內容供教學參考使用</footer>
  `;
}

function showRound(r) {
  const questions = DATA[r];
  if (!questions) {
    mainEl.innerHTML = `<div class="loading">找不到第 ${r} 回資料</div>`;
    return;
  }
  let html = `
    <div class="round-header">
      <h2>第 ${r} 回 · 試題解析</h2>
      <div class="meta">Round ${r} · ${questions.length} Questions</div>
    </div>
  `;
  questions.forEach(q => {
    const ansDisplay = (q.ans && q.ans !== 'X') ? q.ans : '—';
    html += `
      <div class="question">
        <div class="q-header">
          <span class="q-number">Q${q.num}.</span>
          ${q.topic ? `<span class="q-topic">${escapeHtml(q.topic)}</span>` : ''}
        </div>
        <div class="q-content">${escapeHtml(q.content)}</div>
        <div class="analysis-box">
          <div class="ans-line"><span class="ans-letter">${ansDisplay}</span>答案</div>
          <div class="analysis-text">${escapeHtml(q.analysis || '（解析略）')}</div>
          ${q.ext ? `<div class="ext-text">${escapeHtml(q.ext)}</div>` : ''}
        </div>
      </div>
    `;
  });
  html += '<footer>第 ' + r + ' 回 · 解析結束</footer>';
  mainEl.innerHTML = html;
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
</script>
</body>
</html>
